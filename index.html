<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style - Full Transition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* ESPACIO INICIAL */
        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* SECCIÓN PRINCIPAL STICKY */
        .main-section {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* TEXTO RECENT WORK */
        .text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            z-index: 10;
        }

        .text-line {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform;
        }

        .char {
            display: inline-block;
            will-change: transform, opacity;
        }

        .line-right {
            text-align: right;
        }

        /* CONTENEDOR DE IMÁGENES */
        .images-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            will-change: opacity, transform;
        }

        .image-wrapper {
            position: relative;
            width: 40vw;
            height: 60vh;
            border-radius: 16px;
            overflow: hidden;
            will-change: transform, width, height, border-radius;
            transform: scale(0.3);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 30px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .image-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-info h3 {
            font-size: 1.4vw;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .image-info p {
            font-size: 0.9vw;
            color: #aaa;
            line-height: 1.4;
        }

        .image-info .year {
            font-size: 0.8vw;
            color: #666;
            margin-top: 8px;
        }

        /* ESPACIO FINAL */
        .final-spacer {
            height: 100vh;
            background: #0a0a0a;
        }

        /* SCROLL INDICATOR */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            opacity: 0;
            animation: fadeInBounce 2s ease-in-out infinite;
        }

        @keyframes fadeInBounce {
            0%, 20%, 50%, 80%, 100% {
                opacity: 0.6;
                transform: translateX(-50%) translateY(0);
            }
            40% {
                opacity: 0.3;
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                opacity: 0.4;
                transform: translateX(-50%) translateY(-5px);
            }
        }

        @media (max-width: 768px) {
            .text-line {
                font-size: 18vw;
            }
            
            .images-container {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            
            .image-wrapper {
                width: 90vw;
                height: 35vh;
            }
            
            .image-info h3 {
                font-size: 4vw;
            }
            
            .image-info p {
                font-size: 3vw;
            }
            
            .image-info .year {
                font-size: 2.5vw;
            }
        }
    </style>
</head>
<body>

    <!-- ESPACIO VACÍO ARRIBA PARA ENTRAR -->
    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <!-- SECCIÓN PRINCIPAL CON TODOS LOS EFECTOS -->
    <section class="main-section">
        
        <!-- TEXTO: RECENT WORK -->
        <div class="text-container" id="textContainer">
            <div class="text-line" id="line1">RECENT</div>
            <div class="text-line line-right" id="line2">WORK</div>
        </div>

        <!-- IMÁGENES -->
        <div class="images-container" id="imagesContainer">
            <div class="image-wrapper" id="img1">
                <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1200&q=80" alt="Project 1">
                <div class="image-info">
                    <h3>Arrox Digital Agency HTML Template</h3>
                    <p>WordPress, Themeforest</p>
                    <div class="year">(2025)</div>
                </div>
            </div>
            
            <div class="image-wrapper" id="img2">
                <img src="https://images.unsplash.com/photo-1507643179173-617d6545517d?w=1200&q=80" alt="Project 2">
                <div class="image-info">
                    <h3>Al Khobar Uptown</h3>
                    <p>Visual Identity, Branding</p>
                    <div class="year">(2021)</div>
                </div>
            </div>
        </div>

        <div class="scroll-hint" id="scrollHint">SCROLL</div>
    </section>

    <!-- ESPACIO FINAL -->
    <div class="final-spacer"></div>

    <script>
        // ==========================================
        // CONFIGURACIÓN
        // ==========================================
        const textContainer = document.getElementById('textContainer');
        const imagesContainer = document.getElementById('imagesContainer');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const scrollHint = document.getElementById('scrollHint');
        const info1 = img1.querySelector('.image-info');
        const info2 = img2.querySelector('.image-info');

        // Separar letras
        [line1, line2].forEach(line => {
            const text = line.innerText;
            line.innerHTML = '';
            
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char');
                span.dataset.index = index;
                line.appendChild(span);
            });
        });

        const chars1 = line1.querySelectorAll('.char');
        const chars2 = line2.querySelectorAll('.char');

        // ==========================================
        // SCROLL PRINCIPAL
        // ==========================================
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            
            // Progreso total (0 = inicio, 1 = final del efecto completo)
            const totalProgress = Math.min(1, Math.max(0, scrollY / (windowHeight * 1.5)));
            
            // ==========================================
            // FASE 1: TEXTO SE JUNTA (0 - 0.4)
            // ==========================================
            const textJoinProgress = Math.min(1, totalProgress / 0.4);
            
            // Animar letras - juntándose
            [chars1, chars2].forEach((chars, lineIdx) => {
                const totalChars = chars.length;
                const isLine2 = lineIdx === 1;
                
                chars.forEach((char, index) => {
                    // Al inicio: separadas (-150px * posición desde el centro)
                    // Al final del fase 1: juntas (0px)
                    const spread = (textJoinProgress - 1) * -200;
                    const centerOffset = (index - (totalChars / 2)) * spread;
                    
                    // Scale: empieza en 0.6 y termina en 1
                    const scale = 0.6 + (textJoinProgress * 0.4);
                    
                    char.style.transform = `translateX(${centerOffset}px) scale(${scale})`;
                    char.style.opacity = textJoinProgress;
                });
            });

            // Mostrar hint de scroll cuando el texto está listo
            if (textJoinProgress > 0.8 && totalProgress < 0.4) {
                scrollHint.style.opacity = (textJoinProgress - 0.8) * 5;
            } else if (totalProgress >= 0.4) {
                scrollHint.style.opacity = 0;
            } else {
                scrollHint.style.opacity = 0;
            }

            // ==========================================
            // FASE 2: TEXTO SE CONTRAE RÁPIDO (0.4 - 0.55)
            // ==========================================
            const textContractProgress = Math.min(1, Math.max(0, (totalProgress - 0.4) / 0.15));
            
            if (totalProgress > 0.4) {
                // El texto se contrae hacia el centro y desaparece
                const contractScale = 1 - (textContractProgress * 0.8); // De 1 a 0.2
                const contractOpacity = 1 - textContractProgress; // De 1 a 0
                const contractY = textContractProgress * -50; // Se mueve hacia arriba
                
                textContainer.style.transform = `scale(${contractScale}) translateY(${contractY}px)`;
                textContainer.style.opacity = contractOpacity;
            }

            // ==========================================
            // FASE 3: IMÁGENES SE EXPANDEN (0.45 - 0.9)
            // ==========================================
            const imageExpandProgress = Math.min(1, Math.max(0, (totalProgress - 0.45) / 0.45));
            
            // Mostrar contenedor de imágenes
            if (totalProgress > 0.4) {
                imagesContainer.style.opacity = Math.min(1, (totalProgress - 0.4) / 0.1);
                imagesContainer.style.pointerEvents = 'auto';
            }

            // Animar imágenes
            [img1, img2].forEach((img, index) => {
                const info = img.querySelector('.image-info');
                const isLeft = index === 0;
                
                // Scale: empieza en 0.3 (pequeño) y termina en 1
                const imgScale = 0.3 + (imageExpandProgress * 0.7);
                
                // Ancho y alto progresivos
                // Empiezan: 30vw / 40vh
                // Terminan: 48vw / 85vh (casi pantalla completa con margen)
                const startWidth = 30;
                const endWidth = 48;
                const currentWidth = startWidth + (endWidth - startWidth) * imageExpandProgress;
                
                const startHeight = 40;
                const endHeight = 85;
                const currentHeight = startHeight + (endHeight - startHeight) * imageExpandProgress;
                
                // Border radius: empieza grande (50px) y termina pequeño (16px)
                const startRadius = 50;
                const endRadius = 16;
                const currentRadius = startRadius - (startRadius - endRadius) * imageExpandProgress;
                
                // Separación horizontal
                // Empiezan juntos en el centro, se separan hacia los lados
                const translateX = isLeft ? -30 * imageExpandProgress : 30 * imageExpandProgress;
                
                // Aplicar transformaciones
                img.style.transform = `
                    scale(${imgScale}) 
                    translateX(${translateX}vw)
                `;
                img.style.width = `${currentWidth}vw`;
                img.style.height = `${currentHeight}vh`;
                img.style.borderRadius = `${currentRadius}px`;
                
                // Mostrar información cuando las imágenes estén casi completas
                if (imageExpandProgress > 0.7) {
                    info.classList.add('visible');
                } else {
                    info.classList.remove('visible');
                }
            });

            // ==========================================
            // FASE 4: IMÁGENES SE EXPANDEN UN POCO MÁS (0.9 - 1.0)
            // ==========================================
            const finalExpandProgress = Math.min(1, Math.max(0, (totalProgress - 0.9) / 0.1));
            
            if (finalExpandProgress > 0) {
                // Ajuste final sutil para que queden "perfectamente visibles"
                [img1, img2].forEach((img, index) => {
                    const isLeft = index === 0;
                    const finalWidth = 48 + (2 * finalExpandProgress); // 48vw -> 50vw
                    const finalHeight = 85 + (5 * finalExpandProgress); // 85vh -> 90vh
                    
                    img.style.width = `${finalWidth}vw`;
                    img.style.height = `${finalHeight}vh`;
                    
                    // Separación final
                    const finalX = isLeft ? -30 - (5 * finalExpandProgress) : 30 + (5 * finalExpandProgress);
                    img.style.transform = img.style.transform.replace(
                        /translateX\([^)]+\)/,
                        `translateX(${finalX}vw)`
                    );
                });
            }
        });

        // Disparar scroll al cargar
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
