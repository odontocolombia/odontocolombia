<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capabilities Section</title>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .top-bar .brand {
      font-size: 14px;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .top-bar .btn-buy {
      background: #5cb85c;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    .top-bar .btn-buy:hover {
      background: #4cae4c;
    }

    /* ─ HEADER / CAPABILITIES ── */
    .header {
      text-align: center;
      margin-top: 60px;
      margin-bottom: 40px;
      position: relative;
    }

    .header .logo-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 260px;
      margin: 0 auto 30px;
      padding: 12px 20px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
    }

    .header .logo-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .logo-text .icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #fff, #888);
      clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
      display: inline-block;
    }

    .header .menu-icon {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .header .menu-icon span {
      width: 20px;
      height: 2px;
      background: #888;
      border-radius: 2px;
      transition: 0.3s;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header .subtitle {
      font-size: 18px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, color 0.3s;
    }

    .header .subtitle:hover {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* ── CARDS CONTAINER ── */
    .cards-wrapper {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 20px;
      max-width: 1200px;
      margin-bottom: 40px;
    }

    /* ── INDIVIDUAL CARD ── */
    .card {
      background: #fff;
      color: #111;
      width: 200px;
      min-height: 260px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 30px 20px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1),
                  box-shadow 0.35s ease;
      position: relative;
      opacity: 0;
      transform: translateY(40px);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 40px rgba(255,255,255,0.12);
    }

    .card .card-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }

    .card .card-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }

    /* ─ SVG ICONS INSIDE CARDS ── */
    .card .card-icon svg {
      width: 48px;
      height: 48px;
    }

    /* ── CENTER CARD HIGHLIGHT RING ── */
    .card.highlighted {
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .card.highlighted::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── PLUS BUTTON ── */
    .plus-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      color: #111;
      border: none;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      transition: transform 0.3s, background 0.3s;
    }

    .plus-btn:hover {
      transform: rotate(90deg) scale(1.1);
      background: #ddd;
    }

    /* ── SCROLL TO TOP ── */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      color: #fff;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s, background 0.3s;
    }

    .scroll-top.show {
      opacity: 1;
    }

    .scroll-top:hover {
      background: #555;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .cards-wrapper {
        gap: 10px;
      }
      .card {
        width: 150px;
        min-height: 200px;
        padding: 20px 14px;
      }
      .card .card-icon svg {
        width: 36px;
        height: 36px;
      }
      .card .card-title {
        font-size: 14px;
      }
      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="brand">envato market</span>
    <button class="btn-buy">Buy now</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-text">
        <span class="icon"></span>
        ADON<br>CREATIVE
      </div>
      <div class="menu-icon" id="menuIcon">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <h1>Capabilities</h1>
    <a class="subtitle">Explore</a>
  </div>

  <!-- CARDS -->
  <div class="cards-wrapper" id="cardsWrapper">

    <!-- Card 1: Interaction Design -->
    <div class="card" data-delay="0">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
          <line x1="24" y1="4" x2="24" y2="44"/>
          <line x1="4" y1="24" x2="44" y2="24"/>
          <line x1="8" y1="8" x2="40" y2="40"/>
          <line x1="40" y1="8" x2="8" y2="40"/>
        </svg>
      </div>
      <div class="card-title">Interaction Design</div>
    </div>

    <!-- Card 2: Website Development -->
    <div class="card" data-delay="100">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5">
          <circle cx="24" cy="24" r="18"/>
          <path d="M24 6 C24 6, 6 24, 24 24 C24 24, 42 24, 24 42" fill="#111"/>
          <path d="M24 6 C24 6, 42 24, 24 24 C24 24, 6 24, 24 42" stroke="#111" fill="none"/>
        </svg>
      </div>
      <div class="card-title">Website Development</div>
    </div>

    <!-- Card 3: SaaS Product Design (CENTER / highlighted) -->
    <div class="card highlighted" data-delay="200">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5">
          <rect x="6" y="6" width="22" height="22" rx="2"/>
          <rect x="20" y="20" width="22" height="22" rx="2"/>
        </svg>
      </div>
      <div class="card-title">SaaS Product Design</div>
    </div>

    <!-- Card 4: Digital Marketing -->
    <div class="card" data-delay="300">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5">
          <path d="M24 4 L42 14 L42 34 L24 44 L6 34 L6 14 Z"/>
          <line x1="24" y1="4" x2="24" y2="44"/>
          <line x1="6" y1="14" x2="24" y2="24"/>
          <line x1="42" y1="14" x2="24" y2="24"/>
        </svg>
      </div>
      <div class="card-title">Digital Marketing</div>
    </div>

    <!-- Card 5: Brand Guidelines -->
    <div class="card" data-delay="400">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5">
          <circle cx="24" cy="24" r="18"/>
          <path d="M24 6 A18 18 0 0 1 42 24 L24 24 Z" fill="#111"/>
          <rect x="21" y="21" width="6" height="6" fill="#111"/>
        </svg>
      </div>
      <div class="card-title">Brand Guidelines</div>
    </div>

  </div>

  <!-- PLUS BUTTON -->
  <button class="plus-btn" id="plusBtn">+</button>

  <!-- SCROLL TO TOP -->
  <button class="scroll-top" id="scrollTop">↑</button>

  <script>
    // ── ANIMATE CARDS ON LOAD ──
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        const delay = parseInt(card.getAttribute('data-delay')) || 0;
        setTimeout(() => {
          card.classList.add('visible');
        }, 300 + delay);
      });
    });

    // ── MENU ICON TOGGLE ──
    const menuIcon = document.getElementById('menuIcon');
    menuIcon.addEventListener('click', () => {
      const spans = menuIcon.querySelectorAll('span');
      spans[0].style.transform = spans[0].style.transform
        ? '' : 'rotate(45deg) translate(4px, 4px)';
      spans[1].style.opacity = spans[1].style.opacity === '0' ? '1' : '0';
      spans[2].style.transform = spans[2].style.transform
        ? '' : 'rotate(-45deg) translate(4px, -4px)';
    });

    // ── PLUS BUTTON → ADD CARD ──
    const plusBtn = document.getElementById('plusBtn');
    const wrapper = document.getElementById('cardsWrapper');
    let cardCount = 5;

    const extraServices = [
      'UI Engineering',
      'Motion Design',
      'User Research',
      'Content Strategy',
      'App Design'
    ];

    plusBtn.addEventListener('click', () => {
      const name = extraServices[cardCount - 5] || `Service ${cardCount + 1}`;
      const card = document.createElement('div');
      card.className = 'card visible';
      card.innerHTML = `
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5">
            <circle cx="24" cy="24" r="16"/>
            <line x1="16" y1="24" x2="32" y2="24"/>
            <line x1="24" y1="16" x2="24" y2="32"/>
          </svg>
        </div>
        <div class="card-title">${name}</div>
      `;
      wrapper.appendChild(card);
      card.style.transform = 'translateY(40px) scale(0.8)';
      card.style.opacity = '0';
      requestAnimationFrame(() => {
        card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
        card.style.transform = 'translateY(0) scale(1)';
        card.style.opacity = '1';
      });
      cardCount++;
    });

    // ── SCROLL TO TOP BUTTON ─
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('show', window.scrollY > 200);
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
