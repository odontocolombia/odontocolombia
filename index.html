<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style - Smooth Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-section {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        .text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .text-line {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform, opacity;
        }

        .char {
            display: inline-block;
            will-change: transform, opacity;
        }

        .line-right {
            text-align: right;
        }

        .images-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            will-change: opacity, transform;
        }

        .image-wrapper {
            position: relative;
            width: 0;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            will-change: transform, width, height, opacity;
            opacity: 0;
            transform: translateY(60px);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px 30px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .image-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-info h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .image-info p {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.4;
        }

        .image-info .year {
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
        }

        .final-spacer {
            height: 100vh;
            background: #0a0a0a;
        }

        .scroll-hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #666;
            opacity: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: fadeInBounce 2s ease-in-out infinite;
        }

        @keyframes fadeInBounce {
            0%, 20%, 50%, 80%, 100% {
                opacity: 0.5;
                transform: translateX(-50%) translateY(0);
            }
            40% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(-8px);
            }
            60% {
                opacity: 0.3;
                transform: translateX(-50%) translateY(-4px);
            }
        }

        @media (max-width: 768px) {
            .text-line {
                font-size: 16vw;
            }
            
            .images-container {
                flex-direction: column;
                gap: 16px;
                padding: 20px;
            }
            
            .image-wrapper {
                width: 100vw !important;
                height: 45vh !important;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <section class="main-section">
        
        <div class="text-container" id="textContainer">
            <div class="text-line" id="line1">RECENT</div>
            <div class="text-line line-right" id="line2">WORK</div>
        </div>

        <div class="images-container" id="imagesContainer">
            <div class="image-wrapper" id="img1">
                <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1200&q=80" alt="Project 1">
                <div class="image-info">
                    <h3>Arrox Digital Agency HTML Template</h3>
                    <p>WordPress, Themeforest</p>
                    <div class="year">(2025)</div>
                </div>
            </div>
            
            <div class="image-wrapper" id="img2">
                <img src="https://images.unsplash.com/photo-1507643179173-617d6545517d?w=1200&q=80" alt="Project 2">
                <div class="image-info">
                    <h3>Al Khobar Uptown</h3>
                    <p>Visual Identity, Branding</p>
                    <div class="year">(2021)</div>
                </div>
            </div>
        </div>

        <div class="scroll-hint" id="scrollHint">Scroll</div>
    </section>

    <div class="final-spacer"></div>

    <script>
        const textContainer = document.getElementById('textContainer');
        const imagesContainer = document.getElementById('imagesContainer');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const scrollHint = document.getElementById('scrollHint');

        // Separar letras
        [line1, line2].forEach(line => {
            const text = line.innerText;
            line.innerHTML = '';
            
            text.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.classList.add('char');
                line.appendChild(span);
            });
        });

        const chars1 = line1.querySelectorAll('.char');
        const chars2 = line2.querySelectorAll('.char');

        // Easing functions para transiciones suaves
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            
            // Progresso total normalizado (0 a 1)
            // El efecto completo ocurre en 2x la altura de la ventana
            const totalProgress = Math.min(1, Math.max(0, scrollY / (windowHeight * 2)));
            
            // ==========================================
            // FASE 1: ENTRADA DE LETRAS (0 - 0.35)
            // Las letras se juntan desde los lados
            // ==========================================
            const textEnterProgress = Math.min(1, totalProgress / 0.35);
            const easedEnter = easeOutCubic(textEnterProgress);
            
            [chars1, chars2].forEach((chars, lineIndex) => {
                const totalChars = chars.length;
                
                chars.forEach((char, index) => {
                    // Calcular posición relativa al centro (-1 a 1)
                    const relativePos = (index / (totalChars - 1)) * 2 - 1;
                    
                    // Al inicio: muy separadas (200px * posición relativa)
                    // Al final: juntas (0px)
                    const spread = 200 * (1 - easedEnter);
                    const translateX = relativePos * spread;
                    
                    // Scale: empieza pequeño (0.8) y crece a normal (1)
                    const scale = 0.8 + (0.2 * easedEnter);
                    
                    // Opacidad: aparece gradualmente
                    const opacity = easedEnter;
                    
                    char.style.transform = `translateX(${translateX}px) scale(${scale})`;
                    char.style.opacity = opacity;
                });
            });

            // Mostrar hint de scroll cuando las letras estén listas
            if (textEnterProgress > 0.7 && totalProgress < 0.35) {
                scrollHint.style.opacity = (textEnterProgress - 0.7) / 0.3 * 0.6;
            }

            // ==========================================
            // FASE 2: SALIDA DE LETRAS (0.3 - 0.5)
            // Las letras se mueven hacia arriba y desaparecen
            // ==========================================
            const textExitProgress = Math.min(1, Math.max(0, (totalProgress - 0.3) / 0.2));
            
            if (totalProgress > 0.3) {
                // Las letras se mueven hacia arriba rápidamente
                const translateY = -150 * easeOutExpo(textExitProgress);
                const opacity = 1 - easeOutExpo(textExitProgress);
                const scale = 1 - (0.3 * textExitProgress);
                
                textContainer.style.transform = `translateY(${translateY}px) scale(${scale})`;
                textContainer.style.opacity = opacity;
                
                // Fade out del hint
                scrollHint.style.opacity = Math.max(0, 0.6 - (textExitProgress * 2));
            }

            // ==========================================
            // FASE 3: ENTRADA DE IMÁGENES (0.4 - 0.85)
            // Las imágenes aparecen desde abajo y crecen
            // ==========================================
            const imageEnterProgress = Math.min(1, Math.max(0, (totalProgress - 0.4) / 0.45));
            const easedImage = easeInOutCubic(imageEnterProgress);
            
            // Mostrar contenedor de imágenes
            if (totalProgress > 0.35) {
                imagesContainer.style.opacity = Math.min(1, (totalProgress - 0.35) / 0.15);
                imagesContainer.style.pointerEvents = 'auto';
            }

            // Dimensiones objetivo para las imágenes
            const targetWidth = 48; // 48vw cada una
            const targetHeight = 75; // 75vh
            
            [img1, img2].forEach((img, index) => {
                const info = img.querySelector('.image-info');
                const isLeft = index === 0;
                
                // Calcular posición horizontal final
                // Izquierda: centrada en el cuarto izquierdo
                // Derecha: centrada en el cuarto derecho
                const centerX = isLeft ? 25 : 75; // porcentaje del ancho
                
                // Ancho y alto progresivos
                const currentWidth = targetWidth * easedImage;
                const currentHeight = targetHeight * easedImage;
                
                // Posición Y: viene desde abajo (60px) hasta su posición final
                const translateY = 60 * (1 - easedImage);
                
                // Opacidad: aparece gradualmente
                const opacity = easedImage;
                
                // Separación horizontal progresiva
                const translateX = isLeft ? -15 * easedImage : 15 * easedImage;
                
                // Border radius: empieza redondeado (30px) y se ajusta
                const borderRadius = 30 * (1 - easedImage * 0.5);
                
                // Aplicar estilos
                img.style.width = `${currentWidth}vw`;
                img.style.height = `${currentHeight}vh`;
                img.style.opacity = opacity;
                img.style.transform = `
                    translateY(${translateY}px) 
                    translateX(${translateX}vw)
                `;
                img.style.borderRadius = `${borderRadius}px`;
                
                // Mostrar información cuando las imágenes estén casi completas
                if (easedImage > 0.6) {
                    info.classList.add('visible');
                } else {
                    info.classList.remove('visible');
                }
            });

            // ==========================================
            // FASE 4: AJUSTE FINAL (0.85 - 1.0)
            // Las imágenes se posicionan perfectamente
            // ==========================================
            const finalProgress = Math.min(1, Math.max(0, (totalProgress - 0.85) / 0.15));
            const easedFinal = easeOutCubic(finalProgress);
            
            if (finalProgress > 0) {
                // Ajuste sutil de tamaño y posición
                [img1, img2].forEach((img, index) => {
                    const isLeft = index === 0;
                    
                    // Tamaño final: 50vw x 80vh
                    const finalWidth = targetWidth + (2 * easedFinal);
                    const finalHeight = targetHeight + (5 * easedFinal);
                    
                    // Posición final separada
                    const finalX = isLeft ? -15 - (8 * easedFinal) : 15 + (8 * easedFinal);
                    
                    img.style.width = `${finalWidth}vw`;
                    img.style.height = `${finalHeight}vh`;
                    
                    // Actualizar translateX manteniendo el translateY
                    const currentTransform = img.style.transform;
                    const translateYMatch = currentTransform.match(/translateY\([^)]+\)/);
                    const translateY = translateYMatch ? translateYMatch[0] : 'translateY(0px)';
                    
                    img.style.transform = `${translateY} translateX(${finalX}vw)`;
                });
            }
        });

        // Inicializar estado
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
