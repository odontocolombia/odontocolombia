<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style - Professional Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-section {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        .text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .text-line {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform;
        }

        .char {
            display: inline-block;
            will-change: transform;
        }

        .line-right {
            text-align: right;
        }

        .images-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            will-change: opacity;
        }

        .image-wrapper {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            will-change: transform, width, height;
            opacity: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 28px 28px;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 55%, transparent 100%);
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .image-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .image-info p {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.3;
        }

        .image-info .year {
            font-size: 0.75rem;
            color: #555;
            margin-top: 6px;
        }

        .final-spacer {
            height: 100vh;
            background: #0a0a0a;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #444;
            opacity: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        @media (max-width: 900px) {
            .text-line {
                font-size: 16vw;
            }
            
            .images-container {
                flex-direction: column;
                gap: 16px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <section class="main-section">
        
        <div class="text-container" id="textContainer">
            <div class="text-line" id="line1">RECENT</div>
            <div class="text-line line-right" id="line2">WORK</div>
        </div>

        <div class="images-container" id="imagesContainer">
            <div class="image-wrapper" id="img1">
                <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1200&q=80" alt="Project 1">
                <div class="image-info">
                    <h3>Arrox Digital Agency HTML Template</h3>
                    <p>WordPress, Themeforest</p>
                    <div class="year">(2025)</div>
                </div>
            </div>
            
            <div class="image-wrapper" id="img2">
                <img src="https://images.unsplash.com/photo-1507643179173-617d6545517d?w=1200&q=80" alt="Project 2">
                <div class="image-info">
                    <h3>Al Khobar Uptown</h3>
                    <p>Visual Identity, Branding</p>
                    <div class="year">(2021)</div>
                </div>
            </div>
        </div>

        <div class="scroll-hint" id="scrollHint">Scroll</div>
    </section>

    <div class="final-spacer"></div>

    <script>
        const textContainer = document.getElementById('textContainer');
        const imagesContainer = document.getElementById('imagesContainer');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const scrollHint = document.getElementById('scrollHint');

        // Separar letras
        [line1, line2].forEach(line => {
            const text = line.innerText;
            line.innerHTML = '';
            
            text.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.classList.add('char');
                line.appendChild(span);
            });
        });

        const chars1 = line1.querySelectorAll('.char');
        const chars2 = line2.querySelectorAll('.char');

        // Professional easing functions
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInCubic(t) {
            return t * t * t;
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            
            // Total scroll para completar todo el efecto: 3x la ventana
            const totalProgress = Math.min(1, Math.max(0, scrollY / (windowHeight * 3)));
            
            // ==========================================
            // FASE 1: ENTRADA DE LETRAS (0 - 0.20)
            // Letras vienen desde los lados y se juntan
            // ==========================================
            const textEnterProgress = Math.min(1, totalProgress / 0.20);
            const easedEnter = easeOutCubic(textEnterProgress);
            
            [chars1, chars2].forEach((chars, lineIndex) => {
                const totalChars = chars.length;
                
                chars.forEach((char, index) => {
                    // Posición relativa: -1 (izquierda) a 1 (derecha)
                    const relativePos = (index / (totalChars - 1)) * 2 - 1;
                    
                    // Separación inicial: 250px desde los lados
                    const spread = 250 * (1 - easedEnter);
                    const translateX = relativePos * spread;
                    
                    // Scale sutil: 0.95 a 1
                    const scale = 0.95 + (0.05 * easedEnter);
                    
                    char.style.transform = `translateX(${translateX}px) scale(${scale})`;
                    char.style.opacity = 1; // Sin difuminado
                });
            });

            // ==========================================
            // FASE 2: HOLD - LETRAS ESTÁTICAS (0.20 - 0.40)
            // Las letras se quedan quietas 2 segundos
            // ==========================================
            const holdProgress = totalProgress; // Entre 0.20 y 0.40
            
            if (totalProgress >= 0.20 && totalProgress < 0.40) {
                // Mantener posición final de las letras
                [chars1, chars2].forEach((chars) => {
                    const totalChars = chars.length;
                    
                    chars.forEach((char, index) => {
                        const relativePos = (index / (totalChars - 1)) * 2 - 1;
                        
                        char.style.transform = `translateX(0px) scale(1)`;
                        char.style.opacity = 1;
                    });
                });
            }

            // ==========================================
            // FASE 3: SALIDA DE LETRAS (0.40 - 0.60)
            // Las letras vuelven a los lados (mismo camino inverso)
            // ==========================================
            const textExitProgress = Math.min(1, Math.max(0, (totalProgress - 0.40) / 0.20));
            
            if (totalProgress >= 0.40 && totalProgress < 0.60) {
                [chars1, chars2].forEach((chars, lineIndex) => {
                    const totalChars = chars.length;
                    
                    chars.forEach((char, index) => {
                        const relativePos = (index / (totalChars - 1)) * 2 - 1;
                        
                        // Vuelven a separarse hacia los lados
                        const spread = 250 * easeOutCubic(textExitProgress);
                        const translateX = relativePos * spread;
                        
                        // Scale vuelve a 0.95
                        const scale = 1 - (0.05 * textExitProgress);
                        
                        char.style.transform = `translateX(${translateX}px) scale(${scale})`;
                        char.style.opacity = 1; // Sin difuminado
                    });
                });
            }

            // ==========================================
            // FASE 4: ENTRADA DE IMÁGENES (0.45 - 0.85)
            // Aparecen centradas, crecen a tamaño normal
            // ==========================================
            const imageProgress = Math.min(1, Math.max(0, (totalProgress - 0.45) / 0.40));
            const easedImage = easeInOutCubic(imageProgress);
            
            // Mostrar contenedor
            if (totalProgress > 0.40) {
                imagesContainer.style.opacity = Math.min(1, (totalProgress - 0.40) / 0.15);
                imagesContainer.style.pointerEvents = 'auto';
            }

            // Tamaños finales normales para las imágenes
            const finalWidth = 46; // 46vw cada imagen
            const finalHeight = 65; // 65vh cada imagen
            
            [img1, img2].forEach((img, index) => {
                const info = img.querySelector('.image-info');
                const isLeft = index === 0;
                
                // Progresión de tamaño: desde 0 hasta el tamaño final
                const currentWidth = finalWidth * easedImage;
                const currentHeight = finalHeight * easedImage;
                
                // Opacidad progresiva
                const opacity = easedImage;
                
                // Sin movimiento horizontal, solo crecimiento desde el centro
                const translateY = 30 * (1 - easedImage); // Viene ligeramente desde abajo
                
                // Border radius progresivo
                const borderRadius = 20 * (1 - easedImage * 0.3);
                
                // Aplicar estilos
                img.style.width = `${currentWidth}vw`;
                img.style.height = `${currentHeight}vh`;
                img.style.opacity = opacity;
                img.style.transform = `translateY(${translateY}px)`;
                img.style.borderRadius = `${borderRadius}px`;
                
                // Información aparece al final
                if (easedImage > 0.7) {
                    info.classList.add('visible');
                } else {
                    info.classList.remove('visible');
                }
            });

            // ==========================================
            // FASE 5: AJUSTE FINAL SUTIL (0.85 - 1.0)
            // Expansión mínima para posicionamiento perfecto
            // ==========================================
            const finalProgress = Math.min(1, Math.max(0, (totalProgress - 0.85) / 0.15));
            const easedFinal = easeOutCubic(finalProgress);
            
            if (finalProgress > 0) {
                [img1, img2].forEach((img, index) => {
                    // Expansión mínima: solo 2% más grande
                    const extraWidth = 2 * easedFinal;
                    const extraHeight = 3 * easedFinal;
                    
                    img.style.width = `${finalWidth + extraWidth}vw`;
                    img.style.height = `${finalHeight + extraHeight}vh`;
                });
            }

            // Scroll hint visible durante el hold
            if (totalProgress >= 0.15 && totalProgress < 0.45) {
                const hintOpacity = totalProgress < 0.20 
                    ? (totalProgress - 0.15) / 0.05 * 0.4
                    : totalProgress < 0.40 
                        ? 0.4 
                        : 0.4 * (1 - (totalProgress - 0.40) / 0.05);
                scrollHint.style.opacity = Math.max(0, hintOpacity);
            } else {
                scrollHint.style.opacity = 0;
            }
        });

        // Inicializar
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
