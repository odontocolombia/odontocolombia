<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XV Años · Sofía Valentina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0018; color: #E8D5FF; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }
    input::placeholder { color: rgba(215,190,226,.3); }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    canvas { max-width: 100%; }
    button { font-family: inherit; }

    @keyframes purpleShimmer { 0% { background-position: 0% center } 100% { background-position: 200% center } }
    @keyframes blinkColon { 0%,100% { opacity:1 } 50% { opacity:.25 } }
    @keyframes tickerScroll { from { transform: translateX(0) } to { transform: translateX(-50%) } }
    @keyframes heartFloat { 0%,100% { transform: translateY(0) rotate(0deg) } 50% { transform: translateY(-12px) rotate(8deg) } }
    @keyframes fadeUp { from { opacity:0; transform: translateY(32px) } to { opacity:1; transform: translateY(0) } }

    /* ── Splash animations ── */
    @keyframes photoKen   { 0%{transform:scale(1.08) translateY(0)} 100%{transform:scale(1) translateY(-2%)} }
    @keyframes photoFade  { 0%{opacity:0} 100%{opacity:1} }
    @keyframes revealUp   { 0%{opacity:0;transform:translateY(28px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes revealDown { 0%{opacity:0;transform:translateY(-20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes numDrop    {
      0%  {opacity:0;transform:translateY(-40px) scaleX(.9);filter:blur(8px)}
      65% {opacity:1;transform:translateY(5px) scaleX(1.01);filter:blur(0)}
      100%{opacity:1;transform:translateY(0) scaleX(1);filter:blur(0)}
    }
    @keyframes nameWrite  {
      0%  {opacity:0;clip-path:inset(0 100% 0 0)}
      100%{opacity:1;clip-path:inset(0 0% 0 0)}
    }
    @keyframes lineSwell  { 0%{width:0;opacity:0} 100%{width:100%;opacity:1} }
    @keyframes btnRise    {
      0%  {opacity:0;transform:translateY(20px) scale(.95)}
      70% {transform:translateY(-3px) scale(1.02)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes glowBreath { 0%,100%{opacity:.55} 50%{opacity:.9} }
    @keyframes dustRise {
      0%  {transform:translateY(0) translateX(0) scale(1);opacity:.8}
      100%{transform:translateY(-100vh) translateX(var(--dx)) scale(.15);opacity:0}
    }
    @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.7)} 50%{opacity:.85;transform:scale(1.2)} }
    @keyframes badgeIn  { 0%{opacity:0;transform:scale(.85)} 100%{opacity:1;transform:scale(1)} }

    .shimmer-text {
      background: linear-gradient(90deg,#4B1D8A 0%,#7D3C98 20%,#9B59B6 35%,#E8D5FF 50%,#9B59B6 65%,#7D3C98 80%,#4B1D8A 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: purpleShimmer 3s linear infinite;
      filter: drop-shadow(0 0 10px rgba(155,89,182,.6));
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      letter-spacing: .06em;
      line-height: 1.15;
      display: block;
    }
    .purple-btn {
      background: linear-gradient(135deg,#4B1D8A 0%,#7D3C98 30%,#9B59B6 45%,#E8D5FF 55%,#9B59B6 65%,#7D3C98 80%,#4B1D8A 100%);
      background-size: 200% auto;
      animation: purpleShimmer 2s linear infinite;
      border: none; color: rgba(20,0,40,.95); font-family: 'Cinzel', serif;
      font-size: .65rem; letter-spacing: .35em; font-weight: 700;
      padding: 1rem 2.4rem; border-radius: 4px; cursor: pointer;
      box-shadow: 0 10px 36px rgba(155,89,182,.45);
      display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    }
    .blink-colon {
      font-family: 'Cinzel', serif; font-size: 2.2rem;
      color: rgba(155,89,182,.7); padding-bottom: 2.4rem;
      animation: blinkColon 1.2s ease-in-out infinite;
    }
    .ticker-inner { display: flex; white-space: nowrap; animation: tickerScroll 16s linear infinite; }
    .heart-float { animation: heartFloat 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(155,89,182,.7)); position: absolute; }
    .fade-up { animation: fadeUp .9s .4s both ease; }
    .gallery-dot { height: 4px; border-radius: 3px; border: none; padding: 0; cursor: pointer; transition: all .25s; }
    .gallery-thumb { flex-shrink: 0; width: 52px; height: 52px; border-radius: 10px; overflow: hidden; cursor: pointer; padding: 0; background: none; transition: all .25s; }
    .rsvp-toggle { flex: 1; padding: .9rem; font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .3em; border-radius: 4px; cursor: pointer; transition: all .2s; }
    .accordion-header { display: flex; align-items: center; gap: 1rem; width: 100%; text-align: left; background: transparent; border: none; padding: 1.25rem 1.5rem; cursor: pointer; }
    .accordion-chevron { transition: transform .35s; }
    .timeline-spine {
      position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
      background: linear-gradient(to bottom,transparent,rgba(155,89,182,.8) 10%,rgba(215,190,226,.4) 50%,rgba(155,89,182,.8) 90%,transparent);
      box-shadow: 0 0 12px rgba(155,89,182,.4);
      transform: translateX(-50%) scaleY(0); transform-origin: top;
      transition: transform 2s cubic-bezier(.22,1,.36,1);
    }
  </style>
</head>
<body>
  <div id="app" style="background:#0d0018;color:#E8D5FF;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;font-family:'Cormorant Garamond',serif;overflow-x:hidden;padding:0">
    <div id="card" style="width:100%;max-width:430px;box-shadow:0 0 0 1px rgba(155,89,182,.2),0 40px 120px rgba(0,0,0,.9),0 0 60px rgba(155,89,182,.08);overflow:hidden"></div>
  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────────
    var EVENT_DATE = new Date("2026-11-15T19:00:00");

    var GALLERY = [
      { url: "https://images.unsplash.com/photo-1559034750-cdab70a66b8e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "La quinceañera" },
      { url: "https://images.unsplash.com/photo-1721069112805-860652356252?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Elegancia pura" },
      { url: "https://images.unsplash.com/photo-1721069113513-24e20df325b5?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Vestido de ensueño" },
      { url: "https://images.unsplash.com/photo-1721069103742-028e693b68d4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "La protagonista" },
      { url: "https://images.unsplash.com/photo-1763625650105-9bca6b5509ae?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Fashion moment" },
      { url: "https://images.unsplash.com/photo-1763625642525-7d0a0d5f9cf9?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Celebración especial" },
      { url: "https://images.unsplash.com/photo-1763625638895-c52d46816bc0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Corte de honor" },
      { url: "https://images.unsplash.com/photo-1654336037958-c698d50700b3?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800", caption: "Noche de magia" }
    ];

    var ITINERARY = [
      { time: "7:00 PM", name: "Recepción de invitados", desc: "Bienvenida con cóctel y música en vivo", icon: "M8 22V19M16 22V19M7 10L5 19H19L17 10M9 10V6a3 3 0 0 1 6 0v4M6 10h12" },
      { time: "8:00 PM", name: "Entrada de la quinceañera", desc: "El gran momento de Sofía Valentina con su corte de honor", icon: "M2 19h20M4 19L2 7l5 4 5-8 5 8 5-4-2 12M9 19v-3a3 3 0 0 1 6 0v3" },
      { time: "8:30 PM", name: "Vals y coreografía", desc: "El primer vals y la sorpresa coreográfica de la corte", icon: "M9 18V5l12-2v13M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM18 13a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" },
      { time: "9:30 PM", name: "Cena y brindis", desc: "Banquete especial y palabras desde el corazón", icon: "M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7" },
      { time: "10:30 PM", name: "Pastel y sorpresas", desc: "Corte del pastel, lluvia de regalos y más sorpresas", icon: "M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8M4 16s1-1 2-1 2 1 3 1 2-1 3-1 2 1 3 1 2-1 3-1M2 21h20M7 8v2M12 8v2M17 8v2" },
      { time: "11:00 PM", name: "Baile y fiesta", desc: "¡Pista de baile abierta hasta que el cuerpo aguante!", icon: "M9 18V5l12-2v13M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM18 13a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" }
    ];

    var GIFTS = [
      { key: "nequi", label: "Nequi", sub: "Envío digital · Colombia" },
      { key: "daviplata", label: "Daviplata", sub: "Envío digital · Colombia" },
      { key: "pse", label: "PSE", sub: "Pago seguro en línea" }
    ];

    var TICKER_PHRASES = ["GLAMOUR · XV AÑOS","SOFÍA VALENTINA","15 NOVIEMBRE 2026","THE SHOW STARTS AT 7PM","YOU ARE INVITED","UNA NOCHE ÚNICA"];

    // ── State ─────────────────────────────────────────────────────────────────────
    var appOpen = false;
    var galleryIdx = 0;
    var galleryAutoInterval = null;
    var lightboxOpen = false;
    var openGift = null;
    var rsvpAttendance = "yes";

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function pad(n) { return String(n).padStart(2, "0"); }

    function getCountdown() {
      var diff = Math.max(0, EVENT_DATE.getTime() - Date.now());
      var s = Math.floor(diff / 1000);
      return {
        days: pad(Math.floor(s / 86400)),
        hours: pad(Math.floor((s % 86400) / 3600)),
        mins: pad(Math.floor((s % 3600) / 60)),
        secs: pad(s % 60)
      };
    }

    function purpleLine() {
      return '<div style="height:2px;background:linear-gradient(to right,transparent,#4B1D8A 15%,#9B59B6 40%,#E8D5FF 50%,#9B59B6 60%,#4B1D8A 85%,transparent);box-shadow:0 0 12px rgba(155,89,182,.5),0 0 24px rgba(155,89,182,.2)"></div>';
    }

    function eyebrow(t) {
      return '<span style="display:block;font-family:\'Cinzel\',serif;font-size:.5rem;letter-spacing:.72em;text-transform:uppercase;color:rgba(232,213,255,.7);text-shadow:0 0 8px rgba(155,89,182,.4);margin-bottom:.3rem">'+t+'</span>';
    }

    function shimmer(t) {
      return '<span class="shimmer-text">'+t+'</span>';
    }

    function ornament() {
      return '<div style="display:flex;justify-content:center;margin:10px 0 1.75rem"><svg width="200" height="14" viewBox="0 0 200 14" fill="none"><line x1="0" y1="7" x2="76" y2="7" stroke="url(#pL)" stroke-width="0.8"/><rect x="93" y="3" width="14" height="8" fill="#9B59B6" opacity=".9" transform="rotate(45 100 7)"/><circle cx="83" cy="7" r="1.8" fill="rgba(232,213,255,.8)"/><circle cx="117" cy="7" r="1.8" fill="rgba(232,213,255,.8)"/><line x1="124" y1="7" x2="200" y2="7" stroke="url(#pR)" stroke-width="0.8"/><defs><linearGradient id="pL" x1="0" y1="0" x2="76" y2="0"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="#9B59B6" stop-opacity=".9"/></linearGradient><linearGradient id="pR" x1="124" y1="0" x2="200" y2="0"><stop offset="0%" stop-color="#9B59B6" stop-opacity=".9"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg></div>';
    }

    // ── Splash ─────────────────────────────────────────────────────────────────────
    function buildParticles() {
      var html = '';
      var colors = ['rgba(155,89,182,.7)','rgba(232,213,255,.6)','rgba(215,190,226,.5)','rgba(200,160,240,.6)'];
      for (var i = 0; i < 22; i++) {
        var left  = (Math.random()*92+4).toFixed(1);
        var delay = (Math.random()*6).toFixed(2);
        var dur   = (5 + Math.random()*7).toFixed(2);
        var size  = (2 + Math.random()*3.5).toFixed(1);
        var dx    = ((Math.random()-0.5)*120).toFixed(0);
        var color = colors[Math.floor(Math.random()*colors.length)];
        html += '<div style="position:absolute;bottom:-8px;left:'+left+'%;width:'+size+'px;height:'+size+'px;background:'+color+';border-radius:50%;--dx:'+dx+'px;animation:dustRise '+dur+'s '+delay+'s linear infinite"></div>';
      }
      return html;
    }

    function buildStars() {
      var html = '';
      for (var i = 0; i < 35; i++) {
        var left  = (Math.random()*100).toFixed(1);
        var top   = (Math.random()*65).toFixed(1);
        var delay = (Math.random()*5).toFixed(2);
        var dur   = (2+Math.random()*3).toFixed(2);
        var size  = (.8+Math.random()*1.8).toFixed(1);
        html += '<div style="position:absolute;left:'+left+'%;top:'+top+'%;width:'+size+'px;height:'+size+'px;background:#E8D5FF;border-radius:50%;animation:twinkle '+dur+'s '+delay+'s ease-in-out infinite"></div>';
      }
      return html;
    }

    function renderSplash() {
      var particles = buildParticles();
      var stars     = buildStars();

      return (
        '<div id="splash" onclick="openInvitation()" style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;overflow:hidden;min-height:100vh;background:#04000e">'

        // ── Full-bleed photo with ken burns ──
        +'<div style="position:absolute;inset:0;overflow:hidden">'
        +'<img src="https://images.unsplash.com/photo-1559034750-cdab70a66b8e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1200" alt="" '
        +'style="width:100%;height:100%;object-fit:cover;object-position:center 15%;'
        +'opacity:0;animation:photoFade 1.8s .2s ease-out forwards,photoKen 14s .2s ease-out forwards;transform-origin:center top"/>'
        +'</div>'

        // ── Gradient layers over photo ──
        // Top fade (dark)
        +'<div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(4,0,14,.7) 0%,rgba(4,0,14,.1) 35%,transparent 55%);pointer-events:none"></div>'
        // Bottom strong gradient — text lives here
        +'<div style="position:absolute;inset:0;background:linear-gradient(to top,#04000e 0%,rgba(4,0,14,.96) 28%,rgba(10,0,28,.75) 52%,transparent 72%);pointer-events:none"></div>'
        // Subtle purple tone over the whole photo
        +'<div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(75,29,138,.18) 0%,transparent 60%,rgba(100,20,160,.12) 100%);pointer-events:none"></div>'

        // ── Stars (upper half only) ──
        + stars

        // ── Dust particles ──
        + particles

        // ── Thin top border ──
        +'<div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(155,89,182,.6) 30%,rgba(232,213,255,.8) 50%,rgba(155,89,182,.6) 70%,transparent);animation:revealDown .8s 2.8s both;pointer-events:none"></div>'

        // ── Corner ornaments ──
        +'<svg style="position:absolute;top:16px;left:16px;opacity:0;animation:revealUp .6s 3s both" width="24" height="24" viewBox="0 0 24 24"><path d="M2 22 L2 2 L22 2" fill="none" stroke="rgba(155,89,182,.7)" stroke-width="1.2"/></svg>'
        +'<svg style="position:absolute;top:16px;right:16px;opacity:0;animation:revealUp .6s 3s both;transform:rotate(90deg)" width="24" height="24" viewBox="0 0 24 24"><path d="M2 22 L2 2 L22 2" fill="none" stroke="rgba(155,89,182,.7)" stroke-width="1.2"/></svg>'
        +'<svg style="position:absolute;bottom:16px;left:16px;opacity:0;animation:revealUp .6s 3.1s both;transform:rotate(270deg)" width="24" height="24" viewBox="0 0 24 24"><path d="M2 22 L2 2 L22 2" fill="none" stroke="rgba(155,89,182,.5)" stroke-width="1.2"/></svg>'
        +'<svg style="position:absolute;bottom:16px;right:16px;opacity:0;animation:revealUp .6s 3.1s both;transform:rotate(180deg)" width="24" height="24" viewBox="0 0 24 24"><path d="M2 22 L2 2 L22 2" fill="none" stroke="rgba(155,89,182,.5)" stroke-width="1.2"/></svg>'

        // ── Glow behind text ──
        +'<div style="position:absolute;bottom:0;left:0;right:0;height:55%;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(75,29,138,.25) 0%,transparent 70%);animation:glowBreath 4s 2s ease-in-out infinite;pointer-events:none"></div>'

        // ── TEXT CONTENT — pinned to bottom ──
        +'<div style="position:relative;z-index:10;width:100%;padding:0 2rem 3.5rem;display:flex;flex-direction:column;align-items:center;text-align:center">'

        // Eyebrow
        +'<div style="opacity:0;animation:revealUp .7s 1.6s ease-out both;display:flex;align-items:center;gap:.9rem;margin-bottom:1rem">'
        +'<div style="height:1px;width:28px;background:linear-gradient(to left,rgba(155,89,182,.7),transparent)"></div>'
        +'<span style="font-family:\'Cinzel\',serif;font-size:.42rem;letter-spacing:.65em;color:rgba(215,190,226,.55);text-transform:uppercase;white-space:nowrap">Glamour Edition · XV Años</span>'
        +'<div style="height:1px;width:28px;background:linear-gradient(to right,rgba(155,89,182,.7),transparent)"></div>'
        +'</div>'

        // Big 15
        +'<span style="opacity:0;animation:numDrop .9s 1.9s cubic-bezier(.22,1,.36,1) both;'
        +'background:linear-gradient(180deg,#ffffff 0%,#E8D5FF 30%,#9B59B6 70%,#4B1D8A 100%);'
        +'-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;'
        +'font-family:\'Cinzel\',serif;font-size:7.5rem;line-height:.85;letter-spacing:.05em;display:block;'
        +'filter:drop-shadow(0 0 40px rgba(155,89,182,.9)) drop-shadow(0 2px 0 rgba(0,0,0,.5))">15</span>'

        // Divider line
        +'<div style="opacity:0;animation:lineSwell .6s 2.5s ease-out both;height:1px;width:100%;max-width:200px;margin:.8rem auto .7rem;background:linear-gradient(to right,transparent,rgba(155,89,182,.6) 20%,rgba(232,213,255,.7) 50%,rgba(155,89,182,.6) 80%,transparent)"></div>'

        // Subtitle
        +'<span style="opacity:0;animation:revealUp .55s 2.65s ease-out both;font-family:\'Cinzel\',serif;font-size:.5rem;letter-spacing:.55em;color:rgba(215,190,226,.55);text-transform:uppercase;margin-bottom:.55rem;display:block">Años de</span>'

        // Name
        +'<p style="opacity:0;animation:nameWrite .9s 2.9s ease-out both;font-family:\'Great Vibes\',cursive;font-size:3.4rem;line-height:1.05;'
        +'color:#fff;text-shadow:0 2px 30px rgba(155,89,182,.8),0 0 60px rgba(155,89,182,.4);margin-bottom:.3rem">Sofía Valentina</p>'

        // Last name
        +'<span style="opacity:0;animation:revealUp .5s 3.2s ease-out both;font-family:\'Cormorant Garamond\',serif;font-size:.62rem;letter-spacing:.38em;font-style:italic;color:rgba(215,190,226,.42);display:block;margin-bottom:1.6rem">García Montoya</span>'

        // Date badge
        +'<div style="opacity:0;animation:badgeIn .6s 3.4s cubic-bezier(.34,1.56,.64,1) both;'
        +'display:inline-flex;align-items:center;gap:.75rem;border:1px solid rgba(155,89,182,.4);'
        +'padding:.6rem 1.6rem;font-family:\'Cinzel\',serif;font-size:.6rem;letter-spacing:.28em;color:#D7BDE2;'
        +'background:rgba(4,0,14,.6);backdrop-filter:blur(12px);margin-bottom:1.8rem;border-radius:3px;'
        +'box-shadow:0 0 0 1px rgba(232,213,255,.06),inset 0 1px 0 rgba(232,213,255,.08)">'
        +'<span style="color:rgba(155,89,182,.6);font-size:.55rem">✦</span>'
        +'15 · NOV · 2026'
        +'<span style="color:rgba(155,89,182,.35);font-size:.5rem">|</span>'
        +'7:00 PM'
        +'<span style="color:rgba(155,89,182,.6);font-size:.55rem">✦</span>'
        +'</div>'

        // CTA button
        +'<button onclick="event.stopPropagation();openInvitation()" '
        +'style="opacity:0;animation:btnRise .7s 3.7s cubic-bezier(.34,1.56,.64,1) both,'
        +'purpleShimmer 2.5s 4.4s linear infinite;'
        +'background:linear-gradient(135deg,#3d1070 0%,#6b2fa0 30%,#9B59B6 48%,#E8D5FF 55%,#9B59B6 62%,#6b2fa0 80%,#3d1070 100%);'
        +'background-size:200% auto;border:none;color:rgba(255,255,255,.95);font-family:\'Cinzel\',serif;'
        +'font-size:.65rem;letter-spacing:.4em;font-weight:700;padding:1rem 2.8rem;border-radius:3px;cursor:pointer;'
        +'box-shadow:0 16px 50px rgba(100,30,180,.55),0 0 0 1px rgba(232,213,255,.15),inset 0 1px 0 rgba(255,255,255,.15)">'
        +'Abrir Invitación'
        +'</button>'

        // Tap hint
        +'<p style="opacity:0;animation:revealUp .5s 4s ease-out both;margin-top:.9rem;font-size:.4rem;letter-spacing:.2em;color:rgba(155,89,182,.28);font-family:\'Cinzel\',serif">Toca en cualquier lugar</p>'

        +'</div>' // content

          +'<div id="gift-panel-'+gift.key+'" style="display:none;padding:0 1.5rem 1.5rem">'
          +'<div style="border-radius:6px;padding:1.5rem;background:rgba(155,89,182,.06);border:1px solid rgba(155,89,182,.2)">'
          +'<p style="text-align:center;font-family:\'Great Vibes\',cursive;font-size:1.6rem;color:#D7BDE2;text-shadow:0 0 14px rgba(155,89,182,.5);margin:0 0 1.25rem">Regalar con '+gift.label+'</p>'
          +'<input type="text" id="gift-name-'+gift.key+'" placeholder="Tu nombre" style="display:block;width:100%;padding:.9rem 1.1rem;border:1px solid rgba(155,89,182,.3);background:rgba(155,89,182,.08);color:#E8D5FF;font-size:.88rem;outline:none;border-radius:4px;margin-bottom:.75rem;font-family:\'Cormorant Garamond\',serif"/>'
          +'<input type="number" id="gift-amount-'+gift.key+'" placeholder="Monto (COP)" style="display:block;width:100%;padding:.9rem 1.1rem;border:1px solid rgba(155,89,182,.3);background:rgba(155,89,182,.08);color:#E8D5FF;font-size:.88rem;outline:none;border-radius:4px;margin-bottom:.75rem;font-family:\'Cormorant Garamond\',serif"/>'
          +'<button onclick="generateQR(\''+gift.key+'\',\''+gift.label+'\')" class="purple-btn">Generar QR</button>'
          +'<div style="text-align:center;margin-top:1.5rem"><div id="qr-'+gift.key+'" style="display:inline-block"></div></div>'
          +'</div></div></div>';
      }).join('');
      return '<section style="padding:3.5rem 1.5rem 4rem;background:linear-gradient(160deg,#0d0018 0%,#150025 50%,#0d0018 100%);text-align:center">'
        +eyebrow('Si deseas obsequiar')+shimmer('Regalo con Amor')+ornament()
        +cards+'</section>';
    }

    // ── Dress Code ────────────────────────────────────────────────────────────────
    function renderDressCode() {
      var items = [
        { title:"Damas", desc:"Vestido largo o cocktail en tonos lila, lavanda, vino, plata o negro. Evitar blanco puro.", accent:"linear-gradient(135deg,#7D3C98,#4B1D8A)" },
        { title:"Caballeros", desc:"Traje formal o vestimenta elegante. Corbata o moño en tonos morado, negro o plateado.", accent:"linear-gradient(135deg,#9B59B6,#6C3483)" },
        { title:"Color de la noche", desc:"Paleta oficial: lila, lavanda, malva, plata y detalles cristal.", accent:"linear-gradient(135deg,#D7BDE2,#9B59B6)" }
      ];
      var cards = items.map(function(item){
        return '<div style="border-radius:6px;display:flex;align-items:flex-start;gap:1rem;padding:1.25rem 1.5rem;background:rgba(20,0,40,.9);border:1px solid rgba(155,89,182,.25);backdrop-filter:blur(12px);box-shadow:0 8px 28px rgba(0,0,0,.3);position:relative;overflow:hidden">'
          +'<div style="position:absolute;top:0;left:0;bottom:0;width:3px;background:'+item.accent+'"></div>'
          +'<div style="flex-shrink:0;border-radius:6px;display:flex;align-items:center;justify-content:center;width:50px;height:50px;background:'+item.accent+';box-shadow:0 6px 20px rgba(0,0,0,.3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(20,0,40,.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/></svg></div>'
          +'<div style="flex:1"><div style="font-family:\'Cinzel\',serif;font-size:.95rem;font-weight:700;color:#D7BDE2;margin-bottom:5px">'+item.title+'</div><p style="font-size:.76rem;color:rgba(215,190,226,.5);line-height:1.65;margin:0">'+item.desc+'</p></div>'
          +'</div>';
      }).join('');
      return '<section style="position:relative;overflow:hidden;padding:3.5rem 1.5rem 4rem;background:linear-gradient(160deg,#150025 0%,#1a0033 50%,#150025 100%);text-align:center">'
        +eyebrow('Viste para la ocasión')+shimmer('Código de Vestimenta')+ornament()
        +'<p style="text-align:center;font-family:\'Cormorant Garamond\',serif;font-size:.92rem;font-style:italic;color:rgba(215,190,226,.6);line-height:1.9;margin-bottom:2rem">Esta noche merece tu mejor versión.<br><span style="color:#D7BDE2">Etiqueta formal · Tema púrpura</span></p>'
        +'<div style="display:flex;flex-direction:column;gap:.875rem">'+cards+'</div>'
        +'<div style="margin-top:1.75rem;border-radius:6px;padding:1.1rem 1.4rem;background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.3);display:flex;align-items:center;gap:.875rem">'
        +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D7BDE2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        +'<p style="font-size:.73rem;color:rgba(215,190,226,.55);line-height:1.6;margin:0;font-family:\'Cormorant Garamond\',serif;font-style:italic">Por favor <strong style="color:#D7BDE2">evita usar blanco puro</strong> para respetar el color de la quinceañera y la paleta de la noche.</p>'
        +'</div></section>';
    }

    // ── RSVP ──────────────────────────────────────────────────────────────────────
    function renderRsvp() {
      return '<section style="position:relative;overflow:hidden;padding:4rem 1.5rem 5rem;background:linear-gradient(160deg,#0d0018 0%,#150025 50%,#0d0018 100%);text-align:center">'
        +eyebrow('Confirma tu presencia')+shimmer('¿Nos acompañas?')+ornament()
        +'<p style="text-align:center;font-size:.88rem;font-style:italic;color:rgba(215,190,226,.6);line-height:1.8;font-family:\'Cormorant Garamond\',serif;margin-bottom:2rem">Tu presencia hará esta noche aún más especial.<br>Confirma antes del <strong style="color:#D7BDE2;text-shadow:0 0 8px rgba(155,89,182,.5)">1 de Noviembre</strong></p>'
        +'<div style="border-radius:8px;padding:2rem 1.75rem;max-width:420px;margin:0 auto;background:rgba(20,0,40,.9);border:1px solid rgba(155,89,182,.35);backdrop-filter:blur(14px);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(155,89,182,.15);position:relative;overflow:hidden">'
        +'<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#9B59B6,#E8D5FF,#9B59B6,transparent)"></div>'
        +'<div id="rsvp-form">'
        +'<input id="rsvp-name" type="text" placeholder="Tu nombre completo" style="display:block;width:100%;padding:.9rem 1.1rem;border:1px solid rgba(155,89,182,.3);background:rgba(155,89,182,.08);color:#E8D5FF;font-size:.88rem;outline:none;border-radius:4px;margin-bottom:.75rem;font-family:\'Cormorant Garamond\',serif"/>'
        +'<input id="rsvp-guests" type="number" placeholder="¿Cuántos asistirán?" min="1" max="5" style="display:block;width:100%;padding:.9rem 1.1rem;border:1px solid rgba(155,89,182,.3);background:rgba(155,89,182,.08);color:#E8D5FF;font-size:.88rem;outline:none;border-radius:4px;margin-bottom:.75rem;font-family:\'Cormorant Garamond\',serif"/>'
        +'<div style="display:flex;gap:.75rem;margin-bottom:1rem">'
        +'<button id="btn-yes" onclick="setAttendance(\'yes\')" class="rsvp-toggle" style="border:1px solid #9B59B6;background:rgba(155,89,182,.2);color:#D7BDE2;box-shadow:0 4px 20px rgba(155,89,182,.3)">Sí asistiré ✓</button>'
        +'<button id="btn-no" onclick="setAttendance(\'no\')" class="rsvp-toggle" style="border:1px solid rgba(155,89,182,.2);background:rgba(155,89,182,.05);color:rgba(215,190,226,.4)">No podré ir</button>'
        +'</div>'
        +'<p id="rsvp-error" style="font-family:\'Cinzel\',serif;font-size:.7rem;color:#D7BDE2;letter-spacing:.08em;margin-bottom:.5rem;display:none"></p>'
        +'<button onclick="submitRsvp()" class="purple-btn">Confirmar asistencia</button>'
        +'<p style="text-align:center;margin-top:.75rem;font-family:\'Cinzel\',serif;font-size:.44rem;letter-spacing:.15em;color:rgba(155,89,182,.35)">Confirma antes del 1 de Noviembre · Cupos limitados</p>'
        +'</div>'
        +'<div id="rsvp-thanks" style="display:none;text-align:center;padding:2.5rem 0">'
        +'<div style="display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;border-radius:50%;width:80px;height:80px;background:linear-gradient(145deg,#9B59B6,#4B1D8A);box-shadow:0 14px 44px rgba(155,89,182,.5)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(232,213,255,.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
        +'<h3 style="font-family:\'Great Vibes\',cursive;font-size:4rem;color:#D7BDE2;line-height:1;filter:drop-shadow(0 2px 12px rgba(155,89,182,.5));text-align:center">¡Gracias!</h3>'
        +'<p style="margin-top:.875rem;font-size:.9rem;font-style:italic;color:rgba(215,190,226,.65);line-height:1.8;font-family:\'Cormorant Garamond\',serif;text-align:center">Tu respuesta ha sido registrada.<br>¡Te esperamos con todo el amor!</p>'
        +'</div></div></section>';
    }

    // ── Footer ────────────────────────────────────────────────────────────────────
    function renderFooter() {
      var year = new Date().getFullYear();
      return '<footer style="position:relative;overflow:hidden;text-align:center;padding:4rem 1.5rem 3rem;background:linear-gradient(160deg,#0d0018 0%,#150025 40%,#1a0033 100%)">'
        +'<div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(215,190,226,.5),#9B59B6,rgba(215,190,226,.5),transparent)"></div>'
        +'<div style="display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;border-radius:50%;width:90px;height:90px;background:rgba(20,0,40,.9);border:1px solid rgba(155,89,182,.4);box-shadow:0 10px 40px rgba(155,89,182,.2);backdrop-filter:blur(12px)"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="rgba(215,190,226,.8)" stroke-width="1.2" stroke-linecap="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></div>'
        +'<p style="font-style:italic;line-height:2;color:rgba(215,190,226,.65);font-size:.95rem;font-family:\'Cormorant Garamond\',serif;margin-bottom:1.5rem">Hoy comienzas a escribir<br>el capítulo más hermoso<br>de tu historia.</p>'
        +'<div style="display:inline-block;margin-bottom:2rem;border-radius:6px;padding:.95rem 2.5rem;background:rgba(20,0,40,.9);border:1px solid rgba(155,89,182,.45);backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(155,89,182,.15)"><p style="font-family:\'Great Vibes\',cursive;font-size:2.4rem;color:#D7BDE2;filter:drop-shadow(0 1px 10px rgba(155,89,182,.5));margin:0">Con amor, Sofía</p></div>'
        +'<div style="padding-top:2rem;margin-top:2rem;border-top:1px solid rgba(155,89,182,.18)">'
        +'<div style="display:flex;justify-content:center;margin-bottom:1.5rem"><img src="https://hercules-cdn.com/file_pD423Fe199o8J0tu0OgVizvy" alt="Gueka Ideas" style="width:190px;filter:brightness(0) invert(1) opacity(0.82)"/></div>'
        +'<p style="font-size:.7rem;color:rgba(215,190,226,.45);max-width:300px;margin:0 auto;line-height:1.7;letter-spacing:.02em">Esta plantilla digital es propiedad exclusiva de <strong style="color:rgba(215,190,226,.7)">Gueka Ideas</strong>. Su uso está permitido únicamente para fines personales. Queda prohibida la reproducción, distribución, modificación o reventa total o parcial sin autorización escrita.</p>'
        +'<p style="margin-top:.875rem;font-size:.65rem;color:rgba(155,89,182,.35);letter-spacing:.1em;font-family:\'Cinzel\',serif">© '+year+' Gueka Ideas · Todos los derechos reservados</p>'
        +'</div></footer>';
    }

    // ── Render full invitation ────────────────────────────────────────────────────
    function renderInvitation() {
      var app = document.getElementById('app');
      var card = document.getElementById('card');
      app.style.padding = "2rem 1rem";
      card.innerHTML =
        '<div style="border-left:1px solid rgba(155,89,182,.18);border-right:1px solid rgba(155,89,182,.18);box-shadow:inset 4px 0 18px rgba(0,0,0,.3),inset -4px 0 18px rgba(0,0,0,.3)">'
        +renderHero()+purpleLine()+'</div>'
        +renderTicker()
        +'<div style="border-left:1px solid rgba(155,89,182,.18);border-right:1px solid rgba(155,89,182,.18)">'
        +purpleLine()+renderCountdown()
        +purpleLine()+renderDate()
        +purpleLine()+renderItinerary()
        +purpleLine()+renderGallery()
        +purpleLine()+renderLocation()
        +purpleLine()+renderGifts()
        +purpleLine()+renderDressCode()
        +purpleLine()+renderRsvp()
        +purpleLine()+renderFooter()
        +purpleLine()+'</div>';
      startCountdown();
      startGalleryAuto();
      initTimelineAnimation();
    }

    function openInvitation() {
      if (appOpen) return;
      appOpen = true;
      renderInvitation();
    }

    // ── Gallery ────────────────────────────────────────────────────────────────────
    function galleryGo(i) {
      galleryIdx = ((i % GALLERY.length) + GALLERY.length) % GALLERY.length;
      updateGallery();
    }
    function galleryNav(dir) {
      if (galleryAutoInterval) clearInterval(galleryAutoInterval);
      galleryIdx = ((galleryIdx + dir) % GALLERY.length + GALLERY.length) % GALLERY.length;
      updateGallery();
      startGalleryAuto();
    }
    function updateGallery() {
      var img=document.getElementById('gallery-main-img'), cap=document.getElementById('gallery-caption'), ctr=document.getElementById('gallery-counter'), prog=document.getElementById('gallery-progress');
      if(img) img.src=GALLERY[galleryIdx].url;
      if(cap) cap.textContent=GALLERY[galleryIdx].caption;
      if(ctr) ctr.textContent=(galleryIdx+1)+' / '+GALLERY.length;
      if(prog) prog.style.width=((galleryIdx+1)/GALLERY.length*100).toFixed(1)+'%';
      var lbImg=document.getElementById('lightbox-img'), lbCap=document.getElementById('lightbox-caption');
      if(lbImg) lbImg.src=GALLERY[galleryIdx].url;
      if(lbCap) lbCap.textContent=GALLERY[galleryIdx].caption;
      var thumbs=document.getElementById('gallery-thumbs');
      if(thumbs) Array.from(thumbs.children).forEach(function(btn,i){ btn.style.border=i===galleryIdx?'2.5px solid #9B59B6':'2px solid rgba(155,89,182,.2)'; btn.style.opacity=i===galleryIdx?'1':'0.5'; btn.style.boxShadow=i===galleryIdx?'0 0 14px rgba(155,89,182,.6)':'none'; });
      var dots=document.getElementById('gallery-dots');
      if(dots) Array.from(dots.children).forEach(function(btn,i){ btn.style.background=i===galleryIdx?'#9B59B6':'rgba(155,89,182,.25)'; btn.style.width=i===galleryIdx?'28px':'6px'; btn.style.boxShadow=i===galleryIdx?'0 0 8px rgba(155,89,182,.7)':'none'; });
    }
    function startGalleryAuto() {
      if (galleryAutoInterval) clearInterval(galleryAutoInterval);
      galleryAutoInterval = setInterval(function(){ galleryIdx=(galleryIdx+1)%GALLERY.length; updateGallery(); }, 4000);
    }
    function openLightbox() { var lb=document.getElementById('lightbox'); if(lb){ lb.style.display='flex'; lightboxOpen=true; } }
    function closeLightbox() { var lb=document.getElementById('lightbox'); if(lb){ lb.style.display='none'; lightboxOpen=false; } }

    // ── Timeline ──────────────────────────────────────────────────────────────────
    function initTimelineAnimation() {
      var spine=document.getElementById('timeline-spine');
      if(!spine) return;
      var obs=new IntersectionObserver(function(entries){ if(entries[0].isIntersecting){ spine.style.transform='translateX(-50%) scaleY(1)'; obs.disconnect(); } },{rootMargin:'-40px'});
      obs.observe(spine);
    }

    // ── Gift accordion ────────────────────────────────────────────────────────────
    function toggleGift(key) {
      var isOpen=openGift===key;
      if(openGift){ document.getElementById('gift-panel-'+openGift).style.display='none'; document.getElementById('chevron-'+openGift).style.transform='rotate(0deg)'; document.getElementById('gift-card-'+openGift).style.border='1px solid rgba(155,89,182,.2)'; document.getElementById('gift-card-'+openGift).style.boxShadow='none'; }
      if(!isOpen){ openGift=key; document.getElementById('gift-panel-'+key).style.display='block'; document.getElementById('chevron-'+key).style.transform='rotate(180deg)'; document.getElementById('gift-card-'+key).style.border='1px solid rgba(155,89,182,.55)'; document.getElementById('gift-card-'+key).style.boxShadow='0 14px 40px rgba(155,89,182,.2)'; }
      else openGift=null;
    }

    // ── QR generation ─────────────────────────────────────────────────────────────
    function generateQR(key, label) {
      var name=document.getElementById('gift-name-'+key).value||'Invitado';
      var amount=document.getElementById('gift-amount-'+key).value||'0';
      var data='PAGO '+label.toUpperCase()+' | '+name+' | COP '+amount;
      var container=document.getElementById('qr-'+key);
      container.innerHTML='';
      var qr=new QRCode(container,{ text:data, width:200, height:200, colorDark:'#1a0033', colorLight:'#D7BDE2', correctLevel:QRCode.CorrectLevel.M });
      setTimeout(function(){
        var el=container.querySelector('canvas,img');
        if(el){ el.style.borderRadius='6px'; el.style.border='2px solid rgba(155,89,182,.5)'; el.style.boxShadow='0 12px 40px rgba(155,89,182,.2)'; }
      }, 100);
    }

    // ── RSVP ──────────────────────────────────────────────────────────────────────
    function setAttendance(v) {
      rsvpAttendance=v;
      var yes=document.getElementById('btn-yes'), no=document.getElementById('btn-no');
      if(v==='yes'){ yes.style.border='1px solid #9B59B6'; yes.style.background='rgba(155,89,182,.2)'; yes.style.color='#D7BDE2'; yes.style.boxShadow='0 4px 20px rgba(155,89,182,.3)'; no.style.border='1px solid rgba(155,89,182,.2)'; no.style.background='rgba(155,89,182,.05)'; no.style.color='rgba(215,190,226,.4)'; no.style.boxShadow='none'; }
      else { no.style.border='1px solid #9B59B6'; no.style.background='rgba(155,89,182,.2)'; no.style.color='#D7BDE2'; no.style.boxShadow='0 4px 20px rgba(155,89,182,.3)'; yes.style.border='1px solid rgba(155,89,182,.2)'; yes.style.background='rgba(155,89,182,.05)'; yes.style.color='rgba(215,190,226,.4)'; yes.style.boxShadow='none'; }
    }
    function submitRsvp() {
      var name=document.getElementById('rsvp-name').value.trim();
      var errEl=document.getElementById('rsvp-error');
      if(!name){ errEl.textContent='Por favor ingresa tu nombre'; errEl.style.display='block'; return; }
      errEl.style.display='none';
      setTimeout(function(){ document.getElementById('rsvp-form').style.display='none'; document.getElementById('rsvp-thanks').style.display='block'; }, 300);
    }

    // ── Keyboard ──────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', function(e){
      if(!lightboxOpen) return;
      if(e.key==='Escape') closeLightbox();
      if(e.key==='ArrowLeft'){ galleryIdx=((galleryIdx-1)+GALLERY.length)%GALLERY.length; updateGallery(); }
      if(e.key==='ArrowRight'){ galleryIdx=(galleryIdx+1)%GALLERY.length; updateGallery(); }
    });

    // ── Init ──────────────────────────────────────────────────────────────────────
    document.getElementById('card').innerHTML = renderSplash();
  </script>
</body>
</html>
