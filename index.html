<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvett — Servicios</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --card-w: 200px;
      --card-h: 290px;
      --gap: 16px;
      --bg: #0a0a0a;
      --white: #ffffff;
      --accent: #c8ff00;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
      min-height: 250vh; /* Espacio para scroll */
    }

    /* ─ FONDO ANIMADO ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(200, 255, 0, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── TEXTO DE FONDO ── */
    .bg-brand {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(50px, 9vw, 130px);
      font-weight: 900;
      color: rgba(255, 255, 255, 0.025);
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      text-transform: uppercase;
      letter-spacing: 8px;
      user-select: none;
    }

    /* ── CONTENEDOR PRINCIPAL ── */
    .main-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 120px 20px 100px;
    }

    /* ── HEADER ── */
    .section-header {
      text-align: center;
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .section-header h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, #aaa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-header .explore-link {
      display: inline-block;
      font-size: clamp(16px, 2.5vw, 20px);
      color: #555;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .section-header .explore-link::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: #555;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  background 0.3s;
    }

    .section-header .explore-link:hover {
      color: #fff;
    }

    .section-header .explore-link:hover::after {
      transform: scaleX(1);
      transform-origin: left;
      background: #fff;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── ETAPA DE TARJETAS ── */
    .cards-stage {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: var(--card-h);
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1400px;
    }

    /* ── TARJETAS ─ */
    .card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      background: #fff;
      color: #111;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 36px 22px;
      cursor: pointer;
      will-change: transform, opacity;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      transition: box-shadow 0.4s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #c8ff00, #00d4ff);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .card .card-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      position: relative;
    }

    .card .card-icon::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 255, 0, 0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .card-icon::after {
      opacity: 1;
    }

    .card .card-icon svg {
      width: 44px;
      height: 44px;
      position: relative;
      z-index: 1;
    }

    .card .card-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    /* ── TARJETA CENTRAL DESTACADA ── */
    .card.center-highlight {
      z-index: 10;
    }

    .card.center-highlight .card-icon {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8ff00 0%, #00d4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(200, 255, 0, 0.3);
      animation: glowPulse 3s ease-in-out infinite;
    }

    .card.center-highlight .card-icon svg {
      width: 38px;
      height: 38px;
    }

    .card.center-highlight .card-icon::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(200, 255, 0, 0.3);
      animation: ringPulse 3s ease-in-out infinite;
    }

    .card.center-highlight .card-title {
      color: #c8ff00;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(200, 255, 0, 0.3); }
      50% { box-shadow: 0 0 50px rgba(200, 255, 0, 0.5); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.5; }
    }

    /* ── INDICADOR DE PROGRESO ── */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #c8ff00, #00d4ff);
      z-index: 1000;
      transition: width 0.1s linear;
    }

    /* ── HINT ── */
    .scroll-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      color: #555;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.4s, transform 0.4s;
    }

    .scroll-hint .arrow {
      width: 20px;
      height: 30px;
      border: 2px solid #555;
      border-radius: 10px;
      position: relative;
      animation: scrollBounce 2s ease-in-out infinite;
    }

    .scroll-hint .arrow::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 8px;
      background: #555;
      border-radius: 2px;
      animation: dotBounce 2s ease-in-out infinite;
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    @keyframes dotBounce {
      0%, 100% { opacity: 1; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.3; transform: translateX(-50%) translateY(10px); }
    }

    .scroll-hint.hidden {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }

    /* ── PLUS BUTTON ── */
    .plus-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: transparent;
      color: #555;
      border: 2px solid #333;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
      position: relative;
    }

    .plus-btn:hover {
      color: #c8ff00;
      border-color: #c8ff00;
      transform: rotate(90deg) scale(1.1);
      box-shadow: 0 0 25px rgba(200, 255, 0, 0.2);
    }

    .plus-btn:active {
      transform: rotate(90deg) scale(0.95);
    }

    /* ── SCROLL TO TOP ── */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 100;
    }

    .scroll-top.show {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: rgba(200, 255, 0, 0.15);
      border-color: #c8ff00;
      color: #c8ff00;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      :root {
        --card-w: 155px;
        --card-h: 230px;
      }
      .card {
        padding: 24px 14px;
        border-radius: 16px;
      }
      .card .card-icon {
        width: 46px;
        height: 46px;
      }
      .card .card-icon svg {
        width: 32px;
        height: 32px;
      }
      .card .card-title {
        font-size: 13px;
      }
      .card.center-highlight .card-icon {
        width: 52px;
        height: 52px;
      }
      .card.center-highlight .card-icon svg {
        width: 28px;
        height: 28px;
      }
      .main-container {
        padding: 80px 10px 60px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --card-w: 140px;
        --card-h: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- FONDO -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-brand">Experiencia Velvett</div>

  <!-- BARRA DE PROGRESO -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="main-container">

    <!-- HEADER -->
    <div class="section-header">
      <h1>Servicios</h1>
      <a class="explore-link">Explora</a>
    </div>

    <!-- ETAPA DE TARJETAS -->
    <div class="cards-stage" id="cardsStage">

      <!-- Card 1 -->
      <div class="card" data-index="0">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="24" y1="4" x2="24" y2="44"/>
            <line x1="4" y1="24" x2="44" y2="24"/>
            <line x1="8" y1="8" x2="40" y2="40"/>
            <line x1="40" y1="8" x2="8" y2="40"/>
          </svg>
        </div>
        <div class="card-title">Formación<br>Profesional</div>
      </div>

      <!-- Card 2 -->
      <div class="card" data-index="1">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
            <circle cx="24" cy="24" r="18"/>
            <path d="M24 6 C24 6, 6 24, 24 24 C24 24, 42 24, 24 42" fill="#111"/>
            <path d="M24 6 C24 6, 42 24, 24 24 C24 24, 6 24, 24 42" stroke="#111" fill="none"/>
          </svg>
        </div>
        <div class="card-title">Excelencia<br>Comprobada</div>
      </div>

      <!-- Card 3 (CENTRO) -->
      <div class="card center-highlight" data-index="2">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
            <rect x="6" y="6" width="22" height="22" rx="2"/>
            <rect x="20" y="20" width="22" height="22" rx="2"/>
          </svg>
        </div>
        <div class="card-title">Comunidad<br>Exclusiva</div>
      </div>

      <!-- Card 4 -->
      <div class="card" data-index="3">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 4 L42 14 L42 34 L24 44 L6 34 L6 14 Z"/>
            <line x1="24" y1="4" x2="24" y2="44"/>
            <line x1="6" y1="14" x2="24" y2="24"/>
            <line x1="42" y1="14" x2="24" y2="24"/>
          </svg>
        </div>
        <div class="card-title">Excelencia<br>Comprobada</div>
      </div>

      <!-- Card 5 -->
      <div class="card" data-index="4">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
            <circle cx="24" cy="24" r="18"/>
            <path d="M24 6 A18 18 0 0 1 42 24 L24 24 Z" fill="#111"/>
            <rect x="21" y="21" width="6" height="6" fill="#111"/>
          </svg>
        </div>
        <div class="card-title">Ingresos<br>Extraordinarios</div>
      </div>

    </div>

    <!-- HINT -->
    <div class="scroll-hint" id="scrollHint">
      <div class="arrow"></div>
      Desliza para desplegar
    </div>

    <!-- PLUS -->
    <button class="plus-btn" id="plusBtn">+</button>

  </div>

  <!-- SCROLL TO TOP -->
  <button class="scroll-top" id="scrollTop">↑</button>

  <script>
    const cards = document.querySelectorAll('.card');
    const stage = document.getElementById('cardsStage');
    const scrollHint = document.getElementById('scrollHint');
    const scrollProgress = document.getElementById('scrollProgress');
    const scrollTopBtn = document.getElementById('scrollTop');

    const totalCards = cards.length;
    const cardW = 200;
    const gap = 16;
    const step = cardW + gap;

    // ── EASING FUNCTIONS ──
    const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    const easeOutBack = t => {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    };
    const easeInOutQuart = t => t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;

    // ── CALCULATE SPREAD POSITIONS ──
    function getFinalX(i) {
      return (i - Math.floor(totalCards / 2)) * step;
    }

    // ── INIT: STACKED DECK ──
    function initCards() {
      cards.forEach((card, i) => {
        const fanAngle = (i - Math.floor(totalCards / 2)) * 8;
        const stackY = i * -4;
        const stackX = (i - Math.floor(totalCards / 2)) * 6;
        const scale = 0.92 - Math.abs(i - Math.floor(totalCards / 2)) * 0.03;

        card.style.transform = `translate(${stackX}px, ${stackY}px) rotate(${fanAngle}deg) scale(${scale})`;
        card.style.opacity = 0.6 + (1 - Math.abs(i - Math.floor(totalCards / 2)) / totalCards) * 0.4;
        card.style.zIndex = i;
      });
    }

    // ── SCROLL-DRIVEN ANIMATION ──
    function onScroll() {
      const scrollY = window.scrollY;
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      const rawProgress = Math.min(scrollY / (docH * 0.5), 1);
      const progress = easeOutExpo(rawProgress);

      // Progress bar
      scrollProgress.style.width = (progress * 100) + '%';

      cards.forEach((card, i) => {
        // Start position (stacked)
        const fanAngle = (i - Math.floor(totalCards / 2)) * 8;
        const stackY = i * -4;
        const stackX = (i - Math.floor(totalCards / 2)) * 6;
        const startScale = 0.92 - Math.abs(i - Math.floor(totalCards / 2)) * 0.03;

        // End position (spread)
        const endX = getFinalX(i);
        const endAngle = 0;
        const endScale = 1;

        // Interpolate with slight per-card delay
        const cardDelay = 0.08 * i;
        const cardProgress = Math.max(0, Math.min(1, (progress - cardDelay) / (1 - cardDelay)));
        const easedProgress = easeOutBack(cardProgress);

        const currentX = stackX + (endX - stackX) * easedProgress;
        const currentY = stackY * (1 - easedProgress);
        const currentAngle = fanAngle * (1 - easedProgress);
        const currentScale = startScale + (endScale - startScale) * easedProgress;
        const currentOpacity = 0.4 + 0.6 * easedProgress;

        // Add subtle parallax: odd cards move slightly more up
        const parallaxY = (i % 2 === 0 ? -1 : 1) * 15 * (1 - easedProgress);

        card.style.transform = `translate(${currentX}px, ${currentY + parallaxY}px) rotate(${currentAngle}deg) scale(${currentScale})`;
        card.style.opacity = currentOpacity;
        card.style.zIndex = 2 + Math.abs(i - Math.floor(totalCards / 2));

        // Hide hint
        if (progress > 0.6) {
          scrollHint.classList.add('hidden');
        } else {
          scrollHint.classList.remove('hidden');
        }
      });
    }

    // ── HOVER: SUBTLE LIFT ON SPREAD CARDS ──
    let isSpread = false;
    cards.forEach(card => {
      card.addEventListener('mouseenter', () => {
        if (isSpread) {
          const currentTransform = card.style.transform;
          card.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
          card.style.transform = currentTransform.replace(/scale\([^)]+\)/, 'scale(1.06)') + ' translateY(-8px)';
        }
      });
      card.addEventListener('mouseleave', () => {
        if (isSpread) {
          card.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
          const i = parseInt(card.dataset.index);
          const endX = getFinalX(i);
          card.style.transform = `translate(${endX}px, 0px) rotate(0deg) scale(1)`;
        }
      });
    });

    // Check if cards are spread
    window.addEventListener('scroll', () => {
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      const progress = window.scrollY / (docH * 0.5);
      isSpread = progress > 0.5;
    });

    // ── SCROLL TO TOP ──
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('show', window.scrollY > 150);
      onScroll();
    });

    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ── PLUS BUTTON ──
    const plusBtn = document.getElementById('plusBtn');
    let extraIndex = 0;
    const extraNames = ['Mentoría 1-a-1', 'Networking VIP', 'Certificación'];

    plusBtn.addEventListener('click', () => {
      const name = extraNames[extraIndex % extraNames.length] || 'Nuevo Servicio';
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-index', totalCards + extraIndex);
      card.innerHTML = `
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
            <circle cx="24" cy="24" r="16"/>
            <line x1="16" y1="24" x2="32" y2="24"/>
            <line x1="24" y1="16" x2="24" y2="32"/>
          </svg>
        </div>
        <div class="card-title">${name}</div>
      `;
      card.style.transform = 'translate(0, 0) rotate(0deg) scale(0.3)';
      card.style.opacity = '0';
      stage.appendChild(card);

      requestAnimationFrame(() => {
        card.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
        card.style.transform = 'translate(0, -10px) rotate(0deg) scale(1)';
        card.style.opacity = '1';
      });

      setTimeout(() => {
        card.style.transition = '';
      }, 700);

      extraIndex++;
    });

    // ── INIT ──
    window.addEventListener('DOMContentLoaded', () => {
      initCards();
      onScroll();
    });

    // ── RESIZE HANDLER ──
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        onScroll();
      }, 100);
    });
  </script>
</body>
</html>
