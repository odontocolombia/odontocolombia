<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvett Agency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* ESPACIO INICIAL */
        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* BLOQUE 1: TEXTO VELVETT AGENCY */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #0a0a0a;
            position: sticky;
            top: 0;
        }

        .text-line {
            font-size: 11.2vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform;
        }

        .char {
            display: inline-block;
            will-change: transform, opacity;
        }

        .line-right {
            text-align: right;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* BLOQUE 2: GALERÍA 2 IMÁGENES FULL WIDTH */
        .gallery-section {
            background-color: #0a0a0a;
            position: relative;
        }

        .project-card {
            position: relative;
            width: 100%;
            height: 75vh;
            overflow: hidden;
        }

        .project-image {
            width: 100%;
            height: 130%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }

        /* BLOQUE 3: ESPACIO NEGRO PARA FUTURO TERCER BLOQUE */
        .block-spacer {
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
        }

        /* BLOQUE 4: TEXTO TRABAJA MODELO WEBCAM */
        .final-text-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #0a0a0a;
            position: sticky;
            top: 0;
        }

        /* BLOQUE 5: FOOTER NEGRO */
        .footer-spacer {
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .text-line {
                font-size: 13vw;
            }
            .project-card {
                height: 60vh;
            }
        }
    </style>
</head>
<body>

    <!-- BLOQUE 1: VELVETT AGENCY -->
    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <section class="hero-section" id="heroSection">
        <div class="text-line line-center" id="line1">VELVETT</div>
        <div class="text-line line-right" id="line2">AGENCY</div>
        <div class="scroll-hint">SCROLL</div>
    </section>

    <!-- BLOQUE 2: 2 IMÁGENES FULL WIDTH CON PARALLAX -->
    <section class="gallery-section">
        <!-- Project 1 -->
        <div class="project-card" data-speed="0.08">
            <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1920&q=80" alt="Project 1" class="project-image">
        </div>
        <!-- Project 2 - Imagen colorida -->
        <div class="project-card" data-speed="0.1">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=1920&q=80" alt="Project 2" class="project-image">
        </div>
    </section>

    <!-- BLOQUE 3: ESPACIO NEGRO -->
    <div class="block-spacer">
        <p>· · ·</p>
    </div>

    <!-- BLOQUE 4: TRABAJA MODELO WEBCAM -->
    <section class="final-text-section" id="finalSection">
        <div class="text-line line-center" id="line3">TRABAJA</div>
        <div class="text-line line-right" id="line4">MODELO WEBCAM</div>
    </section>

    <!-- BLOQUE 5: FOOTER NEGRO -->
    <div class="footer-spacer">
        <p>Velvett Agency</p>
    </div>

    <script>
        // FUNCIÓN PARA SEPARAR LETRAS
        function splitText(line) {
            const text = line.innerText;
            line.innerHTML = '';
            
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.classList.add('char');
                span.dataset.index = index;
                line.appendChild(span);
            });
        }

        // INICIALIZAR TODOS LOS TEXTOS
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');
        const line3 = document.getElementById('line3');
        const line4 = document.getElementById('line4');

        splitText(line1);
        splitText(line2);
        splitText(line3);
        splitText(line4);

        const chars1 = line1.querySelectorAll('.char');
        const chars2 = line2.querySelectorAll('.char');
        const chars3 = line3.querySelectorAll('.char');
        const chars4 = line4.querySelectorAll('.char');

        const heroSection = document.getElementById('heroSection');
        const finalSection = document.getElementById('finalSection');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            // ==========================================
            // BLOQUE 1: VELVETT AGENCY
            // Entrada → Hold → Salida (se va a los lados)
            // ==========================================
            const heroTop = heroSection.offsetTop;
            const heroProgress = Math.min(1, Math.max(0, (scrollY - heroTop + windowHeight) / (windowHeight * 1.8)));
            
            // Entrada (0 - 0.25)
            const heroEnter = Math.min(1, heroProgress / 0.25);
            
            // Hold (0.25 - 0.45) - letras estáticas
            const holdProgress = heroProgress;
            
            // Salida (0.45 - 1.0) - letras se van a los lados y desaparecen
            const heroExit = Math.min(1, Math.max(0, (heroProgress - 0.45) / 0.55));
            const easedExit = easeInCubic(heroExit);

            if (heroProgress <= 0.25) {
                // Entrada: letras vienen desde los lados
                animateEnter(chars1, chars2, easeOutCubic(heroEnter));
            } else if (heroProgress > 0.45) {
                // Salida: letras se van a los lados y desaparecen
                animateExit(chars1, chars2, easedExit);
            } else {
                // Hold: letras estáticas en el centro
                animateHold(chars1, chars2);
            }

            // ==========================================
            // BLOQUE 2: PARALLAX DE IMÁGENES
            // ==========================================
            const images = document.querySelectorAll('.project-card');
            
            images.forEach((card) => {
                const rect = card.getBoundingClientRect();
                const img = card.querySelector('.project-image');
                const speed = parseFloat(card.dataset.speed) || 0.08;
                
                if (rect.top < windowHeight && rect.bottom > 0) {
                    const scrollProgress = (windowHeight - rect.top) / (windowHeight + rect.height);
                    const parallaxOffset = scrollProgress * 120 * speed;
                    img.style.transform = `translateY(${parallaxOffset}px)`;
                }
            });

            // ==========================================
            // BLOQUE 4: TRABAJA MODELO WEBCAM
            // Entra desde los lados como el primero
            // ==========================================
            const finalTop = finalSection.offsetTop;
            const finalProgress = Math.min(1, Math.max(0, (scrollY - finalTop + windowHeight) / (windowHeight * 0.8)));
            const easedFinal = easeOutCubic(finalProgress);

            animateEnter(chars3, chars4, easedFinal);
        });

        // Función: Letras entran desde los lados hacia el centro
        function animateEnter(charsLeft, charsRight, progress) {
            charsLeft.forEach((char, index) => {
                const startX = -80 - (index * 25);
                const currentX = startX * (1 - progress);
                const scale = 0.5 + (progress * 0.5);
                
                char.style.transform = `translateX(${currentX}px) scale(${scale})`;
                char.style.opacity = progress;
            });

            charsRight.forEach((char, index) => {
                const startX = 80 + (index * 25);
                const currentX = startX * (1 - progress);
                const scale = 0.5 + (progress * 0.5);
                
                char.style.transform = `translateX(${currentX}px) scale(${scale})`;
                char.style.opacity = progress;
            });
        }

        // Función: Letras se van a los lados y desaparecen
        function animateExit(charsLeft, charsRight, progress) {
            charsLeft.forEach((char, index) => {
                // Se van hacia la izquierda
                const endX = -80 - (index * 25);
                const currentX = endX * progress;
                const opacity = 1 - progress;
                
                char.style.transform = `translateX(${currentX}px) scale(1)`;
                char.style.opacity = opacity;
            });

            charsRight.forEach((char, index) => {
                // Se van hacia la derecha
                const endX = 80 + (index * 25);
                const currentX = endX * progress;
                const opacity = 1 - progress;
                
                char.style.transform = `translateX(${currentX}px) scale(1)`;
                char.style.opacity = opacity;
            });
        }

        // Función: Letras estáticas en el centro
        function animateHold(charsLeft, charsRight) {
            [...charsLeft, ...charsRight].forEach(char => {
                char.style.transform = `translateX(0px) scale(1)`;
                char.style.opacity = 1;
            });
        }

        // Easing functions
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInCubic(t) {
            return t * t * t;
        }

        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
