<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Editor Multi-Plantillas de Bautizo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e2e; color: #e4e4e7; overflow: hidden; height: 100vh; }

.editor-layout { display: grid; grid-template-columns: 260px 1fr 400px; height: 100vh; }

/* Sidebar Izquierdo */
.sidebar-left { background: #252537; border-right: 1px solid #3a3a52; overflow-y: auto; padding: 20px 0; }
.editor-logo { padding: 0 20px 20px; border-bottom: 1px solid #3a3a52; margin-bottom: 15px; }
.editor-logo h1 { font-size: 1rem; color: #d4af37; display: flex; align-items: center; gap: 8px; }
.editor-logo p { font-size: 0.7rem; color: #888; margin-top: 4px; }

.template-selector { padding: 15px 20px; margin-bottom: 10px; }
.template-selector label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.template-select { width: 100%; padding: 8px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 6px; color: #e4e4e7; font-size: 0.85rem; }

.section-list { list-style: none; padding: 0 10px; }
.section-item { padding: 10px 15px; margin: 2px 0; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 8px; border-radius: 0 4px 4px 0; }
.section-item:hover { background: #2d2d44; color: #fff; }
.section-item.active { background: #2d2d44; border-left-color: #d4af37; color: #d4af37; }
.section-item .icon { font-size: 0.9rem; }

/* Preview Central */
.preview-center { background: #2a2a3e; overflow: auto; padding: 30px; display: flex; justify-content: center; align-items: flex-start; }
.preview-frame-wrap { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
#cardPreview { width: 420px; height: 900px; border: none; transform-origin: top left; }

/* Sidebar Derecho */
.sidebar-right { background: #252537; border-left: 1px solid #3a3a52; display: flex; flex-direction: column; overflow: hidden; }
.editor-header { padding: 18px 20px; border-bottom: 1px solid #3a3a52; background: #2a2a42; }
.editor-header h2 { font-size: 0.95rem; color: #d4af37; margin-bottom: 4px; }
.editor-header p { font-size: 0.7rem; color: #888; }
.editor-body { flex: 1; overflow-y: auto; padding: 20px; }

.field-group { margin-bottom: 16px; }
.field-label { display: block; font-size: 0.75rem; color: #a0a0b8; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input, .field-textarea, .field-select { width: 100%; padding: 8px 10px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 6px; color: #e4e4e7; font-size: 0.85rem; transition: all 0.2s; font-family: inherit; }
.field-input:focus, .field-textarea:focus, .field-select:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 0 2px rgba(212,175,55,0.15); }
.field-textarea { resize: vertical; min-height: 60px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.color-field { display: flex; align-items: center; gap: 8px; }
.color-field input[type="color"] { width: 36px; height: 32px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
.color-hex { flex: 1; padding: 8px 10px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 4px; color: #e4e4e7; font-size: 0.8rem; font-family: monospace; }

.field-divider { height: 1px; background: #3a3a52; margin: 18px 0; }
.field-section-title { font-size: 0.75rem; color: #d4af37; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #3a3a52; }

.image-upload { border: 2px dashed #3a3a52; border-radius: 6px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
.image-upload:hover { border-color: #d4af37; background: rgba(212,175,55,0.05); }
.image-upload input { display: none; }
.image-upload .icon { font-size: 1.5rem; margin-bottom: 6px; }
.image-upload .text { font-size: 0.78rem; color: #888; }

/* Toolbar */
.top-bar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #1a1a2a; border-bottom: 1px solid #3a3a52; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
.top-bar .title { font-size: 0.85rem; color: #d4af37; font-weight: 600; }
.top-bar .actions { display: flex; gap: 8px; }
.btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: #d4af37; color: #1a1a2a; }
.btn-primary:hover { background: #e6c04a; transform: translateY(-1px); }
.btn-secondary { background: #3a3a52; color: #e4e4e7; }
.btn-secondary:hover { background: #4a4a62; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }

.editor-layout { margin-top: 50px; height: calc(100vh - 50px); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e1e2e; }
::-webkit-scrollbar-thumb { background: #3a3a52; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a62; }

@media (max-width: 1200px) {
  .editor-layout { grid-template-columns: 220px 1fr 350px; }
}
</style>

// ═══════════════════════════════════════════════
// FUNCIONES PRINCIPALES
// ═══════════════════════════════════════════════

function changeTemplate() {
  currentTemplate = document.getElementById('templateSelect').value;
  currentSection = Object.keys(sectionsConfig[currentTemplate])[0];
  renderSectionList();
  renderEditor();
  renderCard();
}

function renderSectionList() {
  const list = document.getElementById('sectionList');
  const sections = sectionsConfig[currentTemplate];
  list.innerHTML = Object.keys(sections).map(key => `
    <li class="section-item ${key === currentSection ? 'active' : ''}" data-section="${key}">
      <span class="icon">📝</span> ${sections[key].title}
    </li>
  `).join('');
  
  list.onclick = (e) => {
    const item = e.target.closest('.section-item');
    if (!item) return;
    document.querySelectorAll('.section-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentSection = item.dataset.section;
    renderEditor();
  };
}

function renderEditor() {
  const section = sectionsConfig[currentTemplate][currentSection];
  const data = templates[currentTemplate].data;
  const colors = templates[currentTemplate].colors;
  
  document.getElementById('editorTitle').textContent = section.title;
  document.getElementById('editorDesc').textContent = section.desc;
  
  const body = document.getElementById('editorBody');
  let html = '';
  
  section.fields.forEach((field, idx) => {
    let value;
    if (field.key.startsWith('colors.')) {
      value = colors[field.key.split('.')[1]];
    } else if (field.index !== undefined) {
      value = data[field.key][field.index];
    } else {
      value = data[field.key];
    }
    
    const fieldId = `field_${field.key.replace(/\./g, '_')}_${field.index !== undefined ? field.index : idx}`;
    
    html += `<div class="field-group">`;
    html += `<label class="field-label">${field.label}</label>`;
    
    if (field.type === 'text' || field.type === 'datetime-local') {
      html += `<input type="${field.type}" class="field-input" value="${escapeHtml(value)}" data-key="${field.key}" data-index="${field.index !== undefined ? field.index : ''}" onchange="updateField(this)">`;
    } else if (field.type === 'textarea') {
      html += `<textarea class="field-textarea" data-key="${field.key}" data-index="${field.index !== undefined ? field.index : ''}" onchange="updateField(this)">${escapeHtml(value)}</textarea>`;
    } else if (field.type === 'select') {
      html += `<select class="field-select" data-key="${field.key}" data-index="${field.index !== undefined ? field.index : ''}" onchange="updateField(this)">`;
      field.options.forEach(opt => {
        html += `<option value="${opt}" ${opt === value ? 'selected' : ''}>${opt}</option>`;
      });
      html += `</select>`;
    } else if (field.type === 'color') {
      html += `<div class="color-field">
        <input type="color" value="${value}" data-key="${field.key}" onchange="updateColor(this)">
        <input type="text" class="color-hex" value="${value}" readonly>
      </div>`;
    } else if (field.type === 'gallery') {
      html += `<div class="image-upload" onclick="document.getElementById('${fieldId}_file').click()">
        <input type="file" id="${fieldId}_file" accept="image/*" multiple onchange="handleGalleryUpload(this)">
        <div class="icon">🖼️</div>
        <div class="text">Subir imágenes</div>
      </div>`;
      value.forEach((img, i) => {
        html += `<div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
          <img src="${img}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;">
          <input type="text" class="field-input" value="${escapeHtml(img)}" style="flex:1;font-size:0.75rem;" data-key="${field.key}" data-index="${i}" onchange="updateField(this)">
          <button class="btn btn-secondary" style="padding:2px 6px;font-size:0.7rem;" onclick="removeGalleryImage('${field.key}',${i})">✕</button>
        </div>`;
      });
    }
    
    html += `</div>`;
  });
  
  body.innerHTML = html;
}

function updateField(el) {
  const key = el.dataset.key;
  const index = el.dataset.index;
  const value = el.value;
  const data = templates[currentTemplate].data;
  
  if (index !== '' && index !== undefined) {
    data[key][parseInt(index)] = value;
  } else {
    data[key] = value;
  }
  
  if (key === 'eventDateISO') autoUpdateDateFields(value);
  renderCard();
}

function updateColor(el) {
  const key = el.dataset.key;
  templates[currentTemplate].colors[key] = el.value;
  el.parentElement.querySelector('.color-hex').value = el.value;
  renderCard();
}

function handleGalleryUpload(input) {
  if (input.files) {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = templates[currentTemplate].data;
        if (!data.galleryImages) data.galleryImages = [];
        data.galleryImages.push(e.target.result);
        renderEditor();
        renderCard();
      };
      reader.readAsDataURL(file);
    });
  }
}

function removeGalleryImage(key, index) {
  templates[currentTemplate].data[key].splice(index, 1);
  renderEditor();
  renderCard();
}

function autoUpdateDateFields(isoStr) {
  if (!isoStr) return;
  const d = new Date(isoStr);
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const data = templates[currentTemplate].data;
  
  if (currentTemplate === 'blue') {
    data.dayName = days[d.getDay()];
    data.dayNumber = String(d.getDate()).padStart(2, '0');
    data.monthName = months[d.getMonth()];
    let hours = d.getHours();
    data.timeAmPm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    data.timeValue = `${String(hours).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } else {
    data.dateDay = days[d.getDay()];
    data.dateNumber = String(d.getDate()).padStart(2, '0');
    data.dateMonth = months[d.getMonth()];
  }
  renderEditor();
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// RENDERIZADO DE TARJETAS

function renderCard() {
  const t = templates[currentTemplate];
  const d = t.data;
  const c = t.colors;
  
  let html = '';
  
  if (currentTemplate === 'blue') {
    html = renderBlueTemplate(d, c);
  } else if (currentTemplate === 'pink') {
    html = renderPinkTemplate(d, c);
  } else {
    html = renderGoldTemplate(d, c);
  }
  
  document.getElementById('cardPreview').srcdoc = html;
}

.church-name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--brown);letter-spacing:2px;text-transform:uppercase;line-height:1.6}
.godparents-section{text-align:center;margin:40px 0;opacity:0}

.buttons-section{display:flex;flex-direction:column;gap:15px;align-items:center;margin:40px 0;opacity:0}
.buttons-section.visible{animation:fadeIn 1s ease 1.7s forwards}
.gold-button{padding:12px 30px;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));color:var(--white);border:none;border-radius:25px;font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(212,175,55,0.4);position:relative;overflow:hidden;text-decoration:none;display:inline-block}
.gold-button::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);transition:left 0.5s ease}
.gold-button:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(212,175,55,0.6)}
.gold-button:hover::before{left:100%}
.bottom-decoration{display:flex;justify-content:space-between;align-items:flex-end;margin:40px 0 20px;opacity:0}
.bottom-decoration.visible{animation:fadeIn 1s ease 1.9s forwards}
.angel-figure{width:100px;height:120px;animation:angelBounce 3s ease-in-out infinite}
@keyframes angelBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.chalice-figure{width:80px;height:100px;animation:chaliceGlow 2s ease-in-out infinite}

.waiting-text{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--blue-dark);text-align:center;margin:20px 0;opacity:0}
.waiting-text.visible{animation:fadeIn 1s ease 2.1s forwards}
.countdown-section{text-align:center;margin:40px 0;padding:30px;background:var(--blue-soft);border-radius:20px;border:2px solid var(--gold);opacity:0}
.countdown-section.visible{animation:fadeIn 1s ease 2.3s forwards}
.countdown-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:4px;color:var(--gold-dark);margin-bottom:20px;text-transform:uppercase}
.countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.countdown-item{background:var(--white);border:2px solid var(--gold-light);border-radius:10px;padding:15px 10px;transition:transform 0.3s ease,box-shadow 0.3s ease}
.countdown-item:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(212,175,55,0.3)}
.countdown-number{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--blue-dark);display:block}
.countdown-label{font-family:'Cormorant Garamond',serif;font-size:0.85rem;color:var(--brown);text-transform:uppercase;letter-spacing:2px}
.gallery-section{margin:40px 0;opacity:0}

.gallery-title{font-family:'Cinzel',serif;font-size:1.2rem;letter-spacing:4px;color:var(--gold-dark);text-align:center;margin-bottom:25px;text-transform:uppercase}
.carousel-wrap{position:relative;border:3px solid var(--gold);border-radius:10px;overflow:hidden;background:var(--white)}
.carousel-track{display:flex;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}
.carousel-slide{min-width:100%;position:relative;aspect-ratio:4/3}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:var(--gold);border:2px solid var(--white);color:var(--white);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:all 0.3s ease;font-size:1.2rem}
.carousel-btn:hover{background:var(--gold-dark);transform:translateY(-50%) scale(1.1)}
.carousel-prev{left:10px}
.carousel-next{right:10px}
.carousel-dots{display:flex;justify-content:center;gap:8px;padding:15px;background:var(--blue-soft)}
.carousel-dot{width:10px;height:10px;border-radius:50%;background:var(--blue-light);cursor:pointer;transition:all 0.3s ease;border:2px solid transparent}
.carousel-dot.active{background:var(--gold);transform:scale(1.3);border-color:var(--gold-dark)}
.map-section{margin:40px 0;opacity:0}
.map-section.visible{animation:fadeIn 1s ease 2.7s forwards}

<script>
const splash=document.getElementById('splash');splash.addEventListener('click',()=>{splash.classList.add('hide');setTimeout(()=>{splash.style.display='none';revealInvitation()},1500)});
function revealInvitation(){const inv=document.getElementById('invitation');inv.classList.add('visible');const secs=['.photo-frame-section','.text-intro','.text-title','.text-subtitle','.ribbon-container','.cross-section','.datetime-section','.church-section','.godparents-section','.buttons-section','.bottom-decoration','.waiting-text','.countdown-section','.gallery-section','.map-section','.rsvp-section','.footer'];secs.forEach((sel,i)=>{setTimeout(()=>{document.querySelectorAll(sel).forEach(el=>el.classList.add('visible'))},200+i*200)})}
const eventDate=new Date('${d.eventDateISO}').getTime();function updateCountdown(){const now=new Date().getTime();const distance=eventDate-now;if(distance<0)return;const days=Math.floor(distance/(1000*60*60*24));const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((distance%(1000*60*60))/(1000*60));const seconds=Math.floor((distance%(1000*60))/1000);document.getElementById('days').textContent=String(days).padStart(2,'0');document.getElementById('hours').textContent=String(hours).padStart(2,'0');document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');document.getElementById('seconds').textContent=String(seconds).padStart(2,'0')}updateCountdown();setInterval(updateCountdown,1000);
let carouselIdx=0;const totalSlides=${d.galleryImages.length};function updateCarousel(){const track=document.getElementById('carousel-track');if(track)track.style.transform='translateX(-'+(carouselIdx*100)+'%)';document.querySelectorAll('.carousel-dot').forEach((dot,i)=>{dot.classList.toggle('active',i===carouselIdx)})}function moveCarousel(dir){carouselIdx=(carouselIdx+dir+totalSlides)%totalSlides;updateCarousel()}function goToCarousel(idx){carouselIdx=idx;updateCarousel()}
function handleRSVP(e){e.preventDefault();const name=document.getElementById('rsvp-name').value.trim();const guests=document.getElementById('rsvp-guests').value.trim();const message=document.getElementById('rsvp-message').value.trim();if(!name){alert('Por favor ingresa tu nombre');return}const whatsappNumber='${d.whatsappNumber}';const text='Hola, soy '+name+'. Confirmo mi asistencia al Bautizo de ${escapeHtml(d.ribbonName)}'+(guests?' con '+guests+' invitado(s)':'')+'.'+(message?' '+message:'');window.open('https://wa.me/'+whatsappNumber+'?text='+encodeURIComponent(text),'_blank')}
const canvas=document.getElementById('gold-canvas');const ctx=canvas.getContext('2d');let particles=[];function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resizeCanvas();window.addEventListener('resize',resizeCanvas);class Particle{constructor(){this.reset()}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.3;this.speedY=(Math.random()-0.5)*0.3;this.opacity=Math.random()*0.3+0.1;this.fadeSpeed=Math.random()*0.01+0.005;this.growing=Math.random()>0.5}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.growing){this.opacity+=this.fadeSpeed;if(this.opacity>=0.4)this.growing=false}else{this.opacity-=this.fadeSpeed;if(this.opacity<=0.1)this.growing=true}if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset()}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle='rgba(212, 175, 55, '+this.opacity+')';ctx.fill()}}for(let i=0;i<30;i++)particles.push(new Particle());function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animateParticles)}animateParticles();
<\/script></body></html>`;
}

const eventDate=new Date('${d.eventDateISO}').getTime();function updateCountdown(){const now=new Date().getTime();const distance=eventDate-now;if(distance<0)return;const days=Math.floor(distance/(1000*60*60*24));const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((distance%(1000*60*60))/(1000*60));const seconds=Math.floor((distance%(1000*60))/1000);document.getElementById('days').textContent=String(days).padStart(2,'0');document.getElementById('hours').textContent=String(hours).padStart(2,'0');document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');document.getElementById('seconds').textContent=String(seconds).padStart(2,'0')}updateCountdown();setInterval(updateCountdown,1000);

function handleRSVP(e){e.preventDefault();const name=document.getElementById('rsvp-name').value.trim();const guests=document.getElementById('rsvp-guests').value.trim();const message=document.getElementById('rsvp-message').value.trim();if(!name){alert('Por favor ingresa tu nombre');return}const whatsappNumber='${d.whatsappNumber}';const text='Hola, soy '+name+'. Confirmo mi asistencia al Bautizo de ${escapeHtml(d.textName)} ${escapeHtml(d.textSurname)}'+(guests?' con '+guests+' invitado(s)':'')+'.'+(message?' '+message:'');window.open('https://wa.me/'+whatsappNumber+'?text='+encodeURIComponent(text),'_blank')}

<\/script></body></html>`;

<script>
const splash=document.getElementById('splash');splash.addEventListener('click',()=>{splash.classList.add('hide');setTimeout(()=>{splash.style.display='none';revealInvitation()},1500)});
function revealInvitation(){const inv=document.getElementById('invitation');inv.classList.add('visible');setTimeout(()=>{document.querySelectorAll('.corner-ornament').forEach(el=>el.classList.add('visible'))},200);setTimeout(()=>{document.querySelector('.angel-header').classList.add('visible')},400);setTimeout(()=>{document.querySelectorAll('.text-intro,.text-title,.text-subtitle,.text-name,.text-surname').forEach(el=>el.classList.add('visible'))},600);setTimeout(()=>{document.querySelector('.date-section').classList.add('visible')},1000);setTimeout(()=>{document.querySelector('.family-section').classList.add('visible')},1200);setTimeout(()=>{document.querySelector('.church-section').classList.add('visible')},1400);setTimeout(()=>{document.querySelector('.divider').classList.add('visible')},1600);setTimeout(()=>{document.querySelector('.countdown-section').classList.add('visible')},1800);setTimeout(()=>{document.querySelector('.gallery-section').classList.add('visible')},2000);setTimeout(()=>{document.querySelector('.map-section').classList.add('visible')},2200);setTimeout(()=>{document.querySelector('.rsvp-section').classList.add('visible')},2400);setTimeout(()=>{document.querySelector('.footer').classList.add('visible')},2600)}
const eventDate=new Date('${d.eventDateISO}').getTime();function updateCountdown(){const now=new Date().getTime();const distance=eventDate-now;if(distance<0)return;const days=Math.floor(distance/(1000*60*60*24));const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((distance%(1000*60*60))/(1000*60));const seconds=Math.floor((distance%(1000*60))/1000);document.getElementById('days').textContent=String(days).padStart(2,'0');document.getElementById('hours').textContent=String(hours).padStart(2,'0');document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');document.getElementById('seconds').textContent=String(seconds).padStart(2,'0')}updateCountdown();setInterval(updateCountdown,1000);
let carouselIdx=0;const totalSlides=${d.galleryImages.length};function updateCarousel(){const track=document.getElementById('carousel-track');if(track)track.style.transform='translateX(-'+(carouselIdx*100)+'%)';document.querySelectorAll('.carousel-dot').forEach((dot,i)=>{dot.classList.toggle('active',i===carouselIdx)})}function moveCarousel(dir){carouselIdx=(carouselIdx+dir+totalSlides)%totalSlides;updateCarousel()}function goToCarousel(idx){carouselIdx=idx;updateCarousel()}
function handleRSVP(e){e.preventDefault();const name=document.getElementById('rsvp-name').value.trim();const guests=document.getElementById('rsvp-guests').value.trim();const message=document.getElementById('rsvp-message').value.trim();if(!name){alert('Por favor ingresa tu nombre');return}const whatsappNumber='${d.whatsappNumber}';const text='Hola, soy '+name+'. Confirmo mi asistencia al Bautizo de ${escapeHtml(d.textName)} ${escapeHtml(d.textSurname)}'+(guests?' con '+guests+' invitado(s)':'')+'.'+(message?' '+message:'');window.open('https://wa.me/'+whatsappNumber+'?text='+encodeURIComponent(text),'_blank')}
const canvas=document.getElementById('gold-canvas');const ctx=canvas.getContext('2d');let particles=[];function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resizeCanvas();window.addEventListener('resize',resizeCanvas);class Particle{constructor(){this.reset()}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.3;this.speedY=(Math.random()-0.5)*0.3;this.opacity=Math.random()*0.3+0.1;this.fadeSpeed=Math.random()*0.01+0.005;this.growing=Math.random()>0.5}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.growing){this.opacity+=this.fadeSpeed;if(this.opacity>=0.4)this.growing=false}else{this.opacity-=this.fadeSpeed;if(this.opacity<=0.1)this.growing=true}if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset()}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle='rgba(184, 148, 62, '+this.opacity+')';ctx.fill()}}for(let i=0;i<30;i++)particles.push(new Particle());function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animateParticles)}animateParticles();
<\/script></body></html>`;
}

function resetDefaults() {
  if (!confirm('¿Restablecer todos los valores por defecto?')) return;
  location.reload();
}

function saveProject() {
  const data = {
    template: currentTemplate,
    data: templates[currentTemplate].data,
    colors: templates[currentTemplate].colors
  };
  const dataStr = JSON.stringify(data, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bautizo-project.json';
  a.click();
  URL.revokeObjectURL(url);
}

function exportHTML() {
  const iframe = document.getElementById('cardPreview');
  const htmlContent = iframe.srcdoc;
  const blob = new Blob([htmlContent], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'invitacion-bautizo.html';
  a.click();
  URL.revokeObjectURL(url);
}
