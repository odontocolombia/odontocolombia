<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modelos · Gueka Ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: #f7f2ec; color: #1a1208; overflow-x: hidden; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 2rem;
    background: rgba(247,242,236,0.97);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(201,169,110,0.2);
  }
  header img { height: 52px; }
  .btn-gold {
    display: inline-flex; align-items: center; gap: .4rem;
    background: #c9a96e; color: #1a1208; border: none;
    border-radius: 99px; padding: .55rem 1.3rem;
    font-size: .7rem; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; text-decoration: none; cursor: pointer;
    transition: opacity .2s;
  }
  .btn-gold:hover { opacity: .82; }

  /* HERO */
  .hero { text-align: center; padding: 3.5rem 1.5rem 2.5rem; max-width: 700px; margin: 0 auto; }
  .eyebrow { font-size: .6rem; letter-spacing: .35em; text-transform: uppercase; color: rgba(201,169,110,.7); margin-bottom: .5rem; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem,5vw,3.5rem); font-weight: 300; color: #1a1208; line-height: 1.1; }
  .hero h1 em { font-style: italic; color: #c9a96e; }
  .divider { display: flex; align-items: center; justify-content: center; gap: .75rem; margin: 1rem 0; }
  .divider-line { height: 1px; width: 48px; background: rgba(201,169,110,.4); }
  .divider-star { color: #c9a96e; font-size: .55rem; }
  .hero p { font-size: .9rem; color: #7a6a58; }

  /* FILTERS */
  .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: .75rem; margin: 0 auto 2.5rem; padding: 0 1.5rem; }
  .filter-btn {
    border-radius: 99px; padding: .5rem 1.3rem;
    font-size: .72rem; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer; border: 1px solid rgba(201,169,110,.3);
    background: rgba(201,169,110,.1); color: #7a6a58;
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover { background: #c9a96e; color: #1a1208; border-color: #c9a96e; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem;
  }
  @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 768px)  { .grid { grid-template-columns: repeat(2,1fr); gap: .9rem; } }
  @media (max-width: 420px)  { .grid { grid-template-columns: 1fr; } }

  .card {
    border-radius: 1.1rem; overflow: hidden; background: #fff;
    border: 1px solid rgba(201,169,110,.18);
    box-shadow: 0 4px 20px rgba(0,0,0,.07);
    transition: transform .3s, box-shadow .3s;
    opacity: 0; transform: translateY(24px);
    animation: fadeUp .5s ease forwards;
  }
  .card:hover { transform: translateY(-5px); box-shadow: 0 14px 40px rgba(0,0,0,.14); }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .card-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s; }
  .card:hover .card-img-wrap img { transform: scale(1.07); }
  .card-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(26,18,8,.75) 100%); pointer-events: none; }

  .plan-badge {
    position: absolute; top: .75rem; right: .75rem;
    border-radius: 99px; padding: .28rem .75rem;
    font-size: .55rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    backdrop-filter: blur(4px);
  }
  .badge-classic  { background: rgba(122,158,126,.15); color: #7a9e7e; border: 1px solid rgba(122,158,126,.5); }
  .badge-premium  { background: rgba(201,169,110,.15); color: #c9a96e; border: 1px solid rgba(201,169,110,.5); }
  .badge-deluxe   { background: rgba(192,132,252,.15); color: #c084fc; border: 1px solid rgba(192,132,252,.5); }

  .card-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .75rem;
    background: rgba(26,18,8,.65);
    opacity: 0; transition: opacity .28s;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-name { position: absolute; bottom: .85rem; left: 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; color: #fff; }

  .btn-preview {
    display: inline-flex; align-items: center; gap: .35rem;
    background: rgba(255,255,255,.15); color: #fff;
    border: 1px solid rgba(255,255,255,.3); border-radius: 99px;
    padding: .45rem 1rem; font-size: .68rem; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase; cursor: pointer; transition: opacity .2s;
  }
  .btn-preview:hover { opacity: .75; }

  .card-body { display: flex; align-items: center; justify-content: space-between; padding: .65rem 1rem; }
  .card-style { font-size: .72rem; color: #7a6a58; }
  .card-choose { font-size: .65rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #c9a96e; cursor: pointer; background: none; border: none; }
  .card-choose:hover { opacity: .65; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,5,2,.88);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    opacity: 0; pointer-events: none;
    transition: opacity .28s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    position: relative; border-radius: 1.5rem; overflow: hidden;
    max-width: 340px; width: 100%;
    background: #1a1208; border: 1px solid rgba(201,169,110,.25);
    transform: scale(.88); transition: transform .28s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
  .modal-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(26,18,8,.9) 100%); pointer-events: none; }
  .modal-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; }
  .modal-eyebrow { font-size: .6rem; letter-spacing: .28em; text-transform: uppercase; color: rgba(201,169,110,.7); margin-bottom: .3rem; }
  .modal-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: #fff; margin-bottom: 1rem; }
  .btn-choose {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: .5rem;
    background: #c9a96e; color: #1a1208; border: none; border-radius: 99px;
    padding: .85rem; font-size: .82rem; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer; transition: opacity .2s;
  }
  .btn-choose:hover { opacity: .85; }
  .modal-close {
    position: absolute; top: .85rem; right: .85rem;
    background: rgba(0,0,0,.4); border: none; border-radius: 99px;
    width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.7); cursor: pointer; font-size: 1rem; transition: opacity .2s;
  }
  .modal-close:hover { opacity: .6; }

  /* FOOTER */
  footer {
    background: #0e0903; border-top: 1px solid rgba(201,169,110,.1);
    padding: 2rem 1.5rem; text-align: center;
  }
  footer img { height: 60px; margin-bottom: .75rem; }
  footer p { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(247,242,236,.25); }

  /* Stagger delay */
  .card:nth-child(1)  { animation-delay: .02s; }
  .card:nth-child(2)  { animation-delay: .06s; }
  .card:nth-child(3)  { animation-delay: .10s; }
  .card:nth-child(4)  { animation-delay: .14s; }
  .card:nth-child(5)  { animation-delay: .18s; }
  .card:nth-child(6)  { animation-delay: .22s; }
  .card:nth-child(7)  { animation-delay: .26s; }
  .card:nth-child(8)  { animation-delay: .30s; }
  .card:nth-child(9)  { animation-delay: .34s; }
  .card:nth-child(10) { animation-delay: .38s; }
  .card:nth-child(11) { animation-delay: .42s; }
  .card:nth-child(12) { animation-delay: .46s; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <img src="https://hercules-cdn.com/file_hC93kYqv7h5rfBHqXQGJ6bTw" alt="Gueka Ideas" />
  <a href="/#planes" class="btn-gold">🛒 Ver planes</a>
</header>

<!-- HERO -->
<div class="hero">
  <p class="eyebrow">Colección Bodas</p>
  <h1>Elige tu <em>modelo</em></h1>
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-star">✦</span>
    <div class="divider-line"></div>
  </div>
  <p>12 diseños únicos para que tu invitación cuente tu historia de amor.</p>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" data-filter="todos">Todos</button>
  <button class="filter-btn" data-filter="classic">Classic</button>
  <button class="filter-btn" data-filter="premium">Premium</button>
  <button class="filter-btn" data-filter="deluxe">Deluxe</button>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <img id="modal-img" src="" alt="" />
    <div class="modal-gradient"></div>
    <div class="modal-body">
      <p class="modal-eyebrow" id="modal-style"></p>
      <p class="modal-name" id="modal-name"></p>
      <button class="btn-choose" id="modal-btn">🛒 Elegir este modelo</button>
    </div>
    <button class="modal-close" id="modal-close">✕</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <img src="https://hercules-cdn.com/file_hC93kYqv7h5rfBHqXQGJ6bTw" alt="Gueka Ideas" />
  <p>Invitaciones Digitales · <span id="year"></span></p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const PLANS_URL = '/#planes';

  const templates = [
    { id:1,  name:'Cinema Noir',       style:'Cinematográfico',      plan:'classic', img:'https://images.unsplash.com/photo-1596457221755-b96bc3a6df18?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:2,  name:'Golden Hour',       style:'Romántico Dorado',     plan:'premium', img:'https://images.unsplash.com/photo-1606216794079-73f85bbd57d5?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:3,  name:'Jardín en Flor',    style:'Floral Boho',          plan:'classic', img:'https://images.unsplash.com/photo-1612611450392-826af708c34a?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:4,  name:'Bosque Eterno',     style:'Natural & Orgánico',   plan:'premium', img:'https://images.unsplash.com/photo-1607357910286-1ff94ac13c24?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:5,  name:'Luna de Miel',      style:'Elegante Clásico',     plan:'deluxe',  img:'https://images.unsplash.com/photo-1537633468298-d86f0c2d4173?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:6,  name:'Atardecer Rosa',    style:'Romántico Pastel',     plan:'classic', img:'https://images.unsplash.com/photo-1591604442449-ecc9943efabf?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:7,  name:'Minimalista Luxe',  style:'Moderno Minimalista',  plan:'premium', img:'https://images.unsplash.com/photo-1738898179451-b5fc497f9f8e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:8,  name:'Pétalo & Seda',     style:'Floral Lujoso',        plan:'deluxe',  img:'https://images.unsplash.com/photo-1758825178518-ca48833a6c57?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:9,  name:'Vintage Dorado',    style:'Vintage Retro',        plan:'premium', img:'https://images.unsplash.com/photo-1612611450433-360c82a57e01?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:10, name:'Noir & Blanc',      style:'Sofisticado B&N',      plan:'deluxe',  img:'https://images.unsplash.com/photo-1741893043659-ca8b82a8b637?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:11, name:'Primavera Eterna',  style:'Acuarela Floral',      plan:'classic', img:'https://images.unsplash.com/photo-1612619732932-ea0a16a7af82?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
    { id:12, name:'Noche Estrellada',  style:'Celestial & Mágico',   plan:'deluxe',  img:'https://images.unsplash.com/photo-1732649124686-3bab54f79aa3?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=600&q=80' },
  ];

  let currentFilter = 'todos';
  let currentPlan = null;

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'todos' ? templates : templates.filter(t => t.plan === currentFilter);
    grid.innerHTML = filtered.map((t, i) => `
      <div class="card" data-plan="${t.plan}" style="animation-delay:${i*0.04}s">
        <div class="card-img-wrap">
          <img src="${t.img}" alt="${t.name}" loading="lazy" />
          <div class="card-gradient"></div>
          <span class="plan-badge badge-${t.plan}">${t.plan.toUpperCase()}</span>
          <div class="card-overlay">
            <button class="btn-preview" onclick="openModal(${t.id})">👁 Vista previa</button>
            <a href="${PLANS_URL}" class="btn-gold" style="font-size:.68rem;padding:.45rem 1rem;">🛒 Elegir</a>
          </div>
          <span class="card-name">${t.name}</span>
        </div>
        <div class="card-body">
          <span class="card-style">${t.style}</span>
          <a href="${PLANS_URL}" class="card-choose">Elegir →</a>
        </div>
      </div>
    `).join('');
  }

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });

  // Modal
  function openModal(id) {
    const t = templates.find(x => x.id === id);
    if (!t) return;
    currentPlan = t.plan;
    document.getElementById('modal-img').src = t.img;
    document.getElementById('modal-style').textContent = t.style;
    document.getElementById('modal-name').textContent = t.name;
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modal-btn').addEventListener('click', () => {
    window.location.href = PLANS_URL;
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  renderGrid();
</script>
</body>
</html>
