<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XV Años · Sofía Valentina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff2d78;--cyan:#00f5ff;--gold:#ffd700;
  --green:#39ff14;--purple:#bf00ff;--dark:#060612;
}
body{background:#060612;color:#fff;font-family:'Space Mono',monospace;overflow-x:hidden}
button{cursor:pointer;border:none;background:none}
img{display:block}
input{outline:none;color:#fff;font-family:'Space Mono',monospace}
input::placeholder{color:rgba(255,255,255,.2)}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* Animations */
@keyframes neonPulse{0%,100%{opacity:1;text-shadow:0 0 8px currentColor,0 0 20px currentColor,0 0 40px currentColor}50%{opacity:.85;text-shadow:0 0 4px currentColor,0 0 10px currentColor,0 0 20px currentColor}}
@keyframes scanline{from{transform:translateY(-100%)}to{transform:translateY(100vh)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes discoSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blinkColon{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes strobe{0%,100%{background:transparent}8%{background:rgba(255,255,255,.03)}16%{background:transparent}}
@keyframes laserH{0%{top:20%;opacity:.7}50%{top:80%;opacity:.4}100%{top:20%;opacity:.7}}
@keyframes laserH2{0%{top:60%;opacity:.5}50%{top:30%;opacity:.8}100%{top:60%;opacity:.5}}
@keyframes tileFlash{0%,90%,100%{opacity:.15}95%{opacity:.9}}
@keyframes cardSlide{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes spineGrow{from{transform:translateX(-50%) scaleY(0)}to{transform:translateX(-50%) scaleY(1)}}

.disco-spin{animation:discoSpin 8s linear infinite}
.blink-colon{animation:blinkColon 1s ease-in-out infinite}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 14s linear infinite}
.fade-slide-up{animation:fadeSlideUp .8s .2s both ease}
.strobe-bg{animation:strobe 4s ease-in-out infinite}
.tile{aspect-ratio:1;border-radius:1px;animation:tileFlash linear infinite}
.tile-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:0 2px}

.neon-btn{background:transparent;border:2px solid var(--pink);color:var(--pink);font-family:'Bebas Neue',sans-serif;letter-spacing:.2em;font-size:1rem;padding:.85rem 2rem;border-radius:2px;box-shadow:0 0 12px var(--pink),inset 0 0 12px rgba(255,45,120,.08);text-shadow:0 0 8px var(--pink);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%}
.neon-btn:hover{background:rgba(255,45,120,.12);box-shadow:0 0 24px var(--pink),inset 0 0 20px rgba(255,45,120,.15)}
.neon-btn-cyan{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px var(--cyan),inset 0 0 12px rgba(0,245,255,.08);text-shadow:0 0 8px var(--cyan)}
.neon-btn-cyan:hover{background:rgba(0,245,255,.08);box-shadow:0 0 24px var(--cyan)}

/* Wrapper */
#app{background:#060612;min-height:100vh}
.card{max-width:430px;margin:0 auto;box-shadow:0 0 0 1px rgba(255,45,120,.15),0 40px 120px rgba(0,0,0,.95);border-left:1px solid rgba(255,45,120,.12);border-right:1px solid rgba(255,45,120,.12)}

/* Laser divider */
.laser-div{position:relative;height:3px;overflow:hidden}
.laser-div-inner{position:absolute;inset:0}

/* Ticker */
.ticker-wrap{overflow:hidden;padding:7px 0}

/* Gallery lightbox */
#lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.95);align-items:center;justify-content:center;padding:2rem}
#lightbox.open{display:flex}

/* Section base */
section{position:relative;overflow:hidden}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const NEON={pink:"#ff2d78",cyan:"#00f5ff",gold:"#ffd700",green:"#39ff14",purple:"#bf00ff",dark:"#060612"};
const EVENT_DATE=new Date("2026-11-15T19:00:00");
const GALLERY=[
  {url:"https://images.unsplash.com/photo-1559034750-cdab70a66b8e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"La quinceañera"},
  {url:"https://images.unsplash.com/photo-1721069112805-860652356252?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Elegancia pura"},
  {url:"https://images.unsplash.com/photo-1721069113513-24e20df325b5?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Vestido de ensueño"},
  {url:"https://images.unsplash.com/photo-1721069103742-028e693b68d4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"La protagonista"},
  {url:"https://images.unsplash.com/photo-1763625650105-9bca6b5509ae?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Fashion moment"},
  {url:"https://images.unsplash.com/photo-1763625642525-7d0a0d5f9cf9?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Celebración especial"},
  {url:"https://images.unsplash.com/photo-1763625638895-c52d46816bc0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Corte de honor"},
  {url:"https://images.unsplash.com/photo-1654336037958-c698d50700b3?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",caption:"Noche de magia"},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.assign(e,attrs);
  if(children){
    if(typeof children==='string')e.innerHTML=children;
    else if(Array.isArray(children))children.forEach(c=>c&&e.appendChild(typeof c==='string'?document.createTextNode(c):c));
    else e.appendChild(children);
  }
  return e;
}
function div(style,children){const d=document.createElement('div');d.style.cssText=style;if(children){if(typeof children==='string')d.innerHTML=children;else if(Array.isArray(children))children.forEach(c=>c&&d.appendChild(typeof c==='string'?Object.assign(document.createElement('span'),{textContent:c}):c));else d.appendChild(children);}return d;}
function css(el,obj){Object.assign(el.style,obj);return el;}

function danceFloorTiles(rows=2){
  const colors=[NEON.pink,NEON.cyan,NEON.gold,NEON.green,NEON.purple];
  const grid=document.createElement('div');grid.className='tile-grid';
  for(let i=0;i<8*rows;i++){
    const t=document.createElement('div');t.className='tile';
    const c=colors[i%colors.length];
    t.style.background=c;
    t.style.animationDelay=`${(Math.sin(i*1.3)*3+3).toFixed(2)}s`;
    t.style.animationDuration=`${(Math.cos(i*0.7)*1.5+3).toFixed(2)}s`;
    grid.appendChild(t);
  }
  return grid;
}

function sectionLabel(text,color=NEON.cyan){
  const s=document.createElement('div');
  s.style.cssText=`font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.5em;text-transform:uppercase;color:${color};text-shadow:0 0 8px ${color};margin-bottom:.5rem`;
  s.textContent=text;return s;
}
function neonTitle(text,color=NEON.pink){
  const h=document.createElement('h2');
  h.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.12em;line-height:1;color:${color};text-shadow:0 0 10px ${color},0 0 30px ${color},0 0 60px ${color}60;margin:0`;
  h.textContent=text;return h;
}
function laserLine(color=NEON.pink){
  const w=document.createElement('div');w.className='laser-div';
  const i=document.createElement('div');i.className='laser-div-inner';
  i.style.background=`linear-gradient(to right,transparent,${color} 30%,#fff 50%,${color} 70%,transparent)`;
  i.style.boxShadow=`0 0 16px ${color},0 0 32px ${color}`;
  w.appendChild(i);return w;
}
function gradLine(color,margin="1.25rem auto 0"){
  const d=document.createElement('div');
  d.style.cssText=`height:2px;background:linear-gradient(to right,transparent,${color},transparent);box-shadow:0 0 12px ${color};margin:${margin};width:80%`;
  return d;
}
function neonBtn(text,color=NEON.pink,onClick){
  const b=document.createElement('button');
  b.className=color===NEON.cyan?'neon-btn neon-btn-cyan':'neon-btn';
  b.innerHTML=text;if(onClick)b.onclick=onClick;return b;
}

// ── DISCO BALL SVG ────────────────────────────────────────────────────────────
function discoBallSVG(size=70,gradId='ball'){
  const colors=[NEON.pink,NEON.cyan,NEON.gold,NEON.green,NEON.purple];
  let tiles='';
  for(let r=0;r<6;r++)for(let c=0;c<8;c++)
    tiles+=`<rect x="${3+c*8}" y="${3+r*11}" width="6" height="8" rx="1" fill="${colors[(r+c)%5]}" opacity=".7"/>`;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <defs><radialGradient id="${gradId}" cx="38%" cy="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
      <stop offset="60%" stop-color="#b0b0d0"/>
      <stop offset="100%" stop-color="#404060"/>
    </radialGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${size/2-3}" fill="url(#${gradId})"/>
    ${tiles}
    <circle cx="${size/2}" cy="${size/2}" r="${size/2-3}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
  </svg>`;
}

// ── SPLASH ────────────────────────────────────────────────────────────────────
function buildSplash(onOpen){
  const sec=document.createElement('div');
  sec.style.cssText=`position:relative;min-height:100vh;overflow:hidden;cursor:pointer;background:radial-gradient(ellipse at 50% 30%,#1a0030 0%,#060612 60%);display:flex;flex-direction:column;justify-content:center;align-items:center`;
  sec.onclick=onOpen;

  // Strobe
  const strobe=document.createElement('div');strobe.className='strobe-bg';
  strobe.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0';sec.appendChild(strobe);

  // Floor
  const floor=document.createElement('div');
  floor.style.cssText='position:absolute;bottom:0;left:0;right:0;height:90px;opacity:.55';
  floor.appendChild(danceFloorTiles(3));sec.appendChild(floor);

  // Laser beams
  const lasers=[
    {color:NEON.pink,anim:'laserH 3.2s ease-in-out infinite',left:'15%',width:'70%'},
    {color:NEON.cyan,anim:'laserH2 4.1s ease-in-out infinite',left:'5%',width:'90%'},
    {color:NEON.gold,anim:'laserH 5s ease-in-out infinite 1s',left:'20%',width:'60%'},
    {color:NEON.green,anim:'laserH2 3.7s ease-in-out infinite .5s',left:'0',width:'100%'},
  ];
  lasers.forEach(l=>{
    const lb=document.createElement('div');
    lb.style.cssText=`position:absolute;left:${l.left};width:${l.width};height:1px;background:${l.color};box-shadow:0 0 6px 2px ${l.color};animation:${l.anim};pointer-events:none;z-index:1`;
    sec.appendChild(lb);
  });

  // Disco ball string
  const str=document.createElement('div');
  str.style.cssText='position:absolute;top:0;left:50%;width:2px;height:28px;background:rgba(255,255,255,.3);transform:translateX(-50%);z-index:4';sec.appendChild(str);

  // Disco ball
  const db=document.createElement('div');db.className='disco-spin';
  db.style.cssText='position:absolute;top:20px;z-index:5;width:70px;height:70px';
  db.innerHTML=discoBallSVG(70,'ball1');sec.appendChild(db);

  // Content
  const cnt=document.createElement('div');cnt.className='fade-slide-up';
  cnt.style.cssText='position:relative;z-index:10;text-align:center;padding:0 2rem;margin-top:60px';

  const badge=document.createElement('div');
  badge.style.cssText=`display:inline-block;border:1px solid ${NEON.cyan};padding:.3rem 1.2rem;margin-bottom:1.5rem;font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.4em;color:${NEON.cyan};text-shadow:0 0 8px ${NEON.cyan};box-shadow:0 0 10px ${NEON.cyan}40;border-radius:2px`;
  badge.textContent='GLAMOUR EDITION · XV AÑOS';cnt.appendChild(badge);

  const big15=document.createElement('div');
  big15.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:10rem;line-height:.8;color:${NEON.pink};text-shadow:0 0 20px ${NEON.pink},0 0 60px ${NEON.pink}60,0 0 100px ${NEON.pink}30;letter-spacing:.06em`;
  big15.textContent='15';cnt.appendChild(big15);

  const nm=document.createElement('div');
  nm.style.cssText=`font-family:'Playfair Display',serif;font-size:2.2rem;font-style:italic;color:#fff;text-shadow:0 0 20px ${NEON.gold}80;margin-bottom:.4rem;line-height:1`;
  nm.textContent='Sofía Valentina';cnt.appendChild(nm);

  const sub=document.createElement('div');
  sub.style.cssText=`font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.45em;color:${NEON.cyan};text-shadow:0 0 8px ${NEON.cyan};margin-bottom:2rem`;
  sub.textContent='15 · NOV · 2026  |  7:00 PM';cnt.appendChild(sub);

  const btn=document.createElement('button');btn.className='neon-btn';
  btn.style.cssText='width:auto;padding:1rem 2.5rem;font-size:1rem';
  btn.innerHTML='▶&nbsp;&nbsp;ABRIR INVITACIÓN';
  btn.onclick=e=>{e.stopPropagation();onOpen();};cnt.appendChild(btn);

  const hint=document.createElement('div');
  hint.style.cssText=`margin-top:.75rem;font-family:'Space Mono',monospace;font-size:.45rem;letter-spacing:.2em;color:rgba(255,45,120,.4)`;
  hint.textContent='TOCA PARA ENTRAR A LA FIESTA';cnt.appendChild(hint);

  sec.appendChild(cnt);
  return sec;
}

// ── HERO ──────────────────────────────────────────────────────────────────────
function buildHero(){
  const sec=document.createElement('section');sec.style.background=NEON.dark;

  // Top bar
  const topBar=document.createElement('div');
  topBar.style.cssText=`display:flex;align-items:center;padding:1rem 1.5rem;gap:.75rem;border-bottom:1px solid ${NEON.pink}30`;
  const l1=document.createElement('div');l1.style.cssText=`height:1px;flex:1;background:linear-gradient(to right,transparent,${NEON.pink})`;
  const sp=document.createElement('span');
  sp.style.cssText=`font-family:'Space Mono',monospace;font-size:.42rem;letter-spacing:.6em;color:${NEON.pink};text-shadow:0 0 6px ${NEON.pink};white-space:nowrap`;
  sp.textContent='INVITACIÓN OFICIAL · XV AÑOS';
  const l2=document.createElement('div');l2.style.cssText=`height:1px;flex:1;background:linear-gradient(to left,transparent,${NEON.pink})`;
  topBar.append(l1,sp,l2);sec.appendChild(topBar);

  // Photo
  const photo=document.createElement('div');photo.style.position='relative';
  const img=document.createElement('img');
  img.src='https://images.unsplash.com/photo-1559034750-cdab70a66b8e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800';
  img.alt='Sofía Valentina';
  img.style.cssText='width:100%;height:460px;object-fit:cover;object-position:center 10%;filter:saturate(1.15) contrast(1.05)';
  photo.appendChild(img);

  // Overlay gradient
  const ov=document.createElement('div');
  ov.style.cssText='position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,6,18,.1) 0%,rgba(6,6,18,0) 40%,rgba(6,6,18,.95) 100%)';
  photo.appendChild(ov);

  // Scanline
  const scanW=document.createElement('div');scanW.style.cssText='position:absolute;inset:0;overflow:hidden;pointer-events:none';
  const scan=document.createElement('div');
  scan.style.cssText=`position:absolute;left:0;right:0;height:2px;background:${NEON.pink};opacity:.35;box-shadow:0 0 10px ${NEON.pink};animation:scanline 4s linear infinite`;
  scanW.appendChild(scan);photo.appendChild(scanW);

  // Name overlay
  const nameOv=document.createElement('div');
  nameOv.style.cssText='position:absolute;bottom:0;left:0;right:0;padding:1.5rem;text-align:left';
  const pre=document.createElement('div');
  pre.style.cssText=`font-family:'Space Mono',monospace;font-size:.45rem;letter-spacing:.5em;color:${NEON.cyan};text-shadow:0 0 6px ${NEON.cyan};margin-bottom:.35rem`;
  pre.textContent='PRESENTANDO A';
  const nm=document.createElement('div');
  nm.style.cssText=`font-family:'Playfair Display',serif;font-size:2.8rem;font-style:italic;font-weight:700;color:#fff;text-shadow:0 0 30px ${NEON.gold}90,2px 2px 0 ${NEON.pink}40;line-height:1`;
  nm.textContent='Sofía Valentina';
  const sur=document.createElement('div');
  sur.style.cssText=`font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.45);margin-top:.3rem`;
  sur.textContent='GARCÍA MONTOYA';
  nameOv.append(pre,nm,sur);photo.appendChild(nameOv);
  sec.appendChild(photo);

  sec.appendChild(danceFloorTiles(2));

  // Info cells
  const cells=[{label:'FECHA',value:'15 NOV 2026',color:NEON.pink},{label:'HORA',value:'7:00 PM',color:NEON.cyan},{label:'LUGAR',value:'BOG · COL',color:NEON.gold}];
  const row=document.createElement('div');row.style.cssText=`display:flex;gap:1px;background:${NEON.pink}20`;
  cells.forEach(d=>{
    const c=document.createElement('div');
    c.style.cssText=`flex:1;padding:1rem .5rem;text-align:center;background:${d.color}12;border-top:2px solid ${d.color}`;
    const lab=document.createElement('div');lab.style.cssText=`font-family:'Space Mono',monospace;font-size:.38rem;letter-spacing:.4em;color:rgba(255,255,255,.35);margin-bottom:4px`;lab.textContent=d.label;
    const val=document.createElement('div');val.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;color:${d.color};text-shadow:0 0 8px currentColor`;val.textContent=d.value;
    c.append(lab,val);row.appendChild(c);
  });
  sec.appendChild(row);

  const quote=document.createElement('div');
  quote.style.cssText=`padding:1.75rem;text-align:center;border-bottom:1px solid ${NEON.cyan}20`;
  quote.innerHTML=`<p style="font-family:'Playfair Display',serif;font-size:.95rem;font-style:italic;color:rgba(255,255,255,.45);line-height:1.8">"Esta noche la pista te pertenece. Ven a celebrar, bailar y hacer historia."</p>`;
  sec.appendChild(quote);

  return sec;
}

// ── TICKER ────────────────────────────────────────────────────────────────────
function buildTicker(){
  const phrases=['GLAMOUR · XV AÑOS','SOFÍA VALENTINA','15 NOV 2026','THE FLOOR IS YOURS','YOU ARE INVITED','DANCE ALL NIGHT'];
  const doubled=[...phrases,...phrases];
  const wrap=document.createElement('div');
  wrap.style.cssText=`overflow:hidden;background:${NEON.pink};padding:7px 0;box-shadow:0 0 20px ${NEON.pink},0 0 40px ${NEON.pink}60`;
  const inner=document.createElement('div');inner.className='ticker-inner';
  doubled.forEach(p=>{
    const span=document.createElement('span');span.style.cssText='display:inline-flex;align-items:center;gap:1.5rem';
    const txt=document.createElement('span');txt.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.22em;color:#060612;padding:0 1.5rem`;txt.textContent=p;
    const dot=document.createElement('span');dot.style.cssText='color:rgba(6,6,18,.5);font-size:.8rem';dot.textContent='✦';
    span.append(txt,dot);inner.appendChild(span);
  });
  wrap.appendChild(inner);return wrap;
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function buildCountdown(){
  const sec=document.createElement('section');
  sec.style.cssText=`position:relative;overflow:hidden;text-align:center;padding:4rem 1.5rem 3rem;background:radial-gradient(ellipse at 50% 0%,${NEON.pink}18 0%,${NEON.dark} 70%)`;
  sec.appendChild(danceFloorTiles(2));
  const inner=document.createElement('div');inner.style.paddingTop='2rem';
  inner.appendChild(sectionLabel('CUENTA REGRESIVA'));
  inner.appendChild(neonTitle('¡FALTA POCO!',NEON.gold));
  inner.appendChild(gradLine(NEON.gold,'1.25rem auto'));

  const row=document.createElement('div');
  row.style.cssText='display:flex;justify-content:center;align-items:flex-start;gap:8px;margin-top:1.5rem';

  const colors=[NEON.pink,NEON.cyan,NEON.gold,NEON.green];
  const labels=['DÍAS','HORAS','MIN','SEG'];
  const colKeys=['days','hours','mins','secs'];
  const boxes={};
  const colonColors=[NEON.pink,NEON.cyan,NEON.gold];

  colKeys.forEach((k,i)=>{
    const box=document.createElement('div');box.style.cssText='display:flex;flex-direction:column;align-items:center';
    const inner2=document.createElement('div');
    inner2.style.cssText=`position:relative;width:68px;height:76px;background:${colors[i]}12;border:1px solid ${colors[i]};border-radius:2px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px ${colors[i]}50,inset 0 0 14px ${colors[i]}15`;
    const numEl=document.createElement('span');
    numEl.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;color:${colors[i]};text-shadow:0 0 12px ${colors[i]}`;
    numEl.textContent='00';
    inner2.appendChild(numEl);
    const labEl=document.createElement('span');labEl.style.cssText=`margin-top:6px;font-family:'Space Mono',monospace;font-size:.38rem;letter-spacing:.3em;color:rgba(255,255,255,.35)`;
    labEl.textContent=labels[i];
    box.append(inner2,labEl);row.appendChild(box);
    boxes[k]=numEl;
    if(i<3){
      const colon=document.createElement('span');colon.className='blink-colon';
      colon.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:${colonColors[i]};padding-bottom:1.8rem;text-shadow:0 0 10px ${colonColors[i]}`;
      colon.textContent=':';row.appendChild(colon);
    }
  });
  inner.appendChild(row);sec.appendChild(inner);

  function pad(n){return String(n).padStart(2,'0')}
  function update(){
    const diff=Math.max(0,EVENT_DATE.getTime()-Date.now());
    const s=Math.floor(diff/1000);
    boxes.days.textContent=pad(Math.floor(s/86400));
    boxes.hours.textContent=pad(Math.floor((s%86400)/3600));
    boxes.mins.textContent=pad(Math.floor((s%3600)/60));
    boxes.secs.textContent=pad(s%60);
  }
  update();setInterval(update,1000);
  return sec;
}

function buildGallery(){

  mainWrap.style.cssText=`position:relative;overflow:hidden;height:340px;cursor:pointer;border:1px solid ${NEON.pink};box-shadow:0 0 20px ${NEON.pink}40`;
  const mainImg=document.createElement('img');
  mainImg.style.cssText='width:100%;height:100%;object-fit:cover;transition:opacity .2s;filter:saturate(1.2) contrast(1.05)';
  const mainOverlay=document.createElement('div');
  mainOverlay.style.cssText='position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,18,.9) 0%,transparent 55%);pointer-events:none';
  const captionEl=document.createElement('div');captionEl.style.cssText='position:absolute;bottom:0;left:0;right:0;padding:1rem 1.25rem';
  const captionText=document.createElement('div');captionText.style.cssText=`font-family:'Playfair Display',serif;font-size:1.5rem;font-style:italic;color:#fff;text-shadow:0 0 14px ${NEON.gold}80`;
  const captionLine=document.createElement('div');captionLine.style.cssText=`height:2px;width:40px;background:${NEON.gold};box-shadow:0 0 8px ${NEON.gold};margin-top:5px`;
  captionEl.append(captionText,captionLine);
  const counter=document.createElement('div');
  counter.style.cssText=`position:absolute;top:12px;right:12px;background:rgba(6,6,18,.9);border:1px solid ${NEON.cyan};padding:3px 10px;font-family:'Space Mono',monospace;font-size:.58rem;color:${NEON.cyan};letter-spacing:.15em;box-shadow:0 0 8px ${NEON.cyan}40`;

  const arrowBtn=(dir,side)=>{
    const b=document.createElement('button');
    b.style.cssText=`position:absolute;top:50%;transform:translateY(-50%);${side}:10px;z-index:10;width:38px;height:38px;background:rgba(6,6,18,.85);border:1px solid ${NEON.pink};box-shadow:0 0 10px ${NEON.pink}50;color:${NEON.pink};font-size:1.3rem;display:flex;align-items:center;justify-content:center;border-radius:2px`;
    b.textContent=dir<0?'‹':'›';
    b.onclick=e=>{e.stopPropagation();nav(dir);};
    return b;
  };

  mainWrap.append(mainImg,mainOverlay,captionEl,counter,arrowBtn(-1,'left'),arrowBtn(1,'right'));
  mainWrap.onclick=()=>openLightbox();

  // Progress bar
  const progWrap=document.createElement('div');progWrap.style.cssText='height:2px;background:rgba(255,255,255,.08);margin-top:10px;overflow:hidden';
  const progBar=document.createElement('div');progBar.style.cssText=`height:100%;background:linear-gradient(to right,${NEON.pink},${NEON.cyan});box-shadow:0 0 8px ${NEON.pink};transition:width .3s`;
  progWrap.appendChild(progBar);

  // Thumbs
  const thumbRow=document.createElement('div');thumbRow.style.cssText='display:flex;gap:6px;margin-top:12px;overflow-x:auto;scrollbar-width:none;justify-content:center;padding-bottom:4px';

  // Dots
  const dotsRow=document.createElement('div');dotsRow.style.cssText='display:flex;gap:5px;justify-content:center;margin-top:10px';

  function updateUI(){
    mainImg.src=GALLERY[idx].url;
    mainImg.alt=GALLERY[idx].caption;
    captionText.textContent=GALLERY[idx].caption;
    counter.textContent=`${idx+1} / ${GALLERY.length}`;
    progBar.style.width=`${((idx+1)/GALLERY.length)*100}%`;

    thumbRow.querySelectorAll('button').forEach((b,i)=>{
      b.style.border=`${i===idx?2:1}px solid ${i===idx?NEON.pink:'rgba(255,45,120,.2)'}`;
      b.style.opacity=i===idx?'1':'.5';
      b.style.boxShadow=i===idx?`0 0 12px ${NEON.pink}`:'none';
    });
    dotsRow.querySelectorAll('button').forEach((b,i)=>{
      b.style.width=i===idx?'24px':'5px';
      b.style.background=i===idx?NEON.pink:'rgba(255,45,120,.2)';
      b.style.boxShadow=i===idx?`0 0 6px ${NEON.pink}`:'none';
    });
  }

  function go(i){idx=((i%GALLERY.length)+GALLERY.length)%GALLERY.length;updateUI();}
  function nav(dir){clearInterval(autoInterval);go(idx+dir);startAuto();}
  function startAuto(){autoInterval=setInterval(()=>go(idx+1),4000);}

  GALLERY.forEach((g,i)=>{
    const tb=document.createElement('button');
    tb.style.cssText='flex-shrink:0;width:48px;height:48px;overflow:hidden;padding:0;background:none;border-radius:1px;transition:all .2s';
    const ti=document.createElement('img');ti.src=g.url;ti.alt=g.caption;ti.style.cssText='width:100%;height:100%;object-fit:cover';
    tb.appendChild(ti);tb.onclick=()=>{clearInterval(autoInterval);go(i);startAuto();};
    thumbRow.appendChild(tb);

    const db=document.createElement('button');
    db.style.cssText='height:3px;border-radius:2px;border:none;padding:0;background:rgba(255,45,120,.2);width:5px;transition:all .2s';
    db.onclick=()=>go(i);
    dotsRow.appendChild(db);
  });

  wrap.append(mainWrap,progWrap,thumbRow,dotsRow);sec.appendChild(wrap);
  updateUI();startAuto();

  // Lightbox
  const lb=document.createElement('div');lb.id='lightbox';
  lb.onclick=()=>lb.classList.remove('open');
  const lbInner=document.createElement('div');
  lbInner.style.cssText='max-width:700px;width:100%;position:relative';
  lbInner.onclick=e=>e.stopPropagation();
  const lbImg=document.createElement('img');
  lbImg.style.cssText=`width:100%;border:1px solid ${NEON.pink};box-shadow:0 0 30px ${NEON.pink}50;max-height:70vh;object-fit:cover`;
  const lbCaption=document.createElement('div');lbCaption.style.cssText='text-align:center;margin-top:1rem';
  const lbCaptionText=document.createElement('div');lbCaptionText.style.cssText=`font-family:'Playfair Display',serif;font-size:1.8rem;font-style:italic;color:#fff;text-shadow:0 0 12px ${NEON.gold}80`;
  lbCaption.appendChild(lbCaptionText);
  const lbClose=document.createElement('button');lbClose.textContent='✕';
  lbClose.style.cssText=`position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:rgba(6,6,18,.95);border:1px solid ${NEON.cyan};color:${NEON.cyan};display:flex;align-items:center;justify-content:center;font-size:.9rem`;
  lbClose.onclick=()=>lb.classList.remove('open');
  const lbPrev=document.createElement('button');lbPrev.textContent='‹';
  lbPrev.style.cssText=`position:absolute;left:-46px;top:50%;transform:translateY(-50%);width:38px;height:38px;background:rgba(6,6,18,.9);border:1px solid ${NEON.pink};color:${NEON.pink};display:flex;align-items:center;justify-content:center;font-size:1.3rem`;
  lbPrev.onclick=()=>{go(idx-1);lbImg.src=GALLERY[idx].url;lbCaptionText.textContent=GALLERY[idx].caption;};
  const lbNext=document.createElement('button');lbNext.textContent='›';
  lbNext.style.cssText=`position:absolute;right:-46px;top:50%;transform:translateY(-50%);width:38px;height:38px;background:rgba(6,6,18,.9);border:1px solid ${NEON.pink};color:${NEON.pink};display:flex;align-items:center;justify-content:center;font-size:1.3rem`;
  lbNext.onclick=()=>{go(idx+1);lbImg.src=GALLERY[idx].url;lbCaptionText.textContent=GALLERY[idx].caption;};
  lbInner.append(lbImg,lbCaption,lbClose,lbPrev,lbNext);
  lb.appendChild(lbInner);
  document.body.appendChild(lb);

  function openLightbox(){lbImg.src=GALLERY[idx].url;lbCaptionText.textContent=GALLERY[idx].caption;lb.classList.add('open');}

  document.addEventListener('keydown',e=>{
    if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')lb.classList.remove('open');
    if(e.key==='ArrowLeft'){go(idx-1);lbImg.src=GALLERY[idx].url;lbCaptionText.textContent=GALLERY[idx].caption;}
    if(e.key==='ArrowRight'){go(idx+1);lbImg.src=GALLERY[idx].url;lbCaptionText.textContent=GALLERY[idx].caption;}
  });

  return sec;
}

  quote.innerHTML='Esta noche merece tu mejor versión.<br><span style="color:#fff;opacity:.7">Etiqueta formal · Tema discoteca</span>';
  sec.appendChild(quote);

  const list=document.createElement('div');list.style.cssText='display:flex;flex-direction:column;gap:.75rem';
  items.forEach(item=>{
    const row=document.createElement('div');
    row.style.cssText=`display:flex;gap:1rem;padding:1.1rem 1.25rem;background:${item.color}08;border:1px solid ${item.color}40;border-left:3px solid ${item.color};border-radius:1px;box-shadow:0 0 12px ${item.color}15`;
    const icon=document.createElement('div');
    icon.style.cssText=`flex-shrink:0;width:40px;height:40px;background:${item.color}18;border:1px solid ${item.color}60;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px ${item.color}40`;
    icon.innerHTML=`<span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${item.color};text-shadow:0 0 8px ${item.color}">✦</span>`;
    const txt=document.createElement('div');
    const tName=document.createElement('div');tName.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:${item.color};text-shadow:0 0 6px ${item.color};margin-bottom:4px`;tName.textContent=item.title;
    const tDesc=document.createElement('p');tDesc.style.cssText=`font-family:'Space Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.38);line-height:1.7;margin:0`;tDesc.textContent=item.desc;
    txt.append(tName,tDesc);row.append(icon,txt);list.appendChild(row);
  });
  sec.appendChild(list);

  const warning=document.createElement('div');
  warning.style.cssText=`margin-top:1.5rem;display:flex;gap:.75rem;padding:1rem 1.25rem;background:${NEON.gold}0a;border:1px solid ${NEON.gold}40;border-radius:1px`;
  warning.innerHTML=`<span style="color:${NEON.gold};font-family:'Bebas Neue',sans-serif;font-size:1.1rem;flex-shrink:0;text-shadow:0 0 8px ${NEON.gold}">!</span>
  <p style="font-family:'Space Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.38);line-height:1.7;margin:0">Por favor <strong style="color:${NEON.gold}">evita usar blanco puro</strong> para respetar el color de la quinceañera y la paleta de la noche.</p>`;
  sec.appendChild(warning);

  const bot=document.createElement('div');bot.style.marginTop='2rem';bot.appendChild(danceFloorTiles(2));sec.appendChild(bot);
  return sec;
}

// ── RSVP ──────────────────────────────────────────────────────────────────────
function buildRsvp(){
  const sec=document.createElement('section');
  sec.style.cssText=`position:relative;overflow:hidden;padding:4rem 1.5rem 5rem;background:radial-gradient(ellipse at 50% 0%,${NEON.pink}18 0%,${NEON.dark} 70%);text-align:center`;

  sec.appendChild(sectionLabel('CONFIRMA TU PRESENCIA'));
  sec.appendChild(neonTitle('¿NOS ACOMPAÑAS?'));
  sec.appendChild(gradLine(NEON.pink,'1.25rem auto 2rem'));

  sec.innerHTML+=`<p style="font-family:'Playfair Display',serif;font-size:.9rem;font-style:italic;color:rgba(255,255,255,.4);line-height:1.8;margin-bottom:2rem">Tu presencia hará esta noche aún más especial.<br>Confirma antes del <strong style="color:${NEON.gold};text-shadow:0 0 8px ${NEON.gold}80">1 de Noviembre</strong></p>`;

  const box=document.createElement('div');
  box.style.cssText=`padding:2rem 1.75rem;max-width:420px;margin:0 auto;background:${NEON.pink}07;border:1px solid ${NEON.pink}40;box-shadow:0 0 30px ${NEON.pink}15;position:relative`;
  const topGlow=document.createElement('div');
  topGlow.style.cssText=`position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,${NEON.pink},${NEON.cyan},${NEON.pink},transparent);box-shadow:0 0 12px ${NEON.pink}`;
  box.appendChild(topGlow);

  const inSt=`display:block;width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid ${NEON.pink}35;color:#fff;font-size:.85rem;border-radius:0;margin-bottom:.75rem;font-family:'Space Mono',monospace`;
  const nameInput=document.createElement('input');nameInput.type='text';nameInput.placeholder='Tu nombre completo';nameInput.style.cssText=inSt;
  const guestsInput=document.createElement('input');guestsInput.type='number';guestsInput.placeholder='¿Cuántos asistirán?';guestsInput.min=1;guestsInput.max=5;guestsInput.style.cssText=inSt;

  let attendance='yes';
  const toggleRow=document.createElement('div');toggleRow.style.cssText='display:flex;gap:.75rem;margin-bottom:1rem';
  const btnYes=document.createElement('button');
  const btnNo=document.createElement('button');
  function updateToggles(){
    [btnYes,btnNo].forEach((b,i)=>{
      const isActive=(i===0&&attendance==='yes')||(i===1&&attendance==='no');
      b.style.flex='1';b.style.padding='.85rem';
      b.style.fontFamily="'Bebas Neue',sans-serif";b.style.fontSize='.9rem';b.style.letterSpacing='.2em';b.style.cursor='pointer';b.style.transition='all .2s';
      b.style.background=isActive?`${NEON.pink}20`:'transparent';
      b.style.border=`1px solid ${isActive?NEON.pink:`${NEON.pink}30`}`;
      b.style.color=isActive?NEON.pink:'rgba(255,45,120,.4)';
      b.style.textShadow=isActive?`0 0 8px ${NEON.pink}`:'none';
      b.style.boxShadow=isActive?`0 0 14px ${NEON.pink}30`:'none';
    });
  }
  btnYes.textContent='SÍ ASISTIRÉ ✓';btnYes.onclick=()=>{attendance='yes';updateToggles();};
  btnNo.textContent='NO PODRÉ IR ✗';btnNo.onclick=()=>{attendance='no';updateToggles();};
  updateToggles();toggleRow.append(btnYes,btnNo);

  const errEl=document.createElement('p');errEl.style.cssText=`font-family:'Space Mono',monospace;font-size:.62rem;color:${NEON.gold};text-shadow:0 0 6px ${NEON.gold};margin-bottom:.5rem;display:none`;

  const submitBtn=neonBtn('CONFIRMAR ASISTENCIA ▶',NEON.pink,()=>{
    if(!nameInput.value.trim()){errEl.textContent='⚠ Por favor ingresa tu nombre';errEl.style.display='block';return;}
    errEl.style.display='none';
    setTimeout(()=>{
      box.innerHTML='';
      const check=document.createElement('div');
      check.style.cssText=`width:72px;height:72px;border-radius:50%;background:${NEON.pink}20;border:2px solid ${NEON.pink};display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 0 24px ${NEON.pink}60`;
      check.innerHTML=`<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${NEON.pink}" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      const thx=document.createElement('div');thx.style.cssText=`font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.1em;color:${NEON.pink};text-shadow:0 0 20px ${NEON.pink},0 0 40px ${NEON.pink}60`;thx.textContent='¡GRACIAS!';
      const msg=document.createElement('p');msg.style.cssText=`font-family:'Playfair Display',serif;font-size:.9rem;font-style:italic;color:rgba(255,255,255,.45);line-height:1.8;margin-top:.75rem`;
      msg.innerHTML='Tu respuesta ha sido registrada.<br>¡Te esperamos con todo el amor!';
      box.append(check,thx,msg);
    },300);
  });

  const hint=document.createElement('p');
  hint.style.cssText=`font-family:'Space Mono',monospace;font-size:.42rem;letter-spacing:.12em;color:rgba(255,45,120,.3);margin-top:.75rem`;
  hint.textContent='CONFIRMA ANTES DEL 1 DE NOV · CUPOS LIMITADOS';

  box.append(nameInput,guestsInput,toggleRow,errEl,submitBtn,hint);
  sec.appendChild(box);
  return sec;
}

// ── FOOTER ────────────────────────────────────────────────────────────────────
function buildFooter(){
  const footer=document.createElement('footer');
  footer.style.cssText=`position:relative;overflow:hidden;text-align:center;padding:4rem 1.5rem 3rem;background:${NEON.dark}`;

  const topBar=document.createElement('div');
  topBar.style.cssText=`position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,${NEON.pink},${NEON.cyan},${NEON.gold},${NEON.green},${NEON.purple},${NEON.pink});box-shadow:0 0 16px ${NEON.pink}`;
  footer.appendChild(topBar);

  const dbWrap=document.createElement('div');dbWrap.style.cssText='display:flex;justify-content:center;margin-bottom:1.75rem';
  const dbInner=document.createElement('div');dbInner.className='disco-spin';dbInner.style.cssText='width:56px;height:56px';
  dbInner.innerHTML=discoBallSVG(56,'ball2');dbWrap.appendChild(dbInner);footer.appendChild(dbWrap);

  const poem=document.createElement('p');
  poem.style.cssText=`font-family:'Playfair Display',serif;font-style:italic;line-height:2;color:rgba(255,255,255,.4);font-size:.95rem;margin-bottom:1.75rem`;
  poem.innerHTML='Hoy comienzas a escribir<br>el capítulo más hermoso<br>de tu historia.';footer.appendChild(poem);

  const sig=document.createElement('div');
  sig.style.cssText=`display:inline-block;margin-bottom:2rem;padding:.9rem 2.25rem;border:1px solid ${NEON.gold}60;box-shadow:0 0 16px ${NEON.gold}30`;
  sig.innerHTML=`<div style="font-family:'Playfair Display',serif;font-style:italic;font-size:2rem;color:#fff;text-shadow:0 0 20px ${NEON.gold}80">Con amor, Sofía</div>`;
  footer.appendChild(sig);

  footer.appendChild(danceFloorTiles(2));

  const credits=document.createElement('div');
  credits.style.cssText=`padding-top:2rem;margin-top:1rem;border-top:1px solid ${NEON.pink}20`;
  credits.innerHTML=`
    <div style="display:flex;justify-content:center;margin-bottom:1.25rem">
      <img src="https://hercules-cdn.com/file_pD423Fe199o8J0tu0OgVizvy" alt="Gueka Ideas" style="width:170px;filter:brightness(0) invert(1) opacity(0.7)"/>
    </div>
    <p style="font-family:'Space Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.25);max-width:300px;margin:0 auto;line-height:1.7;letter-spacing:.02em">
      Esta plantilla digital es propiedad exclusiva de <strong style="color:rgba(255,255,255,.45)">Gueka Ideas</strong>.
      Uso permitido únicamente para fines personales. Queda prohibida la reproducción, distribución, modificación o reventa sin autorización escrita.
    </p>
    <p style="margin-top:.875rem;font-family:'Space Mono',monospace;font-size:.48rem;color:rgba(255,45,120,.3);letter-spacing:.1em">
      © ${new Date().getFullYear()} GUEKA IDEAS · TODOS LOS DERECHOS RESERVADOS
    </p>`;
  footer.appendChild(credits);
  return footer;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
const app=document.getElementById('app');

function buildInvitation(){
  const card=document.createElement('div');card.className='card';
  const DIVIDER_COLORS=[NEON.pink,NEON.cyan,NEON.gold,NEON.green,NEON.purple,NEON.pink,NEON.cyan,NEON.gold,NEON.pink];
  const sections=[buildHero(),buildTicker(),buildCountdown(),buildDateSection(),buildItinerary(),buildGallery(),buildLocation(),buildGifts(),buildDressCode(),buildRsvp(),buildFooter()];
  sections.forEach((s,i)=>{
    card.appendChild(s);
    card.appendChild(laserLine(DIVIDER_COLORS[i%DIVIDER_COLORS.length]));
  });
  app.innerHTML='';app.appendChild(card);
}

function buildSplashScreen(){
  app.innerHTML='';
  app.appendChild(buildSplash(()=>buildInvitation()));
}

buildSplashScreen();
</script>
