<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Stencil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #141414;
      color: #f2f2f2;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .tag {
      display: block;
      text-align: center;
      color: #c9a96e;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.2rem;
    }

    .panel-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.75rem;
      display: block;
    }

    .upload-btn {
      width: 100%;
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: #666;
      background: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-size: 0.85rem;
    }

    .upload-btn:hover {
      border-color: #c9a96e;
      color: #c9a96e;
    }

    .upload-btn svg { width: 28px; height: 28px; }

    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .preset-btn {
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: none;
      color: #888;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, color 0.2s;
    }

    .preset-btn:hover {
      border-color: #c9a96e;
      color: #c9a96e;
    }

    .controls-section { space-y: 1rem; }

    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .slider-row span {
      font-size: 0.75rem;
      color: #c9a96e;
      font-family: monospace;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #c9a96e;
      cursor: pointer;
    }

    .color-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .color-field {
      flex: 1;
    }

    .color-field label {
      font-size: 0.72rem;
      color: #888;
      display: block;
      margin-bottom: 0.35rem;
    }

    input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 12px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #c9a96e;
      color: #111;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .preview-panel {
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      overflow: hidden;
    }

    .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: #555;
      text-align: center;
      padding: 3rem;
    }

    .preview-empty svg { width: 42px; height: 42px; color: rgba(201,169,110,0.3); }
    .preview-empty p { font-size: 0.85rem; }
    .preview-empty small { font-size: 0.72rem; opacity: 0.5; }

    canvas {
      max-width: 100%;
      max-height: 580px;
      object-fit: contain;
      display: none;
    }

    .gap { margin-top: 1rem; }
  </style>
</head>
<body>

  <span class="tag">Herramienta</span>
  <h1>Generador de Stencil</h1>
  <p class="subtitle">Convierte cualquier imagen en una plantilla de tatuaje. Ajusta el umbral, colores y descarga tu stencil.</p>

  <div class="layout">
    <!-- Controls -->
    <div style="display:flex;flex-direction:column;gap:1rem;">

      <!-- Upload -->
      <div class="panel">
        <span class="panel-label">Imagen</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        <button class="upload-btn" id="uploadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span id="uploadLabel">Subir imagen</span>
        </button>
      </div>

      <!-- Presets -->
      <div class="panel">
        <span class="panel-label">Presets</span>
        <div class="presets">
          <button class="preset-btn" onclick="applyPreset('#ffffff','#000000',128)">Clásico B/N</button>
          <button class="preset-btn" onclick="applyPreset('#f5e6c8','#3b1a0a',140)">Sepia</button>
          <button class="preset-btn" onclick="applyPreset('#e8f0fe','#1a237e',120)">Azul acero</button>
          <button class="preset-btn" onclick="applyPreset('#fce4ec','#8b0000',115)">Rojo sangre</button>
        </div>
      </div>

      <!-- Sliders + Colors -->
      <div class="panel">
        <div class="slider-row">
          <span class="panel-label" style="margin:0">Umbral</span>
          <span id="thresholdVal">128</span>
        </div>
        <input type="range" id="threshold" min="0" max="255" value="128" />

        <div class="color-row">
          <div class="color-field">
            <label>Fondo</label>
            <input type="color" id="bgColor" value="#ffffff" />
          </div>
          <div class="color-field">
            <label>Tinta</label>
            <input type="color" id="inkColor" value="#000000" />
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div>
        <button class="btn btn-primary" onclick="downloadStencil()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar stencil
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Reiniciar
        </button>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-panel" id="previewPanel">
      <div class="preview-empty" id="previewEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        <p>Sube una imagen para generar el stencil</p>
        <small>Acepta JPG, PNG, WebP</small>
      </div>
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script>
    let imageData = null;

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadLabel = document.getElementById('uploadLabel');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const thresholdSlider = document.getElementById('threshold');
    const thresholdVal = document.getElementById('thresholdVal');
    const bgColorInput = document.getElementById('bgColor');
    const inkColorInput = document.getElementById('inkColor');
    const previewEmpty = document.getElementById('previewEmpty');

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        imageData = ev.target.result;
        uploadLabel.textContent = 'Cambiar imagen';
        processImage();
      };
      reader.readAsDataURL(file);
    });

    thresholdSlider.addEventListener('input', () => {
      thresholdVal.textContent = thresholdSlider.value;
      processImage();
    });

    bgColorInput.addEventListener('input', processImage);
    inkColorInput.addEventListener('input', processImage);

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result
        ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) }
        : { r: 0, g: 0, b: 0 };
    }

    function processImage() {
      if (!imageData) return;
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imgDataObj = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgDataObj.data;
        const threshold = parseInt(thresholdSlider.value);
        const bg = hexToRgb(bgColorInput.value);
        const ink = hexToRgb(inkColorInput.value);

        for (let i = 0; i < data.length; i += 4) {
          const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
          const isInk = gray < threshold;
          data[i]     = isInk ? ink.r : bg.r;
          data[i + 1] = isInk ? ink.g : bg.g;
          data[i + 2] = isInk ? ink.b : bg.b;
          data[i + 3] = 255;
        }

        ctx.putImageData(imgDataObj, 0, 0);
        previewEmpty.style.display = 'none';
        canvas.style.display = 'block';
      };
      img.src = imageData;
    }

    function applyPreset(bg, ink, threshold) {
      bgColorInput.value = bg;
      inkColorInput.value = ink;
      thresholdSlider.value = threshold;
      thresholdVal.textContent = threshold;
      processImage();
    }

    function downloadStencil() {
      if (!imageData) { alert('Primero sube una imagen'); return; }
      const link = document.createElement('a');
      link.download = 'stencil.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function resetAll() {
      imageData = null;
      fileInput.value = '';
      uploadLabel.textContent = 'Subir imagen';
      thresholdSlider.value = 128;
      thresholdVal.textContent = 128;
      bgColorInput.value = '#ffffff';
      inkColorInput.value = '#000000';
      canvas.style.display = 'none';
      previewEmpty.style.display = 'flex';
    }
  </script>
</body>
</html>
