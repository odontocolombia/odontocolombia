<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Santiago — Primer Cumpleaños</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:#f5c842; --gold-l:#ffe082; --blue:#00d4ff; --purple:#8b5cf6;
      --dark:#00000e; --dark2:#000830;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--dark);color:#fff;font-family:'Montserrat',sans-serif;overflow-x:hidden;cursor:none}

    /* ── Custom Cursor ── */
    #cur{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 12px var(--gold),0 0 24px rgba(245,200,66,.4);mix-blend-mode:difference;transition:width .15s,height .15s}
    #cur-ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(245,200,66,.45);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .3s,height .3s}
    @media(pointer:coarse){body{cursor:auto}#cur,#cur-ring{display:none}}

    /* ── Canvas ── */
    #cv{position:fixed;inset:0;z-index:0;pointer-events:none}

    /* ── Keyframes ── */
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
    @keyframes revL{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
    @keyframes revR{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes rayRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes glow{0%,100%{box-shadow:0 0 30px rgba(245,200,66,.4),0 0 60px rgba(245,200,66,.15)}50%{box-shadow:0 0 60px rgba(245,200,66,.9),0 0 120px rgba(245,200,66,.3)}}
    @keyframes blinkTap{0%,100%{opacity:.25}50%{opacity:1}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes borderPulse{0%,100%{border-color:rgba(0,212,255,.25)}50%{border-color:rgba(245,200,66,.5)}}
    @keyframes orbit{from{transform:rotate(0deg) translateX(94px) rotate(0deg)}to{transform:rotate(360deg) translateX(94px) rotate(-360deg)}}
    @keyframes orbit2{from{transform:rotate(180deg) translateX(112px) rotate(-180deg)}to{transform:rotate(540deg) translateX(112px) rotate(-540deg)}}
    @keyframes dotPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(0,212,255,.5)}50%{transform:scale(1.3);box-shadow:0 0 0 8px rgba(0,212,255,0)}}
    @keyframes flip{0%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
    @keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(820deg);opacity:0}}
    @keyframes heroLine{from{width:0;opacity:0}to{width:80px;opacity:1}}
    @keyframes splashShield{0%{transform:scale(0) rotate(-15deg);opacity:0;filter:blur(16px)}65%{transform:scale(1.1) rotate(3deg);opacity:1;filter:blur(0)}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes splashText{0%{opacity:0;transform:translateY(24px);filter:blur(8px)}100%{opacity:1;transform:translateY(0);filter:blur(0)}}
    @keyframes splashAge{0%{opacity:0;transform:scale(2.5)}100%{opacity:1;transform:scale(1)}}
    @keyframes scrollDot{0%{transform:translateY(0);opacity:1}100%{transform:translateY(18px);opacity:0}}

    /* ── Splash ── */
    #splash{position:fixed;inset:0;z-index:10000;background:radial-gradient(ellipse at center,#000830 0%,#00000e 100%);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .sp-rays{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .sp-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 55% at 50% 50%,rgba(245,200,66,.1) 0%,transparent 70%);pointer-events:none}

    /* ── Page ── */
    #page{position:relative;z-index:10;opacity:0;transition:opacity .9s ease}
    .sec{padding:5rem 1.25rem;max-width:500px;margin:0 auto}

    /* ── Glassmorphism ── */
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:22px}
    .glass-gold{background:rgba(245,200,66,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(245,200,66,.2);border-radius:22px}

    /* ── Text effects ── */
    .gold-text{background:linear-gradient(135deg,#ffe082 0%,#f5c842 40%,#c9a020 70%,#f5c842 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .shimmer{background:linear-gradient(90deg,#c9a020,#ffe082,#f5c842,#fffde0,#f5c842,#c9a020);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3.5s linear infinite}
    .blue-text{background:linear-gradient(135deg,#00d4ff,#0099dd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* ── Scroll Reveals ── */
    .rv{opacity:0}.rv.on{animation:fadeUp .7s ease forwards}
    .rv-l{opacity:0}.rv-l.on{animation:revL .7s ease forwards}
    .rv-r{opacity:0}.rv-r.on{animation:revR .7s ease forwards}
    .rv-s{opacity:0}.rv-s.on{animation:scaleIn .6s cubic-bezier(.34,1.56,.64,1) forwards}

    /* ── Input ── */
    .inp{width:100%;background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.18);outline:none;font-family:'Montserrat',sans-serif;font-size:.9rem;color:#fff;padding:10px 0;transition:border-color .3s}
    .inp:focus{border-bottom-color:var(--gold)}
    ::placeholder{color:rgba(255,255,255,.28)}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:rgba(245,200,66,.35);border-radius:2px}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:10px;justify-content:center;margin:.75rem 0}
    .dl{flex:1;max-width:56px;height:1px}

    /* ── Hero photo orb ── */
    #orb-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.75rem}
    #orb-ring1{position:absolute;inset:-32px;border-radius:50%;border:1px dashed rgba(0,212,255,.2);animation:rayRot 14s linear infinite;pointer-events:none}
    #orb-ring2{position:absolute;inset:-20px;border-radius:50%;border:1px dashed rgba(245,200,66,.18);animation:rayRot 9s linear infinite reverse;pointer-events:none}
    #orb-dot1{position:absolute;inset:-32px;pointer-events:none}
    #orb-dot2{position:absolute;inset:-40px;pointer-events:none}
    .orb-dot{position:absolute;top:50%;left:50%;border-radius:50%}
    #orb-photo{width:178px;height:178px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#ffe082,#f5c842,#c9a020,#f5c842);box-shadow:0 0 50px rgba(245,200,66,.45),0 0 100px rgba(245,200,66,.15);animation:float 4.2s ease-in-out infinite}
    #orb-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--dark2)}
    #hero-photo{width:100%;height:100%;object-fit:cover;object-position:top}

    /* ── Program timeline ── */
    #prog-wrap{position:relative}
    #prog-line{position:absolute;left:19px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(0,212,255,.35),transparent)}
  </style>
</head>
<body>

<!-- Cursor -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- Particle canvas -->
<canvas id="cv"></canvas>

<!-- ══ SPLASH ══ -->
<div id="splash" onclick="closeSplash()">
  <div class="sp-rays">
    <div style="width:700px;height:700px;animation:rayRot 25s linear infinite;opacity:.12">
      <svg viewBox="0 0 200 200" style="width:100%;height:100%">
        <line x1="100" y1="2" x2="100" y2="198" stroke="#fff" stroke-width=".4"/>
        <line x1="2" y1="100" x2="198" y2="100" stroke="#fff" stroke-width=".4"/>
        <line x1="16" y1="16" x2="184" y2="184" stroke="#fff" stroke-width=".4"/>
        <line x1="184" y1="16" x2="16" y2="184" stroke="#fff" stroke-width=".4"/>
        <line x1="8" y1="52" x2="192" y2="148" stroke="#fff" stroke-width=".25"/>
        <line x1="192" y1="52" x2="8" y2="148" stroke="#fff" stroke-width=".25"/>
        <line x1="52" y1="8" x2="148" y2="192" stroke="#fff" stroke-width=".25"/>
        <line x1="148" y1="8" x2="52" y2="192" stroke="#fff" stroke-width=".25"/>
      </svg>
    </div>
  </div>
  <div class="sp-glow"></div>

  <div style="text-align:center;position:relative;z-index:2">
    <!-- Shield with glow -->
    <div style="animation:splashShield .95s cubic-bezier(.34,1.56,.64,1) .15s both">
      <div style="animation:glow 3s ease-in-out infinite">
        <svg width="88" height="88" viewBox="0 0 80 80">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe082"/><stop offset="50%" stop-color="#f5c842"/><stop offset="100%" stop-color="#c9a020"/>
            </linearGradient>
            <filter id="gf"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
          </defs>
          <path d="M20 10 L60 10 L60 45 Q60 65 40 72 Q20 65 20 45 Z" fill="url(#sg)" filter="url(#gf)"/>
          <path d="M27 17 L53 17 L53 45 Q53 57 40 63 Q27 57 27 45 Z" fill="rgba(0,4,28,.55)"/>
          <polygon points="40,22 42.8,31.5 52.5,31.5 44.8,37 47.6,46.5 40,41 32.4,46.5 35.2,37 27.5,31.5 37.2,31.5" fill="#ffe082"/>
        </svg>
      </div>
    </div>

    <!-- Label -->
    <p style="font-size:.5rem;letter-spacing:.55em;text-transform:uppercase;color:rgba(0,212,255,.85);margin-top:1.5rem;animation:splashText .7s ease .85s both">Celebrando</p>

    <!-- Name -->
    <h1 id="sp-name" class="shimmer" style="font-family:'Playfair Display',serif;font-size:clamp(3.6rem,17vw,5.8rem);font-weight:900;line-height:1;animation:splashText .8s ease 1s both"></h1>

    <!-- Age -->
    <div style="animation:splashAge .65s cubic-bezier(.34,1.56,.64,1) 1.55s both">
      <span id="sp-age" class="gold-text" style="font-family:'Playfair Display',serif;font-size:5.5rem;font-weight:900;filter:drop-shadow(0 0 24px rgba(245,200,66,.6))"></span>
      <span style="font-size:.55rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.55);display:block;margin-top:-.5rem">año de vida</span>
    </div>

    <!-- Tap hint -->
    <p style="font-size:.45rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2rem;animation:blinkTap 2s ease-in-out infinite;animation-delay:2.2s">✦ toca para abrir ✦</p>
  </div>
</div>

<!-- ══ MAIN PAGE ══ -->
<div id="page">

  <!-- ═══ HERO ═══ -->
  <section style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.25rem;position:relative;overflow:hidden">
    <!-- Deep space radial -->
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 40%,rgba(0,40,120,.3) 0%,transparent 70%);pointer-events:none"></div>

    <!-- Eyebrow -->
    <p class="rv" style="font-size:.48rem;letter-spacing:.55em;text-transform:uppercase;color:rgba(0,212,255,.8);margin-bottom:2rem">Únete a nuestra celebración</p>

    <!-- Photo orb -->
    <div id="orb-wrap" class="rv-s">
      <div id="orb-ring1"></div>
      <div id="orb-ring2"></div>
      <!-- Orbiting particles -->
      <div id="orb-dot1">
        <div class="orb-dot" style="width:9px;height:9px;background:var(--blue);box-shadow:0 0 12px var(--blue);margin:-4.5px -4.5px;animation:orbit 6.5s linear infinite"></div>
      </div>
      <div id="orb-dot2">
        <div class="orb-dot" style="width:7px;height:7px;background:var(--gold);box-shadow:0 0 10px var(--gold);margin:-3.5px -3.5px;animation:orbit2 9.5s linear infinite"></div>
      </div>
      <div id="orb-photo">
        <div id="orb-inner">
          <img id="hero-photo" src="" alt=""/>
        </div>
      </div>
    </div>

    <!-- Name -->
    <p class="rv" style="font-size:.45rem;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.35rem">✦ Nuestro pequeño príncipe ✦</p>
    <h1 id="hero-name" class="shimmer rv" style="font-family:'Playfair Display',serif;font-size:clamp(3.4rem,14vw,5rem);font-weight:900;line-height:1;margin-bottom:.75rem"></h1>

    <!-- Age badge -->
    <div class="rv" style="display:inline-flex;align-items:center;gap:14px;padding:.55rem 2rem;border:1px solid rgba(245,200,66,.3);border-radius:50px;background:rgba(245,200,66,.05);animation:borderPulse 4s ease infinite;margin-bottom:2rem">
      <span style="font-size:.45rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5)">cumple</span>
      <span id="hero-age" class="gold-text" style="font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;line-height:1"></span>
      <span style="font-size:.45rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5)">añito</span>
    </div>

    <!-- Date / venue card -->
    <div class="glass rv" style="padding:1.5rem 1.25rem;width:100%;max-width:380px;animation:borderPulse 6s ease infinite">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center">
        <div style="text-align:center">
          <p id="date-label" style="font-size:.42rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-bottom:.2rem"></p>
          <p id="date-day" class="gold-text" style="font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;line-height:1"></p>
          <p id="date-month" style="font-size:.4rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:.15rem"></p>
        </div>
        <div style="width:1px;height:60px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.18),transparent)"></div>
        <div style="text-align:center">
          <p style="font-size:.42rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-bottom:.2rem">Lugar</p>
          <p id="event-venue" style="font-family:'Dancing Script',cursive;font-size:1.15rem;color:var(--gold);line-height:1.2"></p>
          <p id="event-time" style="font-size:.4rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:.3rem"></p>
        </div>
      </div>
    </div>

    <!-- Scroll cue -->
    <div style="position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%)">
      <div style="width:24px;height:38px;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;display:flex;justify-content:center;padding-top:6px">
        <div style="width:4px;height:8px;background:var(--gold);border-radius:2px;animation:scrollDot 1.6s ease-in-out infinite"></div>
      </div>
    </div>
  </section>

  <!-- ═══ COUNTDOWN ═══ -->
  <section class="sec">
    <div class="glass-gold" style="padding:2.5rem 1.5rem;text-align:center">
      <p class="rv" style="font-size:.47rem;letter-spacing:.45em;text-transform:uppercase;color:var(--blue);margin-bottom:.4rem">El Gran Día llega en</p>
      <h2 class="rv gold-text" style="font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;margin-bottom:.5rem">Cuenta Regresiva</h2>
      <div class="divider rv">
        <div class="dl" style="background:linear-gradient(to right,transparent,rgba(245,200,66,.6))"></div>
        <svg width="9" height="9" viewBox="0 0 10 10"><polygon points="5,0 5.8,3.5 9.5,5 5.8,6.5 5,10 4.2,6.5 0.5,5 4.2,3.5" fill="#f5c842"/></svg>
        <div class="dl" style="background:linear-gradient(to left,transparent,rgba(245,200,66,.6))"></div>
      </div>
      <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:1.5rem 0 1rem">
        <div class="glass rv-s" style="min-width:70px;padding:1.2rem .7rem;text-align:center;border-radius:16px"><div id="cd-d" style="font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1">00</div><div style="font-size:.38rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-top:.4rem">Días</div></div>
        <div class="glass rv-s" style="min-width:70px;padding:1.2rem .7rem;text-align:center;border-radius:16px"><div id="cd-h" style="font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1">00</div><div style="font-size:.38rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-top:.4rem">Horas</div></div>
        <div class="glass rv-s" style="min-width:70px;padding:1.2rem .7rem;text-align:center;border-radius:16px"><div id="cd-m" style="font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1">00</div><div style="font-size:.38rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-top:.4rem">Min</div></div>
        <div class="glass rv-s" style="min-width:70px;padding:1.2rem .7rem;text-align:center;border-radius:16px"><div id="cd-s" style="font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1">00</div><div style="font-size:.38rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-top:.4rem">Seg</div></div>
      </div>
      <p id="cd-date" class="rv" style="font-size:.42rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.38)"></p>
    </div>
  </section>

  <!-- ═══ PROGRAM ═══ -->
  <section class="sec">
    <div style="text-align:center;margin-bottom:2.5rem">
      <p class="rv" style="font-size:.47rem;letter-spacing:.45em;text-transform:uppercase;color:var(--blue)">El Evento</p>
      <h2 class="rv gold-text" style="font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;margin-top:.4rem">Programa del Día</h2>
      <div class="divider rv">
        <div class="dl" style="background:linear-gradient(to right,transparent,rgba(245,200,66,.6))"></div>
        <svg width="9" height="9" viewBox="0 0 10 10"><polygon points="5,0 5.8,3.5 9.5,5 5.8,6.5 5,10 4.2,6.5 0.5,5 4.2,3.5" fill="#f5c842"/></svg>
        <div class="dl" style="background:linear-gradient(to left,transparent,rgba(245,200,66,.6))"></div>
      </div>
    </div>
    <div id="prog-wrap">
      <div id="prog-line"></div>
      <div id="prog-list"></div>
    </div>
  </section>

  <!-- ═══ GALLERY ═══ -->
  <section class="sec" style="padding-bottom:2rem">
    <div style="text-align:center;margin-bottom:2rem">
      <p class="rv" style="font-size:.47rem;letter-spacing:.45em;text-transform:uppercase;color:var(--blue)">Momentos</p>
      <h2 class="rv gold-text" style="font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;margin-top:.4rem">Galería</h2>
    </div>
    <div class="glass rv" style="overflow:hidden">
      <div id="gal-main" style="position:relative;aspect-ratio:4/3;overflow:hidden"></div>
      <div id="gal-thumbs" style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:3px 6px 6px"></div>
    </div>
    <div id="gal-dots" style="display:flex;justify-content:center;gap:8px;margin-top:10px"></div>
  </section>

  <!-- ═══ RSVP ═══ -->
  <section class="sec">
    <div class="glass rv" style="padding:2.5rem 1.75rem">
      <div style="text-align:center;margin-bottom:2rem">
        <p class="rv" style="font-size:.47rem;letter-spacing:.45em;text-transform:uppercase;color:var(--blue);margin-bottom:.4rem">Confirmar</p>
        <h2 class="rv gold-text" style="font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;margin-bottom:.5rem">Asistencia</h2>
        <p id="rsvp-sub" class="rv" style="font-size:.42rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35)"></p>
      </div>
      <div id="rsvp-area">
        <form id="rsvp-form" style="max-width:300px;margin:0 auto">
          <div style="margin-bottom:1.5rem">
            <label style="font-size:.4rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:.5rem">Nombre</label>
            <input id="rsvp-name" type="text" placeholder="Tu nombre completo" required class="inp"/>
          </div>
          <div style="margin-bottom:1.5rem">
            <label style="font-size:.4rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:.5rem">Invitados</label>
            <input id="rsvp-guests" type="text" placeholder="Número de personas" class="inp"/>
          </div>
          <div style="margin-bottom:2rem">
            <label style="font-size:.4rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:.5rem">Mensaje</label>
            <textarea id="rsvp-msg" placeholder="Un mensaje especial…" rows="3" class="inp" style="resize:none"></textarea>
          </div>
          <button id="rsvp-btn" type="submit" style="width:100%;padding:1rem;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.52rem;letter-spacing:.4em;text-transform:uppercase;color:#000;background:linear-gradient(135deg,#ffe082,#f5c842,#c9a020);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 22px rgba(245,200,66,.4);transition:transform .2s,box-shadow .2s">✦ Confirmar por WhatsApp ✦</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="text-align:center;padding:3.5rem 1.5rem;position:relative;z-index:10">
    <div style="margin-bottom:1rem">
      <svg width="40" height="40" viewBox="0 0 80 80"><defs><linearGradient id="sgf" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe082"/><stop offset="50%" stop-color="#f5c842"/><stop offset="100%" stop-color="#c9a020"/></linearGradient></defs><path d="M20 10 L60 10 L60 45 Q60 65 40 72 Q20 65 20 45 Z" fill="url(#sgf)" opacity=".85"/><path d="M27 17 L53 17 L53 45 Q53 57 40 63 Q27 57 27 45 Z" fill="rgba(0,4,28,.55)"/><polygon points="40,22 42.8,31.5 52.5,31.5 44.8,37 47.6,46.5 40,41 32.4,46.5 35.2,37 27.5,31.5 37.2,31.5" fill="#ffe082"/></svg>
    </div>
    <h3 id="foot-name" class="gold-text" style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:.3rem"></h3>
    <p id="foot-label" style="font-family:'Dancing Script',cursive;font-size:1.2rem;color:rgba(255,255,255,.5);margin-bottom:.4rem"></p>
    <p id="foot-date" style="font-size:.42rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.3)"></p>
    <p style="font-family:'Dancing Script',cursive;font-size:1rem;color:rgba(255,255,255,.25);margin-top:2rem">"Hecho con amor ✦"</p>
  </footer>
</div>

<!-- Confetti -->
<div id="cnf" style="position:fixed;inset:0;pointer-events:none;z-index:99999;overflow:hidden"></div>

<script>
// ══════════════════════════════════════════════════
//  ✏  PERSONALIZA AQUÍ
// ══════════════════════════════════════════════════
const CFG = {
  name:        "Santiago",
  age:         1,
  eventDate:   "2026-08-15T16:00:00",
  dateDisplay: "Sábado, 15 de Agosto 2026",
  dateLine1:   "Sábado",
  dateMonth:   "Agosto",
  dateDay:     "15",
  dateYear:    "2026",
  time:        "4:00 PM",
  venue:       "The Party Palace",
  address:     "123 Av. Celebración, Happyville",
  phone:       "123456789",   // incluye código de país sin + p.ej. 521234567890
  rsvpTo:      "Mamá",
  photo: "https://images.unsplash.com/photo-1519689680058-324335c77eba?w=500&q=80",
  gallery: [
    { src: "https://images.unsplash.com/photo-1734943842257-268c716c2701?w=800&q=80", cap: "El festejado" },
    { src: "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&q=80", cap: "El pastel" },
    { src: "https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800&q=80", cap: "Globos y decoración" },
    { src: "https://images.unsplash.com/photo-1602631985686-1bb0e6a8696e?w=800&q=80", cap: "La celebración" },
    { src: "https://images.unsplash.com/photo-1575783970733-1aaedde1db74?w=800&q=80", cap: "Momentos especiales" },
    { src: "https://images.unsplash.com/photo-1513151233558-d860c5398176?w=800&q=80", cap: "Con amor" },
  ],
  program: [
    { time: "3:30 pm", title: "Llegada de invitados", desc: "Bienvenida y recepción" },
    { time: "4:00 pm", title: "¡Hora de la fiesta!",  desc: "Juegos y actividades" },
    { time: "5:00 pm", title: "El pastel y festejo",  desc: "¡Feliz Cumpleaños! 🎂" },
    { time: "6:00 pm", title: "Convivencia familiar", desc: "Música y alegría" },
    { time: "7:00 pm", title: "Despedida",            desc: "Gracias por venir ✦" },
  ],
};
// ══════════════════════════════════════════════════

// ── Static content ──
document.getElementById("sp-name").textContent = CFG.name;
document.getElementById("sp-age").textContent  = CFG.age;
document.getElementById("hero-photo").src  = CFG.photo;
document.getElementById("hero-photo").alt  = CFG.name;
document.getElementById("hero-name").textContent = CFG.name;
document.getElementById("hero-age").textContent  = CFG.age;
document.getElementById("date-label").textContent = CFG.dateLine1;
document.getElementById("date-day").textContent   = CFG.dateDay;
document.getElementById("date-month").textContent = CFG.dateMonth + " " + CFG.dateYear;
document.getElementById("event-venue").textContent = CFG.venue;
document.getElementById("event-time").textContent  = CFG.time;
document.getElementById("rsvp-sub").textContent = "RSVP a " + CFG.rsvpTo + " · " + CFG.phone;
document.getElementById("cd-date").textContent  = CFG.dateDisplay;
document.getElementById("foot-name").textContent  = CFG.name;
document.getElementById("foot-label").textContent = "¡cumple " + CFG.age + "!";
document.getElementById("foot-date").textContent  = CFG.dateDisplay;

// ── Custom Cursor ──
const cur = document.getElementById("cur");
const curR = document.getElementById("cur-ring");
let mx = -200, my = -200, rx = -200, ry = -200;
document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; cur.style.left = mx+"px"; cur.style.top = my+"px"; });
(function animRing(){ rx += (mx-rx)*.11; ry += (my-ry)*.11; curR.style.left = rx+"px"; curR.style.top = ry+"px"; requestAnimationFrame(animRing); })();
document.addEventListener("mousedown", () => { cur.style.width="16px"; cur.style.height="16px"; curR.style.width="52px"; curR.style.height="52px"; });
document.addEventListener("mouseup",   () => { cur.style.width="10px"; cur.style.height="10px"; curR.style.width="38px"; curR.style.height="38px"; });

// ── Particle Canvas ──
const cv = document.getElementById("cv");
const cx = cv.getContext("2d");
const resize = () => { cv.width = innerWidth; cv.height = innerHeight; };
resize(); window.addEventListener("resize", resize);

// Stars
const STARS = Array.from({length: 140}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.4+.25, speed: Math.random()*.25+.04,
  op: Math.random()*.65+.1, tp: Math.random()*Math.PI*2, ts: Math.random()*.018+.004,
  col: Math.random()>.88 ? "#f5c842" : Math.random()>.6 ? "#00d4ff" : "#fff",
}));

// Shooting stars
const shots = [];
const spawnShot = () => shots.push({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight*.45,
  vx: Math.random()*7+4, vy: Math.random()*3+1,
  len: Math.random()*90+50, op: 1,
});
setInterval(() => { if(Math.random()>.4) spawnShot(); }, 5500);
spawnShot(); // immediate first one

// Click burst
const bursts = [];
document.addEventListener("click", e => {
  if(document.getElementById("splash").style.display !== "none") return;
  for(let i=0;i<14;i++){
    const a = (i/14)*Math.PI*2, s = Math.random()*3.5+1;
    bursts.push({ x:e.clientX, y:e.clientY, vx:Math.cos(a)*s, vy:Math.sin(a)*s, r:Math.random()*3+1, life:1, col:Math.random()>.5?"#f5c842":"#00d4ff" });
  }
});

(function drawLoop(){
  cx.clearRect(0,0,cv.width,cv.height);
  // Stars
  STARS.forEach(s => {
    s.tp += s.ts;
    const tw = .45 + .55*Math.sin(s.tp);
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle = s.col; cx.globalAlpha = s.op*tw; cx.fill(); cx.globalAlpha = 1;
    s.y += s.speed*.08;
    if(s.y > cv.height) { s.y = 0; s.x = Math.random()*cv.width; }
  });
  // Shooting stars
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i];
    cx.beginPath(); cx.moveTo(s.x,s.y); cx.lineTo(s.x - s.vx*(s.len/10), s.y - s.vy*(s.len/10));
    const g = cx.createLinearGradient(s.x,s.y, s.x-s.vx*(s.len/10), s.y-s.vy*(s.len/10));
    g.addColorStop(0,`rgba(255,255,255,${s.op})`); g.addColorStop(1,"rgba(255,255,255,0)");
    cx.strokeStyle=g; cx.lineWidth=1.6; cx.globalAlpha=s.op; cx.stroke(); cx.globalAlpha=1;
    s.x+=s.vx; s.y+=s.vy; s.op-=.018;
    if(s.op<=0||s.x>cv.width+120) shots.splice(i,1);
  }
  // Click bursts
  for(let i=bursts.length-1;i>=0;i--){
    const p=bursts[i];
    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    cx.fillStyle=p.col; cx.globalAlpha=p.life; cx.fill(); cx.globalAlpha=1;
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.life-=.04;
    if(p.life<=0) bursts.splice(i,1);
  }
  requestAnimationFrame(drawLoop);
})();

// ── Parallax on scroll ──
const hero = document.querySelector("section");
window.addEventListener("scroll", () => {
  const y = window.scrollY;
  hero.style.backgroundPositionY = y * .4 + "px";
});

// ── Splash ──
function closeSplash(){
  const sp = document.getElementById("splash");
  sp.style.transition = "opacity .85s ease";
  sp.style.opacity = "0";
  setTimeout(() => { sp.style.display="none"; document.getElementById("page").style.opacity="1"; }, 850);
}
setTimeout(closeSplash, 4200);

// ── Countdown ──
function updateCD(){
  const diff = Math.max(0, new Date(CFG.eventDate).getTime() - Date.now());
  const vals = [
    String(Math.floor(diff/86400000)).padStart(2,"0"),
    String(Math.floor((diff%86400000)/3600000)).padStart(2,"0"),
    String(Math.floor((diff%3600000)/60000)).padStart(2,"0"),
    String(Math.floor((diff%60000)/1000)).padStart(2,"0"),
  ];
  ["cd-d","cd-h","cd-m","cd-s"].forEach((id,i) => {
    const el = document.getElementById(id);
    if(el.textContent !== vals[i]){
      el.style.animation="none"; el.offsetHeight; el.style.animation="flip .35s ease";
      el.textContent = vals[i];
    }
  });
}
updateCD(); setInterval(updateCD, 1000);

// ── Program ──
const pList = document.getElementById("prog-list");
CFG.program.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = i%2===0 ? "rv-l" : "rv-r";
  div.style.cssText = "display:flex;align-items:flex-start;gap:14px;padding:14px 8px 14px 0";
  div.innerHTML = `
    <div style="flex-shrink:0;width:38px;display:flex;justify-content:center;padding-top:6px">
      <div style="width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#f5c842);box-shadow:0 0 14px rgba(0,212,255,.7);animation:dotPulse 2.2s ease infinite;animation-delay:${i*.35}s"></div>
    </div>
    <div class="glass" style="flex:1;padding:.9rem 1.1rem;border-radius:16px;cursor:default;transition:transform .2s,box-shadow .2s" onmouseover="this.style.transform='translateX(5px)';this.style.boxShadow='0 8px 30px rgba(0,212,255,.12)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
      <div style="font-size:.42rem;letter-spacing:.25em;text-transform:uppercase;color:#f5c842;font-weight:700;margin-bottom:.3rem">${item.time}</div>
      <div style="font-family:'Playfair Display',serif;font-size:1rem;color:#fff;margin-bottom:.2rem">${item.title}</div>
      <div style="font-size:.4rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4)">${item.desc}</div>
    </div>`;
  pList.appendChild(div);
});

// ── Gallery ──
let gIdx = 0;
const gMain = document.getElementById("gal-main");
const gThumbs = document.getElementById("gal-thumbs");
const gDots = document.getElementById("gal-dots");

CFG.gallery.forEach((g, i) => {
  const slide = document.createElement("div");
  slide.style.cssText = `position:absolute;inset:0;opacity:${i===0?1:0};transition:opacity .6s`;
  slide.innerHTML = `<img src="${g.src}" alt="${g.cap}" style="width:100%;height:100%;object-fit:cover"/>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,4,28,.85) 0%,transparent 55%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:.85rem 1rem;display:flex;justify-content:space-between;align-items:flex-end">
      <span style="font-size:.42rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.85)">${g.cap}</span>
      <span style="font-family:'Playfair Display',serif;font-size:.85rem;color:var(--gold)">${String(i+1).padStart(2,"0")} / ${String(CFG.gallery.length).padStart(2,"0")}</span>
    </div>`;
  gMain.appendChild(slide);

  const th = document.createElement("div");
  th.style.cssText = `aspect-ratio:1;overflow:hidden;border-radius:5px;cursor:pointer;border:2px solid ${i===0?"#f5c842":"rgba(255,255,255,.08)"};transition:.2s;transform:${i===0?"scale(1.06)":"scale(1)"}`;
  th.innerHTML = `<img src="${g.src}" alt="" style="width:100%;height:100%;object-fit:cover;filter:${i===0?"none":"brightness(.35)"};transition:.2s"/>`;
  th.onclick = () => goGal(i);
  gThumbs.appendChild(th);

  const dot = document.createElement("button");
  dot.style.cssText = `height:3px;border-radius:2px;border:none;cursor:pointer;background:var(--gold);width:${i===0?"24px":"8px"};opacity:${i===0?1:.3};transition:.3s;padding:0`;
  dot.onclick = () => goGal(i);
  gDots.appendChild(dot);
});

["prev","next"].forEach(dir => {
  const btn = document.createElement("button");
  btn.innerHTML = dir==="prev" ? "‹" : "›";
  btn.style.cssText = `position:absolute;top:50%;transform:translateY(-50%);${dir==="prev"?"left":"right"}:10px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);cursor:pointer;color:var(--gold);font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:.2s`;
  btn.onmouseover = () => btn.style.background="rgba(245,200,66,.18)";
  btn.onmouseout  = () => btn.style.background="rgba(0,0,0,.5)";
  btn.onclick = () => goGal(gIdx + (dir==="next"?1:-1));
  gMain.appendChild(btn);
});

function goGal(i){
  const slides = gMain.querySelectorAll("div[style*='position:absolute']");
  gIdx = ((i%CFG.gallery.length)+CFG.gallery.length)%CFG.gallery.length;
  slides.forEach((s,j) => s.style.opacity = j===gIdx ? 1 : 0);
  Array.from(gThumbs.children).forEach((t,j) => {
    t.style.border = `2px solid ${j===gIdx?"#f5c842":"rgba(255,255,255,.08)"}`;
    t.style.transform = j===gIdx ? "scale(1.06)" : "scale(1)";
    t.querySelector("img").style.filter = j===gIdx ? "none" : "brightness(.35)";
  });
  Array.from(gDots.children).forEach((d,j) => { d.style.width=j===gIdx?"24px":"8px"; d.style.opacity=j===gIdx?1:.3; });
}
let swX=0;
gMain.addEventListener("touchstart", e => swX=e.touches[0].clientX);
gMain.addEventListener("touchend",   e => { const d=swX-e.changedTouches[0].clientX; if(Math.abs(d)>48) goGal(gIdx+(d>0?1:-1)); });

// ── Scroll Reveal ──
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add("on"); obs.unobserve(e.target); } });
}, {threshold: .12});
document.querySelectorAll(".rv,.rv-l,.rv-r,.rv-s").forEach(el => obs.observe(el));

// ── 3D Tilt ──
document.querySelectorAll(".glass,.glass-gold").forEach(card => {
  card.addEventListener("mousemove", e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
    card.style.transform = `perspective(900px) rotateX(${-y*5}deg) rotateY(${x*5}deg)`;
    card.style.boxShadow = `${-x*12}px ${-y*12}px 40px rgba(0,212,255,.08)`;
  });
  card.addEventListener("mouseleave", () => { card.style.transform=""; card.style.boxShadow=""; });
});

// ── Confetti burst ──
const CONF_COLS = ["#f5c842","#ffe082","#00d4ff","#8b5cf6","#ff6b9d","#ffffff","#00ff88"];
function launchConfetti(){
  const container = document.getElementById("cnf");
  for(let i=0;i<90;i++){
    const el = document.createElement("div");
    const sz = Math.random()*9+4, isCircle=Math.random()>.5;
    const col = CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)];
    const x = 15+Math.random()*70, dur = Math.random()*2.5+2, delay=Math.random()*1.2;
    el.style.cssText = `position:absolute;left:${x}%;top:-20px;width:${sz}px;height:${isCircle?sz:sz*2.5}px;background:${col};border-radius:${isCircle?"50%":"2px"};animation:confettiFall ${dur}s ease-in ${delay}s forwards`;
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur+delay+.5)*1000);
  }
}

// ── RSVP → WhatsApp ──
const rsvpBtn = document.getElementById("rsvp-btn");
rsvpBtn.addEventListener("mouseover", () => { rsvpBtn.style.transform="scale(1.03)"; rsvpBtn.style.boxShadow="0 8px 32px rgba(245,200,66,.65)"; });
rsvpBtn.addEventListener("mouseout",  () => { rsvpBtn.style.transform=""; rsvpBtn.style.boxShadow="0 4px 22px rgba(245,200,66,.4)"; });

document.getElementById("rsvp-form").addEventListener("submit", function(e){
  e.preventDefault();
  const name   = document.getElementById("rsvp-name").value.trim();
  const guests = document.getElementById("rsvp-guests").value.trim();
  const msg    = document.getElementById("rsvp-msg").value.trim();
  if(!name) return;

  let text = `¡Hola! Confirmo asistencia a la fiesta de *${CFG.name}* 🎉\n\n`;
  text += `👤 *Nombre:* ${name}\n`;
  if(guests) text += `👥 *Invitados:* ${guests}\n`;
  if(msg)    text += `💬 *Mensaje:* ${msg}\n`;
  text += `\n📅 ${CFG.dateDisplay} · ${CFG.time}\n📍 ${CFG.venue}`;

  const phone = CFG.phone.replace(/\D/g,"");
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

  launchConfetti();

  document.getElementById("rsvp-area").innerHTML = `
    <div style="text-align:center;padding:2.5rem 0">
      <div style="font-size:3.8rem;margin-bottom:1rem;animation:scaleIn .5s cubic-bezier(.34,1.56,.64,1)">🎉</div>
      <h3 class="gold-text" style="font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;margin-bottom:.5rem">¡Gracias!</h3>
      <p style="font-size:.85rem;color:rgba(255,255,255,.55);font-family:'Montserrat',sans-serif;margin-bottom:1.75rem">Abriendo WhatsApp con tu confirmación…</p>
      <a href="${waUrl}" target="_blank" style="display:inline-block;padding:.9rem 2.2rem;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.5rem;letter-spacing:.4em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#25d366,#128c50);border-radius:50px;text-decoration:none;box-shadow:0 6px 24px rgba(37,211,102,.45)">Abrir WhatsApp</a>    </div>`;

  window.open(waUrl, "_blank");
});
</script>
</body>
</html>
