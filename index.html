<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Profesional de Invitaciones</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e2e; color: #e4e4e7; overflow: hidden; height: 100vh; }

/* ═══ LAYOUT PRINCIPAL ═══ */
.editor-layout { display: grid; grid-template-columns: 320px 1fr 400px; height: 100vh; }

/* ═══ SIDEBAR IZQUIERDO - BIBLIOTECA ═══ */
.sidebar-left { background: #252537; border-right: 1px solid #3a3a52; display: flex; flex-direction: column; overflow: hidden; }

.sidebar-header { padding: 15px; border-bottom: 1px solid #3a3a52; }
.sidebar-header h1 { font-size: 1rem; color: #d4af37; margin-bottom: 8px; }

/* Búsqueda */
.search-box { position: relative; margin-bottom: 10px; }
.search-box input { width: 100%; padding: 8px 12px 8px 32px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 6px; color: #e4e4e7; font-size: 0.85rem; }
.search-box::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; }

/* Filtros rápidos */
.quick-filters { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-chip { padding: 4px 10px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 12px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
.filter-chip:hover, .filter-chip.active { background: #d4af37; color: #1a1a2a; border-color: #d4af37; }

/* Categorías tipo Accordion */
.categories-container { flex: 1; overflow-y: auto; padding: 10px; }
.category-group { margin-bottom: 8px; }
.category-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #2d2d44; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.category-header:hover { background: #353550; }
.category-header.active { background: #d4af37; color: #1a1a2a; }
.category-title { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.category-count { background: #1e1e2e; color: #d4af37; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
.category-header.active .category-count { background: #1a1a2a; color: #d4af37; }
.category-arrow { transition: transform 0.3s; font-size: 0.7rem; }
.category-header.active .category-arrow { transform: rotate(180deg); }

/* Grid de plantillas */
.templates-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px 0; max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.templates-grid.open { max-height: 2000px; }

.template-card { background: #1e1e2e; border: 2px solid #3a3a52; border-radius: 8px; cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative; }
.template-card:hover { border-color: #d4af37; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.2); }
.template-card.active { border-color: #d4af37; box-shadow: 0 0 0 2px rgba(212,175,55,0.3); }
.template-thumb { width: 100%; aspect-ratio: 3/4; background: linear-gradient(135deg, #3a3a52, #2d2d44); display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative; overflow: hidden; }
.template-thumb img { width: 100%; height: 100%; object-fit: cover; }
.template-info { padding: 6px 8px; }
.template-name { font-size: 0.72rem; font-weight: 600; color: #e4e4e7; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.template-meta { font-size: 0.65rem; color: #888; display: flex; justify-content: space-between; align-items: center; }
.template-fav { cursor: pointer; font-size: 0.8rem; opacity: 0.5; transition: opacity 0.2s; }
.template-fav:hover, .template-fav.active { opacity: 1; color: #ff6b6b; }
.template-badge { position: absolute; top: 5px; right: 5px; background: #d4af37; color: #1a1a2a; font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; font-weight: 700; }

/* Sidebar acciones inferiores */
.sidebar-footer { padding: 10px 15px; border-top: 1px solid #3a3a52; display: flex; gap: 6px; }
.sidebar-footer .btn { flex: 1; justify-content: center; font-size: 0.75rem; padding: 8px; }

/* ═══ PREVIEW CENTRAL ═══ */
.preview-center { background: #2a2a3e; overflow: auto; padding: 30px; display: flex; justify-content: center; align-items: flex-start; }
.preview-frame-wrap { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
#cardPreview { width: 420px; height: 900px; border: none; }

/* ═══ SIDEBAR DERECHO - EDITOR ═══ */
.sidebar-right { background: #252537; border-left: 1px solid #3a3a52; display: flex; flex-direction: column; overflow: hidden; }
.editor-header { padding: 15px; border-bottom: 1px solid #3a3a52; background: #2a2a42; }
.editor-header h2 { font-size: 0.95rem; color: #d4af37; margin-bottom: 4px; }
.editor-header p { font-size: 0.7rem; color: #888; }

/* Tabs del editor */
.editor-tabs { display: flex; border-bottom: 1px solid #3a3a52; background: #2a2a42; }
.editor-tab { flex: 1; padding: 10px 5px; border: none; background: none; color: #888; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; font-weight: 600; }
.editor-tab:hover { color: #e4e4e7; }
.editor-tab.active { color: #d4af37; border-bottom-color: #d4af37; background: #252537; }

.editor-body { flex: 1; overflow-y: auto; padding: 15px; }

.field-group { margin-bottom: 14px; }
.field-label { display: block; font-size: 0.72rem; color: #a0a0b8; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input, .field-textarea, .field-select { width: 100%; padding: 8px 10px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 6px; color: #e4e4e7; font-size: 0.85rem; font-family: inherit; }
.field-input:focus, .field-textarea:focus, .field-select:focus { outline: none; border-color: #d4af37; }
.field-textarea { resize: vertical; min-height: 60px; }

.color-field { display: flex; align-items: center; gap: 8px; }
.color-field input[type="color"] { width: 36px; height: 32px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
.color-hex { flex: 1; padding: 8px 10px; background: #1e1e2e; border: 1px solid #3a3a52; border-radius: 4px; color: #e4e4e7; font-size: 0.8rem; font-family: monospace; }

.image-upload { border: 2px dashed #3a3a52; border-radius: 6px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
.image-upload:hover { border-color: #d4af37; background: rgba(212,175,55,0.05); }
.image-upload input { display: none; }

/* ═══ TOOLBAR SUPERIOR ═══ */
.top-bar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #1a1a2a; border-bottom: 1px solid #3a3a52; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
.top-bar .title { font-size: 0.85rem; color: #d4af37; font-weight: 600; }
.top-bar .actions { display: flex; gap: 8px; }
.btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: #d4af37; color: #1a1a2a; }
.btn-primary:hover { background: #e6c04a; }
.btn-secondary { background: #3a3a52; color: #e4e4e7; }
.btn-secondary:hover { background: #4a4a62; }

.editor-layout { margin-top: 50px; height: calc(100vh - 50px); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e1e2e; }
::-webkit-scrollbar-thumb { background: #3a3a52; border-radius: 3px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="title">✝️ Editor Profesional de Invitaciones</div>
  <div class="actions">
    <button class="btn btn-secondary" onclick="resetDefaults()">↺ Restablecer</button>
    <button class="btn btn-secondary" onclick="saveProject()">💾 Guardar</button>
    <button class="btn btn-secondary" onclick="loadProjectFromFile()">📂 Cargar</button>
    <button class="btn btn-primary" onclick="exportHTML()">📥 Exportar HTML</button>
  </div>
</div>

<div class="editor-layout">
  <!-- ═══ SIDEBAR IZQUIERDO - BIBLIOTECA ═══ -->
  <div class="sidebar-left">
    <div class="sidebar-header">
      <h1>📚 Biblioteca de Plantillas</h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar plantilla..." oninput="filterTemplates()">
      </div>
      <div class="quick-filters">
        <div class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">Todas</div>
        <div class="filter-chip" data-filter="favorites" onclick="setFilter('favorites', this)">⭐ Favoritas</div>
        <div class="filter-chip" data-filter="new" onclick="setFilter('new', this)">🆕 Nuevas</div>
        <div class="filter-chip" data-filter="popular" onclick="setFilter('popular', this)">🔥 Populares</div>
      </div>
    </div>
    
    <div class="categories-container" id="categoriesContainer">
      <!-- Se genera dinámicamente -->
    </div>
    
    <div class="sidebar-footer">
      <button class="btn btn-secondary" onclick="importTemplates()">📥 Importar</button>
      <button class="btn btn-secondary" onclick="exportTemplates()">📤 Exportar</button>
    </div>
  </div>

  <!-- ═══ PREVIEW CENTRAL ═══ -->
  <div class="preview-center">
    <div class="preview-frame-wrap">
      <iframe id="cardPreview"></iframe>
    </div>
  </div>

  <!-- ═══ SIDEBAR DERECHO - EDITOR ═══ -->
  <div class="sidebar-right">
    <div class="editor-header">
      <h2 id="editorTitle">Configuración</h2>
      <p id="editorDesc">Edita los elementos de la plantilla</p>
    </div>
    
    <div class="editor-tabs">
      <button class="editor-tab active" onclick="switchEditorTab('text', this)">📝 Texto</button>
      <button class="editor-tab" onclick="switchEditorTab('media', this)">🖼️ Media</button>
      <button class="editor-tab" onclick="switchEditorTab('palette', this)">🎨 Paleta</button>
      <button class="editor-tab" onclick="switchEditorTab('advanced', this)">⚙️ Avanzado</button>
    </div>
    
    <div class="editor-body" id="editorBody">
      <!-- Campos dinámicos -->
    </div>
  </div>
</div>

let state = {
  currentTemplateId: 'bautizo-azul-clasico',
  currentCategory: 'bautizos',
  currentPalette: 1,
  currentEditorTab: 'text',
  currentFilter: 'all',

// ═══════════════════════════════════════════════
// 🎨 RENDERIZADO DE CATEGORÍAS Y PLANTILLAS
// ═══════════════════════════════════════════════
function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  let html = '';
  
  Object.keys(TEMPLATES_REGISTRY).forEach(catKey => {
    const cat = TEMPLATES_REGISTRY[catKey];
    const isOpen = state.openCategories.includes(catKey);
    const filteredTemplates = filterTemplatesList(cat.templates);
    
    if (state.currentFilter !== 'all' && filteredTemplates.length === 0) return;
    
    html += `
      <div class="category-group">
        <div class="category-header ${isOpen ? 'active' : ''}" onclick="toggleCategory('${catKey}')">
          <div class="category-title">
            <span>${cat.icon}</span>
            <span>${cat.name.replace(cat.icon + ' ', '')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="category-count">${cat.templates.length}</span>
            <span class="category-arrow">▼</span>
          </div>
        </div>
        <div class="templates-grid ${isOpen ? 'open' : ''}">
          ${filteredTemplates.map(t => renderTemplateCard(t)).join('')}
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function renderTemplateCard(t) {
  const isActive = state.currentTemplateId === t.id;
  const isFav = state.favorites.includes(t.id);
  
  return `
    <div class="template-card ${isActive ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
      ${t.badge ? `<div class="template-badge">${t.badge}</div>` : ''}
      <div class="template-thumb">${t.thumbnail}</div>
      <div class="template-info">
        <div class="template-name">${t.name}</div>
        <div class="template-meta">
          <span>${t.gender === 'niño' ? '👦' : t.gender === 'niña' ? '👧' : '👶'}</span>
          <span class="template-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${t.id}')">${isFav ? '❤️' : '🤍'}</span>
        </div>
      </div>
    </div>
  `;
}

function filterTemplatesList(templates) {
  let result = templates;
  
  // Filtro por búsqueda
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    result = result.filter(t => 
      t.name.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }
  
  // Filtro rápido
  if (state.currentFilter === 'favorites') {
    result = result.filter(t => state.favorites.includes(t.id));
  } else if (state.currentFilter === 'new') {
    result = result.filter(t => t.isNew);
  } else if (state.currentFilter === 'popular') {
    result = result.filter(t => t.isPopular);
  }
  
  return result;
}

function filterTemplates() {
  state.searchQuery = document.getElementById('searchInput').value;
  renderCategories();
}

function setFilter(filter, el) {
  state.currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCategories();
}

function toggleCategory(catKey) {
  const idx = state.openCategories.indexOf(catKey);
  if (idx >= 0) state.openCategories.splice(idx, 1);
  else state.openCategories.push(catKey);
  renderCategories();
}

function toggleFavorite(templateId) {
  const idx = state.favorites.indexOf(templateId);
  if (idx >= 0) state.favorites.splice(idx, 1);
  else state.favorites.push(templateId);
  localStorage.setItem('favorites', JSON.stringify(state.favorites));
  renderCategories();
}

// ═══════════════════════════════════════════════
// 🎯 SELECCIÓN DE PLANTILLA
// ═══════════════════════════════════════════════
function findTemplate(id) {
  for (const catKey in TEMPLATES_REGISTRY) {
    const found = TEMPLATES_REGISTRY[catKey].templates.find(t => t.id === id);
    if (found) return found;
  }
  return null;
}

function selectTemplate(id) {
  state.currentTemplateId = id;
  const template = findTemplate(id);
  if (template) {
    state.currentCategory = template.category;
    if (!state.openCategories.includes(template.category)) {
      state.openCategories.push(template.category);
    }
  }
  renderCategories();
  renderEditor();
  renderCard();
}

// ═══════════════════════════════════════════════
// 🔄 ACTUALIZACIÓN DE DATOS
// ═══════════════════════════════════════════════
function updateData(key, value) {
  const template = findTemplate(state.currentTemplateId);
  if (template) {
    template.data[key] = value;
    renderCard();
  }
}

function updateDate(isoStr) {
  const template = findTemplate(state.currentTemplateId);
  if (!template) return;
  
  const d = new Date(isoStr);
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  
  template.data.eventDateISO = isoStr;
  if (template.data.dayName !== undefined) template.data.dayName = days[d.getDay()];
  if (template.data.dateDay !== undefined) template.data.dateDay = days[d.getDay()];
  if (template.data.dayNumber !== undefined) template.data.dayNumber = String(d.getDate()).padStart(2, '0');
  if (template.data.dateNumber !== undefined) template.data.dateNumber = String(d.getDate()).padStart(2, '0');
  if (template.data.monthName !== undefined) template.data.monthName = months[d.getMonth()];
  if (template.data.dateMonth !== undefined) template.data.dateMonth = months[d.getMonth()];
  
  renderEditor();
  renderCard();
}

function selectPalette(pKey) {
  state.currentPalette = pKey;
  renderEditor();
  renderCard();
}

function updateColor(key, value) {
  const template = findTemplate(state.currentTemplateId);
  if (template && template.palettes[state.currentPalette]) {
    template.palettes[state.currentPalette][key] = value;
    renderEditor();
    renderCard();
  }
}

function handleImageUpload(input, key) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      updateData(key, e.target.result);
      renderEditor();
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function handleGalleryUpload(input) {
  if (input.files) {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const template = findTemplate(state.currentTemplateId);
        if (template) {
          if (!template.data.galleryImages) template.data.galleryImages = [];
          template.data.galleryImages.push(e.target.result);
          renderEditor();
          renderCard();
        }
      };
      reader.readAsDataURL(file);
    });
  }
}

function updateGalleryImage(index, value) {
  const template = findTemplate(state.currentTemplateId);
  if (template && template.data.galleryImages) {
    template.data.galleryImages[index] = value;
    renderCard();
  }
}

function removeGalleryImage(index) {
  const template = findTemplate(state.currentTemplateId);
  if (template && template.data.galleryImages) {
    template.data.galleryImages.splice(index, 1);
    renderEditor();
    renderCard();
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
// 🖼️ RENDERIZADO DE TARJETA (PREVIEW)
// ═══════════════════════════════════════════════
function renderCard() {
  const template = findTemplate(state.currentTemplateId);
  if (!template) return;
  
  const colors = template.palettes[state.currentPalette];
  const data = template.data;
  
  let html = '';
  
  // Llamar al renderer correspondiente
  if (template.renderer === 'renderBlueTemplate') {
    html = renderBlueTemplate(data, colors);
  } else if (template.renderer === 'renderPinkTemplate') {
    html = renderPinkTemplate(data, colors);
  } else if (template.renderer === 'renderGoldTemplate') {
    html = renderGoldTemplate(data, colors);
  } else if (template.renderer === 'renderWeddingTemplate') {
    html = renderWeddingTemplate(data, colors);
  } else {
    html = `<html><body style="padding:40px;text-align:center;font-family:sans-serif;"><h2>🚧 Plantilla en construcción</h2><p>${template.name}</p></body></html>`;
  }
  
  document.getElementById('cardPreview').srcdoc = html;
}

.photo-circle img{width:100%;height:100%;object-fit:cover}
.text-center{text-align:center}
.title{font-family:'Great Vibes',cursive;font-size:3rem;color:var(--gold);margin:10px 0}
.subtitle{font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:3px;text-transform:uppercase;color:var(--brown)}
.ribbon{background:linear-gradient(135deg,var(--blue-light),var(--blue),var(--blue-dark));padding:12px 30px;border-radius:25px;margin:20px auto;display:inline-block}
.ribbon-text{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--white)}
.datetime{display:flex;justify-content:space-around;padding:20px 0;margin:20px 0;border-top:2px dotted var(--blue-light);border-bottom:2px dotted var(--blue-light)}
.datetime-block{text-align:center}
.datetime-value{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:700;color:var(--blue-dark)}
.datetime-label{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase}
.section{margin:25px 0;text-align:center}
.section-title{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.church-name{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase}
.waiting{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--blue-dark);margin:20px 0}
.countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:var(--blue-soft);padding:20px;border-radius:15px;border:2px solid var(--gold)}
.countdown-item{background:var(--white);padding:10px;border-radius:8px;border:2px solid var(--gold-light);text-align:center}
.countdown-number{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--blue-dark);display:block}
.countdown-label{font-size:0.75rem;color:var(--brown);text-transform:uppercase;letter-spacing:1px}
.gallery{border:3px solid var(--gold);border-radius:10px;overflow:hidden;margin:15px 0}
.gallery-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.gallery-track > div{min-width:100%;scroll-snap-align:start}
.footer{text-align:center;padding:20px 0;border-top:2px solid var(--blue-light);margin-top:20px}
.footer-verse{font-style:italic;margin-bottom:5px}
.footer-ref{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold-dark);letter-spacing:2px}
</style></head><body>
<div class="invitation">
  <div class="photo-circle"><img src="${d.mainPhoto}" alt="${escapeHtml(d.mainPhotoAlt)}"></div>
  <div class="text-center">
    <div class="subtitle">${escapeHtml(d.fatherName)} y ${escapeHtml(d.motherName)}</div>
    <div class="subtitle" style="margin-top:-5px">${escapeHtml(d.introText2)}</div>
    <div class="title">${escapeHtml(d.titleText)}</div>
    <div class="subtitle">${escapeHtml(d.subtitleText)}</div>
  </div>
  <div class="text-center"><div class="ribbon"><div class="ribbon-text">${escapeHtml(d.ribbonName)}</div></div></div>
  <div class="datetime">
    <div class="datetime-block">
      <div class="datetime-label">${escapeHtml(d.dayName)}</div>
      <div class="datetime-value">${escapeHtml(d.dayNumber)}</div>
      <div class="datetime-label">${escapeHtml(d.monthName)}</div>
    </div>
    <div class="datetime-block">
      <div class="datetime-label">${escapeHtml(d.timeLabel)}</div>
      <div class="datetime-value">${escapeHtml(d.timeValue)}</div>
      <div class="datetime-label">${escapeHtml(d.timeAmPm)}</div>
    </div>
  </div>
  <div class="section">
    <div class="church-name">${escapeHtml(d.churchName)}<br><span style="font-size:0.85rem;color:var(--blue)">${escapeHtml(d.churchLocation)}</span></div>
  </div>
  <div class="section">
    <div class="section-title">${escapeHtml(d.godparentsTitle)}</div>
    <div>${escapeHtml(d.godfather)}<br>${escapeHtml(d.godmother)}</div>
  </div>
  <div class="waiting">${escapeHtml(d.waitingText)}</div>
  <div class="countdown">
    <div class="countdown-item"><span class="countdown-number" id="days">00</span><span class="countdown-label">${escapeHtml(d.countdownLabels[0])}</span></div>
    <div class="countdown-item"><span class="countdown-number" id="hours">00</span><span class="countdown-label">${escapeHtml(d.countdownLabels[1])}</span></div>
    <div class="countdown-item"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">${escapeHtml(d.countdownLabels[2])}</span></div>
    <div class="countdown-item"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">${escapeHtml(d.countdownLabels[3])}</span></div>
  </div>
  <div class="section">
    <div class="section-title">${escapeHtml(d.galleryTitle)}</div>
    <div class="gallery"><div class="gallery-track">${gallerySlides}</div></div>
  </div>
  <div class="footer">
    <div class="footer-verse">"${escapeHtml(d.footerVerse)}"</div>
    <div class="footer-ref">— ${escapeHtml(d.footerRef)} —</div>
  </div>
</div>
<script>
const eventDate=new Date('${d.eventDateISO}').getTime();
function updateCountdown(){const now=new Date().getTime();const distance=eventDate-now;if(distance<0)return;const days=Math.floor(distance/(1000*60*60*24));const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((distance%(1000*60*60))/(1000*60));const seconds=Math.floor((distance%(1000*60))/1000);document.getElementById('days').textContent=String(days).padStart(2,'0');document.getElementById('hours').textContent=String(hours).padStart(2,'0');document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');document.getElementById('seconds').textContent=String(seconds).padStart(2,'0')}
updateCountdown();setInterval(updateCountdown,1000);
<\/script></body></html>`;
}

// ═══════════════════════════════════════════════
// 💾 GUARDAR / CARGAR / EXPORTAR
// ═══════════════════════════════════════════════
function resetDefaults() {
  if (!confirm('¿Restablecer todos los valores por defecto?')) return;
  location.reload();
}

function saveProject() {
  const data = {
    version: '2.0',
    state: state,
    templates: TEMPLATES_REGISTRY
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'invitaciones-proyecto.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadProjectFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.templates) {
          Object.assign(TEMPLATES_REGISTRY, data.templates);
        }
        if (data.state) {
          state = { ...state, ...data.state };
        }
        renderCategories();
        renderEditor();
        renderCard();
        alert('✅ Proyecto cargado correctamente');
      } catch (err) {
        alert('❌ Error al cargar: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportHTML() {
  const iframe = document.getElementById('cardPreview');
  const htmlContent = iframe.srcdoc;
  const blob = new Blob([htmlContent], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'invitacion.html';
  a.click();
  URL.revokeObjectURL(url);
}

function importTemplates() {
  alert('📥 Función de importar plantillas desde archivo JSON.\n\nEstructura esperada:\n{\n  "categoria": {\n    "name": "Nombre",\n    "icon": "🎯",\n    "templates": [...]\n  }\n}');
}

function exportTemplates() {
  const blob = new Blob([JSON.stringify(TEMPLATES_REGISTRY, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'plantillas.json';
  a.click();
  URL.revokeObjectURL(url);
}
