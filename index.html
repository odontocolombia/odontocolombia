<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style - Full Width Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        .text-line {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform;
        }

        .char {
            display: inline-block;
            will-change: transform, opacity;
        }

        .line-right {
            text-align: right;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        .transition-spacer {
            height: 50vh;
            background-color: #0a0a0a;
        }

        /* GALERÍA FULL WIDTH */
        .gallery-section {
            background-color: #0a0a0a;
            position: relative;
        }

        .gallery-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .project-card {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: hidden;
            will-change: transform;
        }

        .project-image {
            width: 100%;
            height: 120%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }

        .footer-spacer {
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        @media (max-width: 768px) {
            .text-line {
                font-size: 16vw;
            }

            .project-card {
                height: 60vh;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <section class="hero-section">
        <div class="text-line line-center" id="line1">RECENT</div>
        <div class="text-line line-right" id="line2">WORK</div>
        
        <div class="scroll-hint">SCROLL</div>
    </section>

    <div class="transition-spacer"></div>

    <section class="gallery-section">
        <div class="gallery-container">
            <div class="project-card" data-speed="0.1">
                <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1920&q=80" alt="Project 1" class="project-image">
            </div>

            <div class="project-card" data-speed="0.15">
                <img src="https://images.unsplash.com/photo-1507643179173-617d6545517d?w=1920&q=80" alt="Project 2" class="project-image">
            </div>
        </div>
    </section>

    <div class="footer-spacer">
        <p style="color: #333; font-size: 12px;">End of Projects</p>
    </div>

    <script>
        // SEPARAR LETRAS
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');

        function splitText(line) {
            const text = line.innerText;
            line.innerHTML = '';
            
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.classList.add('char');
                span.dataset.index = index;
                line.appendChild(span);
            });
        }

        splitText(line1);
        splitText(line2);

        const chars1 = line1.querySelectorAll('.char');
        const chars2 = line2.querySelectorAll('.char');

        // EFECTO DE TEXTO - Letras entran desde los lados
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            // Progreso para el texto (primera ventana)
            const textProgress = Math.min(1, Math.max(0, scrollY / (windowHeight * 0.8)));

            // RECENT - Letras vienen desde la izquierda
            chars1.forEach((char, index) => {
                // Cada letra empieza más a la izquierda según su posición
                const startX = -100 - (index * 30); // Desde la izquierda de la pantalla
                const currentX = startX * (1 - textProgress);
                const scale = 0.5 + (textProgress * 0.5);
                
                char.style.transform = `translateX(${currentX}px) scale(${scale})`;
                char.style.opacity = textProgress;
            });

            // WORK - Letras vienen desde la derecha
            chars2.forEach((char, index) => {
                // Cada letra empieza más a la derecha según su posición
                const startX = 100 + (index * 30); // Desde la derecha de la pantalla
                const currentX = startX * (1 - textProgress);
                const scale = 0.5 + (textProgress * 0.5);
                
                char.style.transform = `translateX(${currentX}px) scale(${scale})`;
                char.style.opacity = textProgress;
            });

            // EFECTO PARALLAX PARA LAS IMÁGENES
            const images = document.querySelectorAll('.project-card');
            
            images.forEach((card, index) => {
                const rect = card.getBoundingClientRect();
                const img = card.querySelector('.project-image');
                const speed = parseFloat(card.dataset.speed) || 0.1;
                
                // Solo aplicar parallax si la imagen está visible o cerca
                if (rect.top < windowHeight && rect.bottom > 0) {
                    // Calcular cuánto ha scrolleado dentro de la imagen
                    const scrollProgress = (windowHeight - rect.top) / (windowHeight + rect.height);
                    const parallaxOffset = scrollProgress * 100 * speed;
                    
                    img.style.transform = `translateY(${parallaxOffset}px)`;
                }
            });
        });

        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
