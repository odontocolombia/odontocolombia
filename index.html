<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cumpleaños de Sofía ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Luckiest+Guy&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --bg1:#1A0A2E; --bg2:#2D0A4B; --bg3:#0D1B3E;
  --pink:#FF6EB4; --pink2:#C2185B; --gold:#FFD700; --violet:#E040FB;
  --soft:#F8BBD0; --stroke:#9B1FA8;
}
body{
  background:linear-gradient(170deg,var(--bg1) 0%,var(--bg2) 35%,var(--bg3) 65%,var(--bg1) 100%);
  min-height:100vh; font-family:'Lato',sans-serif; color:#fff; overflow-x:hidden;
}
#starfield{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star{ position:absolute; border-radius:50%; animation:twinkle var(--dur) var(--delay) infinite ease-in-out; }
@keyframes twinkle{ 0%,100%{opacity:.12;transform:scale(.8)} 50%{opacity:.95;transform:scale(1.4)} }
.float{ animation:floaty 4s ease-in-out infinite; }
.float-slow{ animation:floaty 5.5s ease-in-out infinite; }
@keyframes floaty{ 0%,100%{transform:translateY(-8px)} 50%{transform:translateY(8px)} }
.fade-up{ animation:fadeUp .6s ease forwards; opacity:0; }
@keyframes fadeUp{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.pop{ animation:pop .55s cubic-bezier(.34,1.4,.64,1) forwards; opacity:0; transform:scale(0); }
@keyframes pop{ to{opacity:1;transform:scale(1)} }
.blink{ animation:blink 2.4s infinite ease-in-out; }
@keyframes blink{ 0%,100%{opacity:.35} 50%{opacity:1} }

/* ---------- SPLASH ---------- */
#splash{
  position:fixed; inset:0; z-index:50; cursor:pointer; overflow:hidden;
  background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 70%,var(--bg1) 100%);
  display:flex; align-items:center; justify-content:center; animation:splashIn .4s ease;
}
#splash.hide{ animation:splashOut .5s ease forwards; }
@keyframes splashIn{ from{opacity:0} to{opacity:1} }
@keyframes splashOut{ from{opacity:1} to{opacity:0;pointer-events:none} }
.stripe-pink{ position:absolute; left:0; right:0; height:12px; background:repeating-linear-gradient(90deg,var(--pink) 0,var(--pink) 20px,#fff 20px,#fff 40px); }
.stripe-gold{ position:absolute; left:0; right:0; height:6px; background:linear-gradient(90deg,var(--gold),var(--violet),var(--gold)); }
.top-pink{top:0} .top-gold{top:12px} .bot-gold{bottom:0} .bot-pink{bottom:6px}
.ts-name{ font-family:'Luckiest Guy',cursive; font-size:clamp(3rem,16vw,5.5rem); color:var(--gold);
  -webkit-text-stroke:.1em var(--stroke); paint-order:stroke fill; line-height:1; display:block; filter:drop-shadow(0 4px 0 #6A0F7A); }
.ts-age{ font-family:'Luckiest Guy',cursive; font-size:clamp(5rem,22vw,8rem); color:var(--gold);
  -webkit-text-stroke:.08em var(--stroke); paint-order:stroke fill; line-height:1; display:block; filter:drop-shadow(0 5px 0 #6A0F7A); }
.cumple-wrap{ display:inline-block; background:linear-gradient(135deg,var(--pink),var(--pink2));
  padding:.15em 1.4em; clip-path:polygon(3% 0%,97% 0%,100% 100%,0% 100%); margin:.15em 0; }
.cumple{ font-family:'Luckiest Guy',cursive; font-size:clamp(1rem,5vw,1.5rem); color:#fff; letter-spacing:.1em; }
.photo-ring{ width:140px; height:140px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#FF69B4,var(--violet));
  padding:4px; box-shadow:0 0 35px rgba(255,105,180,.7); margin:0 auto .75rem; }
.photo-inner{ width:100%; height:100%; border-radius:50%; overflow:hidden; border:3px solid var(--bg1); }
.photo-inner img{ width:100%; height:100%; object-fit:cover; object-position:top; }

/* ---------- LAYOUT ---------- */
.container{ position:relative; z-index:10; max-width:440px; margin:0 auto; padding:1.5rem 1rem 3rem; display:flex; flex-direction:column; gap:1.25rem; }
.card{ background:rgba(29,8,56,.9); backdrop-filter:blur(10px); border:1.5px solid rgba(255,105,180,.35);
  border-radius:24px; overflow:hidden; box-shadow:0 6px 30px rgba(10,5,30,.7),0 0 40px rgba(224,64,251,.12); position:relative; }
.card::before{ content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(to right,transparent,var(--violet),var(--gold),var(--pink),transparent); }
.card-body{ padding:1.75rem; }
.title-block{ text-align:center; margin-bottom:1.5rem; }
.eyebrow{ font-size:.6rem; letter-spacing:.28em; text-transform:uppercase; color:var(--pink); display:block; margin-bottom:.4rem; }
.sec-title{ font-family:'Dancing Script',cursive; font-size:clamp(1.9rem,7vw,2.6rem); font-weight:700; color:var(--gold); }
.divider{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:.5rem; }
.dline-l{ width:36px; height:1px; background:linear-gradient(to right,transparent,var(--pink)); }
.dline-r{ width:36px; height:1px; background:linear-gradient(to left,transparent,var(--pink)); }

/* ---------- CARD FOLD (EFECTO FLIX STUDIO) ---------- */
.foldable-card {
  background:rgba(29,8,56,.9);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,105,180,.35);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 6px 30px rgba(10,5,30,.7),0 0 40px rgba(224,64,251,.12);
  position:relative;
  transform-style: preserve-3d;
}

.foldable-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(to right,transparent,var(--violet),var(--gold),var(--pink),transparent);
}

.fold-header {
  padding: 1.25rem 1.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  transition: background 0.3s ease;
  position: relative;
  z-index: 2;
}

.fold-header:hover {
  background: rgba(255,105,180,.08);
}

.fold-header-content {
  flex: 1;
  text-align: center;
}

.fold-eyebrow {
  font-size: .55rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--pink);
  display: block;
  margin-bottom: .3rem;
}

.fold-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.7rem, 6.5vw, 2.3rem);
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.fold-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: .5rem;
}

.fold-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1.2rem;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(255,110,180,.5);
}

.foldable-card.open .fold-icon {
  transform: rotate(180deg);
}

.fold-body {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition:
    max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1),
    opacity 0.4s ease,
    padding 0.4s ease;
  padding: 0 1.75rem;
  transform-origin: top center;
}

.foldable-card.open .fold-body {
  max-height: 2000px;
  opacity: 1;
  padding: 0 1.75rem 1.75rem;
  animation: unfoldFade 0.5s ease 0.15s both;
}

@keyframes unfoldFade {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Animación de despliegue de la tarjeta */
.foldable-card {
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
}

.foldable-card.open {
  box-shadow:0 10px 40px rgba(10,5,30,.85),0 0 50px rgba(224,64,251,.2);
}

/* Borde animado al abrir */
.foldable-card::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 24px;
  background: linear-gradient(45deg, var(--pink), var(--gold), var(--violet), var(--pink));
  background-size: 300% 300%;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -1;
  animation: borderShift 4s ease infinite;
}

.foldable-card.open::after {
  opacity: 0.7;
}

@keyframes borderShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ---------- HERO ---------- */
.hero-card{ background:linear-gradient(170deg,var(--bg1) 0%,var(--bg2) 45%,var(--bg3) 100%);
  border:2px solid rgba(255,105,180,.5); border-radius:24px; overflow:hidden;
  box-shadow:0 10px 50px rgba(45,10,75,.8),0 0 60px rgba(224,64,251,.2); }
.hero-body{ padding:1.25rem 1.5rem .5rem; text-align:center; position:relative; }
.hero-info{ background:#1E083A; padding:1.5rem 1.25rem 1.75rem; }
.info-grid{ display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; margin-bottom:1.25rem; }
.info-date{ text-align:center; border-right:1px dashed rgba(255,105,180,.45); padding-right:8px; }
.info-time{ text-align:center; padding:0 8px; }
.info-venue{ text-align:center; border-left:1px dashed rgba(255,105,180,.45); padding-left:8px; }
.lbl-sm{ font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--pink); font-weight:700; }
.lbl-xs{ font-size:.5rem; letter-spacing:.15em; text-transform:uppercase; color:var(--pink); }
.date-big{ font-family:'Dancing Script',cursive; font-size:3rem; font-weight:700; color:var(--gold); line-height:1; }
.time-big{ font-family:'Dancing Script',cursive; font-size:2rem; font-weight:700; color:var(--gold); line-height:1; }
.venue-name{ font-family:'Dancing Script',cursive; font-size:1rem; font-weight:700; color:var(--gold); line-height:1.2; }
.venue-addr{ font-size:.45rem; color:var(--soft); margin-top:4px; line-height:1.5; }
.italic-sm{ font-family:'Dancing Script',cursive; font-style:italic; font-size:1rem; color:var(--soft); margin-bottom:4px; }
.year-sm{ font-size:.5rem; color:var(--soft); }
.rsvp-banner{ background:linear-gradient(135deg,#7B1FA2,#4A0072); border:1px solid rgba(255,105,180,.45);
  border-radius:8px; padding:.7rem 1rem; text-align:center; box-shadow:0 0 20px rgba(224,64,251,.3); }
.rsvp-label{ font-size:.52rem; letter-spacing:.3em; text-transform:uppercase; color:var(--soft); font-weight:700; }
.rsvp-phone{ font-family:'Dancing Script',cursive; font-size:1.6rem; font-weight:700; color:var(--gold); margin-top:2px; }

/* ---------- COUNTDOWN ---------- */
.cd-grid{ display:flex; justify-content:center; gap:.625rem; flex-wrap:wrap; }
.cd-box{ text-align:center; min-width:68px; padding:14px 10px; background:linear-gradient(135deg,#4A0072,#7B1FA2);
  border:1.5px solid rgba(255,105,180,.45); border-radius:14px; box-shadow:0 0 16px rgba(224,64,251,.3); }
.cd-num{ font-family:'Dancing Script',cursive; font-weight:700; font-size:2.4rem; line-height:1; color:var(--gold); }
.cd-lbl{ font-size:.42rem; letter-spacing:.25em; text-transform:uppercase; color:var(--pink); margin-top:6px; }
.cd-foot{ text-align:center; margin-top:1rem; font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:var(--soft); }
.cd-tag{ font-family:'Dancing Script',cursive; font-style:italic; font-size:1.1rem; color:var(--soft); text-align:center; margin-top:.75rem; }

/* ---------- PROGRAM ---------- */
.timeline{ position:relative; }
.timeline::before{ content:''; position:absolute; left:18px; top:8px; bottom:8px; width:1px; background:linear-gradient(to bottom,var(--pink),transparent); }
.tl-item{ display:flex; align-items:flex-start; gap:16px; padding:12px 0; border-bottom:1px solid rgba(224,64,251,.2); }
.tl-item:last-child{ border-bottom:none; }
.tl-dot{ position:relative; z-index:2; flex-shrink:0; width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--pink),var(--violet)); box-shadow:0 0 12px rgba(255,110,180,.7); }
.tl-dot svg{ width:18px; height:18px; }
.tl-time{ font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); font-weight:700; }
.tl-title{ font-family:'Dancing Script',cursive; font-size:1.3rem; color:var(--soft); line-height:1.2; }
.tl-desc{ font-size:.46rem; letter-spacing:.12em; text-transform:uppercase; color:var(--pink); margin-top:2px; }

/* ---------- GALLERY ---------- */
.gal-wrap{ position:relative; height:340px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:1.25rem; }
.gal-side{ position:absolute; width:40%; aspect-ratio:3/4; border-radius:16px; overflow:hidden; filter:brightness(.45);
  box-shadow:0 4px 24px rgba(0,0,0,.5); cursor:pointer; transition:filter .2s; }
.gal-side:hover{ filter:brightness(.65); }
.gal-prev{ left:0; transform:scale(.85) perspective(800px) rotateY(14deg); transform-origin:right center; }
.gal-next{ right:0; transform:scale(.85) perspective(800px) rotateY(-14deg); transform-origin:left center; }
.gal-side img{ width:100%; height:100%; object-fit:cover; }
.gal-main{ position:relative; width:60%; aspect-ratio:3/4; border-radius:24px; overflow:hidden; z-index:10;
  box-shadow:0 12px 48px rgba(0,0,0,.7),0 0 0 3px rgba(255,215,0,.45); }
.gal-main img{ width:100%; height:100%; object-fit:cover; position:absolute; inset:0; transition:opacity .4s ease,transform .4s ease; }
.gal-main img.enter{ opacity:0; transform:translateX(60px) scale(.92); }
.gal-main img.active{ opacity:1; transform:none; }
.gal-overlay{ position:absolute; inset:0; background:linear-gradient(to top,rgba(20,5,40,.9) 0%,transparent 50%); pointer-events:none; }
.gal-caption{ position:absolute; bottom:0; left:0; right:0; padding:1rem; }
.gal-cap-title{ font-family:'Luckiest Guy',cursive; font-size:1rem; color:var(--gold); text-shadow:1px 1px 0 var(--stroke); }
.gal-cap-count{ font-size:.45rem; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,110,180,.85); margin-top:2px; }
.gal-badge{ position:absolute; top:.75rem; right:.75rem; background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
  border:1px solid rgba(255,215,0,.35); border-radius:20px; padding:4px 8px; font-size:.42rem; letter-spacing:.2em; color:var(--gold); }
.gal-nav{ display:flex; align-items:center; justify-content:center; gap:1rem; }
.gal-btn{ width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#7B1FA2,#4A0072);
  border:1.5px solid rgba(255,105,180,.45); color:var(--gold); font-size:1.4rem; box-shadow:0 4px 16px rgba(224,64,251,.4);
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s; }
.gal-btn:active{ transform:scale(.88); }
.gal-dots{ display:flex; align-items:center; gap:6px; }
.gal-dot{ height:8px; min-width:8px; border-radius:4px; border:none; cursor:pointer; background:rgba(255,105,180,.35); transition:width .3s,background .3s; padding:0; }
.gal-dot.active{ width:28px; background:var(--gold); }

/* ---------- RSVP ---------- */
.rsvp-form{ max-width:320px; margin:0 auto; }
.rsvp-field{ border-bottom:1.5px solid rgba(255,105,180,.4); margin-bottom:1.5rem; padding-bottom:4px; }
.rsvp-input,.rsvp-textarea{ width:100%; background:transparent; border:none; outline:none;
  font-family:'Dancing Script',cursive; font-style:italic; font-size:1.15rem; color:var(--gold); padding:4px 0; }
.rsvp-input::placeholder,.rsvp-textarea::placeholder{ color:rgba(255,215,0,.35); }
.rsvp-textarea{ resize:none; }
.rsvp-submit{ width:100%; padding:.9rem; cursor:pointer; font-family:'Lato',sans-serif; font-weight:700; font-size:.58rem;
  letter-spacing:.3em; text-transform:uppercase; color:var(--bg1); background:linear-gradient(135deg,var(--gold),#FF69B4);
  border:none; border-radius:50px; box-shadow:0 4px 18px rgba(255,105,180,.55); transition:transform .1s; }
.rsvp-submit:active{ transform:scale(.97); }
.rsvp-thanks{ text-align:center; padding:2rem 0; display:none; }
.rsvp-thanks.show{ display:block; animation:pop .45s cubic-bezier(.34,1.4,.64,1) forwards; }
.thanks-title{ font-family:'Dancing Script',cursive; font-size:2.4rem; color:var(--gold); margin:.5rem 0; }
.thanks-sub{ font-style:italic; font-size:.95rem; color:var(--soft); margin-bottom:1.25rem; }
.wa-btn{ display:inline-block; padding:.75rem 2rem; border-radius:50px; text-decoration:none; font-family:'Lato',sans-serif;
  font-weight:700; font-size:.55rem; letter-spacing:.3em; text-transform:uppercase; color:#062; background:linear-gradient(135deg,#25d366,#128c50); box-shadow:0 4px 18px rgba(37,211,102,.4); }

/* ---------- FOOTER ---------- */
footer{ text-align:center; position:relative; z-index:10; padding:2.5rem 1.5rem; border-top:1px solid rgba(255,105,180,.3); background:rgba(20,5,40,.65); }
.footer-name{ font-family:'Dancing Script',cursive; font-weight:700; font-size:2.4rem; color:var(--gold); }
.footer-turns{ font-family:'Dancing Script',cursive; font-style:italic; font-size:1.2rem; color:var(--soft); margin-bottom:.4rem; }
.footer-date{ font-size:.45rem; letter-spacing:.2em; text-transform:uppercase; color:var(--pink); margin-bottom:1rem; }
.footer-tag{ font-family:'Dancing Script',cursive; font-style:italic; font-size:1rem; color:var(--soft); }
#main{ display:none; } #main.show{ display:block; }
</style>
</head>
