<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style - Text & Gallery</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* ESPACIO PARA HACER SCROLL */
        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CONTENEDOR DEL TEXTO GRANDE */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        /* ESTILO DE LAS FILAS DE TEXTO */
        .text-line {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform, letter-spacing;
        }

        /* Estilo para cada letra individual */
        .char {
            display: inline-block;
            transition: transform 0.1s ease-out;
        }
        
        .line-right {
            justify-content: flex-end;
            text-align: right;
        }

        .line-center {
             justify-content: center;
             text-align: center;
        }

        /* Scroll indicator */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* ESPACIO DE TRANSICIÓN */
        .transition-spacer {
            height: 50vh;
            background-color: #0a0a0a;
        }

        /* GALERÍA DE PROYECTOS */
        .gallery-section {
            background-color: #0a0a0a;
            padding: 80px 40px;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .project-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background-color: #111;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .project-info {
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .project-category {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        .project-year {
            font-size: 0.8rem;
            color: #555;
        }

        /* FOOTER */
        .footer-spacer {
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .text-line {
                font-size: 16vw;
            }

            .gallery-container {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 0 20px;
            }

            .project-image {
                height: 350px;
            }

            .gallery-section {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ESPACIO VACÍO ARRIBA PARA ENTRAR -->
    <div class="scroll-spacer">
        <p>↓ Scroll Down ↓</p>
    </div>

    <!-- SECCIÓN PRINCIPAL DEL EFECTO DE TEXTO -->
    <section class="hero-section">
        <div class="text-line line-center">RECENT</div>
        <div class="text-line line-right">WORK</div>
        
        <div class="scroll-hint">SCROLL</div>
    </section>

    <!-- ESPACIO DE TRANSICIÓN -->
    <div class="transition-spacer"></div>

    <!-- GALERÍA DE PROYECTOS -->
    <section class="gallery-section">
        <div class="gallery-container">
            <!-- Proyecto 1 -->
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=1200&q=80" alt="Project 1" class="project-image">
                <div class="project-info">
                    <h3 class="project-title">Arrox Digital Agency HTML Template</h3>
                    <p class="project-category">WordPress, Themeforest</p>
                    <span class="project-year">(2025)</span>
                </div>
            </div>

            <!-- Proyecto 2 -->
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1507643179173-617d6545517d?w=1200&q=80" alt="Project 2" class="project-image">
                <div class="project-info">
                    <h3 class="project-title">Al Khobar Uptown</h3>
                    <p class="project-category">Visual Identity, Branding</p>
                    <span class="project-year">(2021)</span>
                </div>
            </div>

            <!-- Proyecto 3 -->
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=1200&q=80" alt="Project 3" class="project-image">
                <div class="project-info">
                    <h3 class="project-title">Modern Brand Identity</h3>
                    <p class="project-category">Branding, Design</p>
                    <span class="project-year">(2024)</span>
                </div>
            </div>

            <!-- Proyecto 4 -->
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=1200&q=80" alt="Project 4" class="project-image">
                <div class="project-info">
                    <h3 class="project-title">Creative Portfolio</h3>
                    <p class="project-category">Web Design, Development</p>
                    <span class="project-year">(2023)</span>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <div class="footer-spacer">
        <p style="color: #333; font-size: 12px;">End of Projects</p>
    </div>

    <script>
        // SELECCIONAR ELEMENTOS DE TEXTO
        const textLines = document.querySelectorAll('.text-line');
        
        // FUNCIÓN PARA SEPARAR LAS LETRAS
        textLines.forEach(line => {
            const text = line.innerText;
            line.innerHTML = ''; // Limpiar texto original
            
            // Crear spans para cada letra
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char');
                span.dataset.index = index;
                line.appendChild(span);
            });
        });

        // ESCUCHAR EL SCROLL
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            textLines.forEach(line => {
                // Calculamos la posición del elemento en la pantalla
                const rect = line.getBoundingClientRect();
                
                // "Progress" va de 0 (arriba) a 1 (cuando el elemento está centrado)
                const progress = 1 - (rect.top / windowHeight);
                
                // Limitamos el progreso entre 0 y 1
                const clampedProgress = Math.max(0, Math.min(1, progress));

                const chars = line.querySelectorAll('.char');
                const totalChars = chars.length;

                // MOVER LAS LETRAS
                chars.forEach((char, index) => {
                    const moveAmount = (clampedProgress - 1) * -200; // 200px de dispersión inicial
                    
                    // Movemos cada letra en dirección opuesta a su índice para juntarlas
                    const centerOffset = (index - (totalChars / 2)) * moveAmount;

                    // Aplicamos la transformación
                    char.style.transform = `translateX(${centerOffset}px) scale(${0.5 + (clampedProgress * 0.5)})`;
                    char.style.opacity = clampedProgress;
                });
            });
        });
        
        // Disparar evento scroll al cargar
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
