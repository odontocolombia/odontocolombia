<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adon Style Scroll Effect</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111; /* Fondo negro casi puro */
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* ESPACIO PARA HACER SCROLL */
        /* Necesitamos mucho espacio vacío para que el efecto funcione */
        .scroll-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bottom-content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* CONTENEDOR DEL TEXTO GRANDE */
        .hero-section {
            height: 100vh; /* Ocupa toda la pantalla */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: sticky; /* Se queda pegado mientras hace efecto */
            top: 0;
            overflow: hidden;
        }

        /* ESTILO DE LAS FILAS DE TEXTO */
        .text-line {
            font-size: 14vw; /* Tamaño gigante responsivo */
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            will-change: transform, letter-spacing; /* Optimización de rendimiento */
            mix-blend-mode: difference; /* Efecto artístico si se superponen */
        }

        /* Estilo para cada letra individual */
        .char {
            display: inline-block;
            transition: transform 0.1s ease-out;
        }
        
        /* Pequeño detalle para la segunda línea para que se mueva en sentido contrario o igual */
        .line-right {
            justify-content: flex-end;
            text-align: right;
        }

        .line-left {
            justify-content: flex-start;
            text-align: left;
        }

        .line-center {
             justify-content: center;
             text-align: center;
        }

        /* Scroll indicator */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }
    </style>
</head>
<body>

    <!-- ESPACIO VACÍO ARRIBA PARA ENTRAR -->
    <div class="scroll-spacer">
        <p>↓ Scrolldown ↓</p>
    </div>

    <!-- SECCIÓN PRINCIPAL DEL EFECTO -->
    <section class="hero-section">
        <div class="text-line line-center" data-speed="0.5">RECENT</div>
        <div class="text-line line-right" data-speed="-0.5">WORK</div>
        
        <div class="scroll-hint">SCROLL</div>
    </section>

    <!-- ESPACIO VACÍO ABAJO PARA SALIR DEL EFECTO -->
    <div class="bottom-content">
        <p style="color: #333; font-size: 12px;">CONTENIDO DE LA PÁGINA...</p>
    </div>

    <script>
        // 1. SELECCIONAR ELEMENTOS
        const textLines = document.querySelectorAll('.text-line');
        
        // 2. FUNCIÓN PARA SEPARAR LAS LETRAS
        // Esto crea un <span> por cada letra para poder animarlas individualmente si quisiéramos,
        // pero en este caso lo usamos para calcular el centro.
        textLines.forEach(line => {
            const text = line.innerText;
            line.innerHTML = ''; // Limpiar texto original
            
            // Crear spans para cada letra
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char');
                // Guardamos el índice para animar luego
                span.dataset.index = index;
                line.appendChild(span);
            });
        });

        // 3. ESCUCHAR EL SCROLL
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            textLines.forEach(line => {
                // Calculamos la posición del elemento en la pantalla
                const rect = line.getBoundingClientRect();
                
                // Solo animamos si el elemento está visible (o cerca de estarlo)
                // "Progress" va de 0 (arriba) a 1 (cuando el elemento está centrado)
                // Ajustamos el cálculo para que el efecto ocurra mientras el elemento entra
                const progress = 1 - (rect.top / windowHeight);
                
                // Limitamos el progreso entre 0 y 1 para que no se rompa
                const clampedProgress = Math.max(0, Math.min(1, progress));

                const chars = line.querySelectorAll('.char');
                const totalChars = chars.length;

                // LA MAGIA: MOVER LAS LETRAS
                chars.forEach((char, index) => {
                    // Calculamos un valor basado en el scroll
                    // Si progress es 0 (arriba), el espaciado es grande.
                    // Si progress es 1 (centro), el espaciado es 0.
                    
                    const moveAmount = (clampedProgress - 1) * -200; // 200px de dispersión inicial
                    
                    // Movemos cada letra en dirección opuesta a su índice para juntarlas
                    // Esto centra las letras
                    const centerOffset = (index - (totalChars / 2)) * moveAmount;

                    // Aplicamos la transformación
                    // Añadimos un pequeño translateY para que parezca que vienen de lejos
                    char.style.transform = `translateX(${centerOffset}px) scale(${0.5 + (clampedProgress * 0.5)})`;
                    char.style.opacity = clampedProgress;
                });
            });
        });
        
        // Disparar evento scroll al cargar para colocar las letras si ya estamos en medio de la página
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
